# FÖRUTSÄTTNINGAR — data att merga in i respektive kommun-YAML
#
# Skriven av Opus/Fable 2026-07-13. Verifierad mot kommunernas egna sidor.
# Schema enligt FORUTSATTNINGAR.md §2.
#
# TILL CODE: varje block nedan är `forutsattningar`-fältets innehåll för
# respektive kommun. Merga in i data/kommuner/<slug>.yaml som toppfält
# (samma nivå som `bidrag`). Kör build efter — valideringen ska passera.
#
# STATUS: mergad in i respektive data/kommuner/<slug>.yaml 2026-07-13.
# Denna fil är källan/provenance, inte längre den levande datan —
# redigera data/kommuner/<slug>.yaml direkt vid framtida ändringar.
#
# REGLER SOM HÅLLITS:
#   - `ledtid` är null överallt utom där kommunen faktiskt publicerat en siffra.
#     Endast Gislaved har det. Gissa aldrig.
#   - `giltighet` fylls bara där det är verifierat i källan.
#   - Fyra kommuner (Norrköping, Oskarshamn, Upplands-Bro, Gävle) saknas helt —
#     de behåller `forutsattningar: []` och får därmed station3.inget-fallbacken.

gislaved:
  forutsattningar:
    - id: "gislaved-bidragsberattigad"
      vad: "Bli godkänd som bidragsberättigad förening"
      beskrivning: "Föreningen ansöker om att godkännas som bidragsberättigad. Kräver vald styrelse, av årsmötet antagna stadgar, organisationsnummer och bankkonto i föreningens namn. Är föreningen ansluten till en statsbidragsberättigad riksorganisation ska den vara det."
      system: "Kommunens e-tjänst"
      ledtid: 90
      ledtid_text: "Subventionerad föreningstaxa gäller tidigast tre månader efter godkänt beslutsdatum"
      giltighet: null
      ordning: 1
      kalla_url: "https://www.gislaved.se/uppleva-och-gora/foreningsliv/foreningsbidrag-fritid--och-kulturforeningar"

umea:
  forutsattningar:
    - id: "umea-bidragsberattigad"
      vad: "Bli godkänd som bidragsberättigad förening"
      beskrivning: "Föreningen utser en föreningsadministratör som loggar in med BankID och ansöker om att bli kund i kommunens boknings- och bidragssystem. Bifoga stadgar, nybildnings- eller årsmötesprotokoll, organisationsnummer och bankuppgifter. Stadgarna ska ange att föreningen har sitt säte i Umeå. Minst fem medlemmar."
      system: "Rbok (boknings- och bidragssystem)"
      ledtid: null
      ledtid_text: "Besked skickas till angiven mejladress när ansökan godkänts; kommunen anger ingen handläggningstid"
      giltighet: "Föreningen måste årligen uppdatera sina uppgifter i systemet för att fortsatt vara bidragsberättigad"
      ordning: 1
      kalla_url: "https://www.umea.se/upplevaochgora/foreningarforeningsliv/bildaochregistreraforening.4.250f9659174ae4b9794e7f.html"

