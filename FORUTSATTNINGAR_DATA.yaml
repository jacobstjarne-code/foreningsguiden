      ledtid: null
      ledtid_text: "Antas på årsmötet"
      giltighet: "Ska uppdateras årligen"
      ordning: 2
      kalla_url: "https://berg.se/uppleva-och-gora/foreningsliv-och-foreningar/sok-bidrag-stod-och-stipendier/kommunala-foreningsbidrag"

