# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte en enda förvaltnings redaktionella sida i isolering).
# Föregående version (verifierad 2026-07-19) fångade 7 bidrag (6 skrivna + 1
# medvetet uteslutet) genom att bara läsa kultur- och fritidsförvaltningens
# riktlinje-PDF och dess egen bidragssida — ingen annan förvaltning söktes
# aktivt. Denna omgång läser om regelverket i sin helhet (oförändrad version,
# se nedan) och söker riktat efter bidrag hos andra förvaltningar samt i
# specialkategorierna enligt §2.1.5.
#
# Metod: (1) Regelverket "Riktlinje för bidrag till föreningar inom
# Trelleborgs kommun" (antaget av Kultur- och fritidsnämnden 2023-10-11 §83,
# gäller tillsvidare fr.o.m. 2024-01-01) hämtades och lästes sida för sida
# via pdftotext-motsvarighet (17 sidor, samtliga sex bidragskapitel plus
# allmänna bestämmelser, ansökningsregler och registreringskrav). SAMMA
# version som föregående körning ("2025-version" i filnamnet, publicerad
# 2020-06-06, senast uppdaterad 2025-05-06) — ingen nyare antagen version
# hittades vid sökning. Innehållet i de sex bidragskapitlen verifierat
# oförändrat mot föregående YAML (belopp, procentsatser och deadlines
# matchar exakt). (2) Förvaltningarnas egna sidor genomsöktes brett utöver
# kultur- och fritid: Socialförvaltningens översiktssida gav INGET
# föreningsbidrag (endast individuella insatser: försörjningsstöd, LSS).
# Samhällsbyggnads-/Trafik-och-gator-sidan gav ETT bidrag som saknades helt
# i föregående version (bidrag till enskilda vägar med statsbidrag, se
# nedan). Omsorg-och-hjälp-sidan gav stiftelserna (uteslutna, se nedan).
# Kommun-och-politik-sidan (Kommunledningsförvaltningen) gav TVÅ bidrag som
# saknades helt: föreningsbidraget inom medborgarbudgeten "En miljon idéer"
# samt IOP (idéburet offentligt partnerskap). (3) Självservice/e-tjänster
# genomsöktes: eservice.trelleborg.se:s samtliga åtta ämnesgrupper
# kontrollerades. Grupp 8 ("Uppleva och göra") gav endast en generisk
# "Ansökan om föreningsbidrag" som leder in i Rbok — ingen ytterligare
# bidragsform funnen där. Grupp 6 ("Omsorg och hjälp") bekräftade
# stiftelserna. Grupp 7 ("Trafik och infrastruktur") listade inga
# vägbidrags-e-tjänster explicit — vägbidraget hittades i stället via
# förvaltningssidan, inte e-tjänsteportalen. (4) Ansökningsportalen
# trelleborg.rbok.se är, liksom övriga Rbok-kommuners motsvarigheter,
# JS-renderad utan enumererbart innehåll vid fetch — EJ_EXTRAHERBAR,
# täckning byggd genom sidkonvergens, inte portalräkning. (5)
# Specialkategorier (§2.1.5) genomsöktes riktat: vägföreningar/
# vägsamfälligheter (HITTAT, se ovan — och regelverkets egen text
# bekräftar att samfällighetsföreningar UTTRYCKLIGEN är uteslutna från de
# sex kultur-/fritidsbidragen, vilket gör vägbidraget administrativt
# distinkt snarare än en dubblett), bygdegårdar/samlingslokaler (INGEN
# separat kommunal bidragsform hittad utöver det generella Lokalbidraget
# och En miljon idéer-investeringsdelen — till skillnad från Skellefteå
# har Trelleborg inget eget "Bidrag till allmänna samlingslokaler"),
# stiftelser/fonder (Selma och A E Anderssons fond samt Idas minnesfond,
# båda uteslutande för privatpersoner — se nedan), byalag/samhälls-
# föreningar (HITTAT via En miljon idéer, som enligt kommunens egen sida
# ersatte en tidigare landsbygdsmiljön-fond 2020), studieförbund (SÖKT,
# EJ AKTIVT — kommunens stöd till studieförbund minskades stegvis från
# 3,5 mkr (2019) och var enligt lokalpress helt avskaffat 2021; ingen
# aktiv, sökbar bidragssida hittades, därför inte skrivet till filen).
#
# NYA BIDRAG (saknades helt i föregående version):
# - Bidrag till enskilda vägar med statsbidrag — administreras av Trafik
#   och gator, inte kultur- och fritidsnämnden. Mottagare är vägsamfällig-
#   heter/väghållare, en annan typ av organisation än de ideella föreningar
#   regelverket ovan avser (regelverket utesluter uttryckligen samfällig-
#   hetsföreningar från sina sex bidrag) — men kvalificerar som förenings-
#   bidrag enligt §2.1.5 specialkategori.
#   https://www.trelleborg.se/trafik-infrastruktur/trafik-och-gator-2/gator-och-vagar-2/bidrag-till-enskilda-vagar-med-statsbidrag/
# - Föreningsbidrag inom En miljon idéer (medborgarbudget) — administreras
#   av Kommunledningsförvaltningen. Endast föreningar (inte privatpersoner)
#   kan söka denna specifika delpott, för sociala arrangemang/aktiviteter
#   samt fysiska investeringar. Roterar mellan kommunens landsbygdsområden
#   (2026: norra landsbygdsområdet) — se anteckning på bidraget för detaljer
#   om källkonflikt kring exakt ansökningsfönster.
#   https://www.trelleborg.se/kommun-politik/en-miljon-ideer/foreningsbidrag-inom-en-miljon-ideer/
# - Idéburet offentligt partnerskap (IOP) — förhandlat samverkansavtal,
#   inte en traditionell konkurrensutsatt ansökan. Inkluderad i linje med
#   hur Växjö kommuns motsvarande IOP-post hanteras i denna filserie
#   (RESEARCH_SPEC_v2 §2.4: form som avviker från standardansökan är inte
#   ett giltigt uteslutningsskäl i sig).
#   https://www.trelleborg.se/uppleva-gora/foreningar/ideburet-offentligt-partnerskap-iop/
#
# MEDVETET UTESLUTNA (kategoriskt skäl, §2.4):
# - Kulturstipendium (bidrag F i regelverket) — individuellt stipendium,
#   10 000 kr, sökande/nominerad ska vara en person 15–30 år. Bekräftat vid
#   denna omläsning av PDF:en (kapitel F, "Stipendiaten skall vara mellan
#   15-30 år"). Ingen förening kan vara mottagare.
#   https://www.trelleborg.se/app/uploads/2023/08/riktlinje-for-bidrag-till-foreningar-inom-trelleborgs-kommun-2025-version.pdf
# - Selma och A E Anderssons fond för obemedlade sjuka i Trelleborg samt
#   Idas minnesfond — uteslutande riktade till privatpersoner (ekonomiskt
#   behövande barn/ungdomar, äldre, personer med funktionsnedsättning/
#   långvarig sjukdom). Ingen förening kan söka.
#   https://www.trelleborg.se/omsorg-och-hjalp/ekonomiskt-stod/sok-ekonomiska-medel-fran-stiftelser/
#
# EJ SKRIVET (osäker/obefintlig status):
# - Studieförbund. Kommunens stöd minskades från 3,5 mkr (2019) till 1,7 mkr
#   samma år, och var enligt lokal nyhetsrapportering (Newsworthy, SVT)
#   helt borta från 2021. Ingen aktiv, sökbar bidragssida hittad på
#   trelleborg.se vid denna körning. Inte skrivet — ingen verifierbar
#   käll-URL för en aktiv ansökan finns.
#
# EJ_EXTRAHERBAR:
# - trelleborg.rbok.se — JS-renderad ansökningsportal, inget enumererbart
#   innehåll vid fetch.
#
# Varningssignal (§2.6) undersökt: Fyra av sju kultur-/fritidsbidrag delar
# deadline 25 februari (verksamhetsbidrag, båda lokalbidragen, städbidrag).
# Verifierat direkt i regelverkets egen text för respektive kapitel (inte
# ett ärvt värde) — samtliga fyra avser kostnader för föreningens senast
# avslutade verksamhetsår och delar en gemensam administrativ cykel hos
# kultur- och fritidsförvaltningen. Bedöms som en genuin delad regel, inte
# en extraktionsbugg. Pensionärsbidrag och socialt bidrag delar separat
# deadline 30 april, också verifierat individuellt i respektive kapitel.
#
# Källkonflikt (§2.5) — En miljon idéers ansökningsfönster: en nyhetsartikel
# från 2025-02-14 anger "15 februari till 15 mars" som inlämningsperiod för
# norra landsbygdsområdets omgång det året. Kommunens nuvarande allmänna
# sida för En miljon idéer anger för 2026 "förslagsinlämning startar 15
# februari" och "röstningsperiod 15 april–15 maj" utan att ange ett eget
# slutdatum för inlämningen. Ingen av sidorna har ett synligt revisionsdatum
# som avgör vilket som är senast uppdaterat för just denna detalj. Endast
# startdatumet (15 februari), som är identiskt i båda källorna, är skrivet
# som fast deadline i denna fil. Se anteckning på bidraget.
#
# Dubbelhämtat i två oberoende pass (§3): de sju bidrag som fanns i
# föregående version verifierades oförändrade mot en fräsch läsning av
# regelverks-PDF:en. De tre nyfunna bidragen hämtades och strukturerades
# i två separata anrop var — inga fältkonflikter identifierade.
#
# Täckningsavstämning: 6 bidragskapitel i regelverket (A–F), varav kapitel B
# (Lokalbidrag) i praktiken innehåller tre separata bidragsformer (egenägd
# lokal, förhyrd lokal, städbidrag) — totalt 7 skrivna bidrag från
# regelverket (verksamhetsbidrag, tre lokal-/städbidrag, arrangörsbidrag,
# pensionärsorganisationer, frivillig social verksamhet) + 1 medvetet
# uteslutet (kulturstipendium, kapitel F). Därutöver 3 bidrag
# SKRIVET_EJ_I_REGELVERK (vägbidrag, En miljon idéer-föreningsbidrag, IOP —
# samtliga administreras av andra förvaltningar än kultur- och
# fritidsnämnden och ligger därför naturligt utanför kultur- och
# fritidsnämndens eget regelverk). Totalt 10 bidrag skrivna till filen.
# Befolkning/län dubbelkällat (sökresultat + sv.
# wikipedia.org, båda 47 440 / 31 mars 2026 — ingen konflikt, oförändrat
# mot föregående version). Spot-checkas av Jacob/Fable före publik deploy.
