    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION — administreras av Trafik och gator, separat spår från kultur- och fritidsnämndens bidrag och lätt att missa om bara föreningsbidragssidorna genomsöks. Kultur- och fritidsnämndens regelverk utesluter uttryckligen samfällighetsföreningar från sina sex bidrag ovan — detta bidrag är administrativt skilt och riktar sig specifikt till väghållare/vägsamfälligheter, en annan mottagarkategori. Vägsamfälligheten kan även söka statligt driftbidrag direkt från Trafikverket, utöver detta kommunala bidrag. Inget tydligt digitalt ansökningssystem identifierat i källan (troligen pappersblankett/kontakt med förvaltningen, som hos jämförbara kommuner i denna filserie)."
