    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://www.trelleborg.se/kommun-politik/en-miljon-ideer/foreningsbidrag-inom-en-miljon-ideer/"
    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION — hittades under 'Kommun och politik' (Kommunledningsförvaltningen), inte under kultur- och fritidsförvaltningens ordinarie bidragsspår, vilket sannolikt är varför det missades tidigare. Medborgarbudgeten ersatte 2020 en tidigare landsbygdsmiljön-fond och roterar mellan kommunens landsbygdsområden — endast föreningar i det aktuella området kan söka en given omgång; 2026 gäller norra landsbygdsområdet, tidigare år bl.a. södra landsbygdsområdet. KÄLLKONFLIKT (§2.5), delvis löst: förslagsinlämningens startdatum (15 februari) är identiskt i en nyhetsartikel om 2025 års omgång och i kommunens nuvarande sida för 2026 — skrivet som fast deadline här. Slutdatum för inlämning skiljer sig mellan källorna (2025-artikeln anger 15 mars; 2026-sidan anger ingen egen slutdag för inlämning, bara röstningsperiod 15 april–15 maj) och ingen källa har ett synligt revisionsdatum — inte skrivet som fast datum, verifiera aktuellt slutdatum direkt mot kommunens sida inför varje omgång. Administreras via enmiljonideer@trelleborg.se, inte Rbok."
