    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION. Inte ett traditionellt sökbart bidrag med fast belopp/deadline, utan ett förhandlat samverkansavtal som initieras via dialog med kommunen — inkluderad som bidragsform i linje med hur Växjö kommuns motsvarande IOP-post hanteras i denna filserie (RESEARCH_SPEC_v2 §2.4: att formen avviker från en traditionell ansökan är inte ett giltigt uteslutningsskäl). Fyra aktiva partnerskap vid denna körning: Brottsofferjouren Söderslätt, Föräldraföreningen mot narkotika, Kvinnojouren Söderslätt, Trelleborgs FF."
forutsattningar:
  - id: "trelleborg-bidragsberattigad-forening"
    vad: "Bli registrerad som bidragsberättigad förening"
    beskrivning: "Föreningen fyller i en föreningsregistrering på hemsidan och skickar in undertecknat protokoll från konstituerande årsmöte, föreningens antagna stadgar, bekräftelse från Skatteverket på tilldelat organisationsnummer, bekräftelse från föreningens bank på tilldelat bankgiro/bankkonto, i förekommande fall bekräftelse på medlemskap i riksorganisation, samt föreningens adress, e-post och uppgifter till utsedd kontaktperson. Grundkrav enligt riktlinjen: säte i Trelleborgs kommun, stadgar godkända av årsmötet, icke vinstdriven, uppdaterad medlemsmatrikel, minst tio medlemmar, årlig medlemsavgift lägst 50 kronor per medlem, registrerad hos Skatteverket med organisationsnummer, bankkonto/bankgiro/plusgiro i föreningens namn, stadgeenligt vald styrelse och valda revisorer, ordnad ekonomi med årlig redovisning, inte i konkurs eller likvidation. Nystartad förening ska genomgå grundutbildning i styrelsearbete samt en introduktion av bidragsbestämmelser från kultur- och fritidsförvaltningen; utbildningsbevis eller motsvarande ska uppvisas. Denna registrering krävs för de sex kultur- och fritidsbidragen ovan — vägbidraget, En miljon idéer och IOP har egna, separata processer (se respektive bidrags anteckning)."
