# Källa verifierad 2026-07-23 mot boden.se. VIKTIGT: kommunens klassiska
# regelverks-PDF ("Regler och riktlinjer för föreningsstöd och stipendier",
# db/web/main.nsf/file.xsp?id=...) 404:ar på LIVE-sajten — boden.se har
# migrerat CMS (SiteVision) och hela det gamla "kommunen/kultur-och-fritid/*"
# sidträdet är dött. Täckningen är därför fastställd via två LIVE,
# boden.se-domän-källor istället (§2 källkonvergens, fallback-metoden):
#   1. https://boden.se/steg-for-steg-guider/ansok-om-foreningsstod
#      (självservice-guide, "Uppdaterad: 2026-02-27") — ger fullständig
#      deadline-gruppering för samtliga löpande + fastställda stöd.
#   2. https://boden.se/steg-for-steg-guider/ansok-om-kulturstod-och-arrangemangsstod
#      (självservice-guide, "Uppdaterad: 2026-01-09") — detaljer för de två
#      kulturstöden.
# En arkiverad kopia av regelverket (2024/2025 års version, fastställt av
# KFU 2024-12-11) hämtades via web.archive.org för INFORMATIV korsverifiering
# av bidragsnamn/struktur — men eftersom web.archive.org inte är boden.se-
# domänen, och live-URL:en 404:ar, är den ALDRIG använd som kalla_url och
# inga belopp/detaljer från den skrivna filen är hämtade uteslutande därifrån.
# Se tackning.log för fullständig avstämning och konflikter.log för den
# interna motsägelsen (badplatser-deadline) som hittades i den arkiverade,
# ej längre citerbara, källan.
