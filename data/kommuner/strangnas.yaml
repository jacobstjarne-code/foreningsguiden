# Källa verifierad 2026-07-23 mot strangnas.se, enligt RESEARCH_SPEC_v2 §2
# (källkonvergens). Regelverket "Riktlinje för föreningsbidrag i Strängnäs
# kommun" (antagen av kommunfullmäktige 2024-05-20 § 94, ersätter policy från
# 2014) användes som täckningskälla i första hand — den räknar upp vilka
# nämnder som fördelar föreningsbidrag och vilka bidrag varje nämnd har.
# Kulturnämnden (2), Teknik- och fritidsnämnden (6) och Socialnämnden (1) har
# namngivna bidrag i regelverket. Kommunens egna sidor gav detaljerna (krav,
# belopp, deadlines) samt två kulturbidrag som inte är namngivna i regelverket
# (bidrag till anläggning/klubblokal, bidrag till bygdegårdar) och ett
# ungdomsstöd (Snabba pengar) — se tackning.log för avstämning.
#
# Medvetet uteslutna (§2.4, se tackning.log för fullständig motivering):
# Ivar Lindströms stiftelse (individstöd till pensionärer/sjukersatta,
# administreras som privat stiftelse), Kulturstipendiet (delas inte längre ut
# sedan 2025), Trygghetsfonden/Föreningsstödsfonden/Näringslivsfonden
# (covid-fondpaket 2020, källsidan 404:ar och inget nyare spår hittades).
