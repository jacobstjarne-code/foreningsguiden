# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2.1/v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-18) följde kultur- och fritidsnämndens redaktionella sidträd och
# rapporterades komplett med 11 bidrag, men uteslöt uttryckligen fyra bidrag
# administrerade av andra förvaltningar ("landsbygds-/skärgårdspeng,
# trygghetsfond, hållbarhetsbidrag, gång-/cykelvägsbidrag ... medvetet
# exkluderade ur denna omgång") — precis det mönster v2 §0 identifierade som
# systematiskt fel (Halmstad-fallet). Denna omkörning följer källkonvergens:
# regelverk/riktlinjer där de finns (kategori 1), varje förvaltnings egna
# sidor (kategori 2), självservice-/e-tjänstsidor separat (kategori 3),
# samt Rbok-portalen (kategori 4, bekräftat JS-renderad och inloggningskrävd
# — EJ_EXTRAHERBAR, konsistent med Växjö/Halmstad).
#
# Källor konsulterade:
# 1. REGELVERK: Kultur- och fritidsnämndens "bidragsregler-20220101.pdf"
#    (https://www.norrtalje.se/globalassets/kommun-och-politik/forfattningssamling/regler/bidragsregler-20220101.pdf)
#    gav 404 vid två separata hämtningsförsök — EJ_EXTRAHERBAR (trasig länk,
#    trots att den är indexerad). Ersatt som facit av nyhetsartikeln
#    "Samlingsplats för motorburen ungdom, Camp kultur och nya bidragsregler"
#    (norrtalje.se/nyheterna/2026-03/...), som bekräftar att nämnden beslutat
#    reviderade bidragsregler gällande 2026-07-01 och uttryckligen radar upp
#    de bidrag reglerna omfattar: aktivitetsbidrag, anläggningsbidrag,
#    hyresbidrag, verksamhetsbidrag, bidrag till öppen verksamhet,
#    programbidrag och bidrag till studieförbund. Hållbarhetsbidrag och
#    landsbygds-/skärgårdspeng har egna riktlinjedokument på förvaltningsnivå
#    (se resp. bidrag nedan). Trygghetsfonden har en riktlinje-PDF
#    (riktlinger-240105.pdf) som gav 200-svar men var binärt/olisbar för
#    innehållsextraktion — URL:en fungerar (kategori 1-krav uppfyllt), detaljer
#    hämtade från självservicesidan istället.
# 2. FÖRVALTNINGARNAS EGNA SIDOR: kultur-och-fritid/bidrag-och-stipendier
#    (huvudöversikt + 12 undersidor, inkl. den tidigare missade
#    "studieforbund"-sidan), bygga-bo-miljo (hållbarhetsbidrag,
#    landsbygds-/skärgårdsutvecklingspeng, bredband), trafik-gator-parker
#    (gång-/cykelvägsbidrag), trygghet-sakerhet (trygghetsfonden),
#    stod-vard-omsorg (fonder och stiftelser som kommunen förvaltar).
# 3. SJÄLVSERVICE/E-TJÄNST: sjalvservice/bygga-bo-miljo/hallbarhetsbidrag,
#    sjalvservice/bygga-bo-miljo/landsbygds--och-skargardsutvecklingspeng-ansokan,
#    sjalvservice/trygghet-sakerhet/trygghetsfonden,
#    sjalvservice/kultur-fritid/evenemangsbidrag,
#    sjalvservice/kultur-fritid/programbidrag,
#    sjalvservice/kultur-fritid/bidrag-ur-stiftelse-och-fond. Dessa gav i
#    flera fall MER aktuell/exakt information än de redaktionella /info/-
#    sidorna (se Evenemangsbidrag nedan).
# 4. PORTAL: https://norrtalje.rbok.se — bekräftat JS-renderad och
#    inloggningskrävd ("Registrera dig"/"Logga in" krävs för att se
#    bidragsformulär). EJ_EXTRAHERBAR, loggat, gått vidare enligt §2.1.
# 5. SPECIALKATEGORIER: vägföreningar/vägsamfälligheter — sökt specifikt,
#    ingen kommunal bidragsform hittad för Norrtälje (till skillnad från
#    Halmstad). Bygdegårdar/samlingslokaler — täcks av befintliga
#    Anläggningsbidrag (bekräftat via Norrtelje Tidning-artikel: 1 927 000 kr
#    till 21 lokalhållande föreningar 2026, samma bidrag som redan fanns i
#    föregående version). Stiftelser/fonder — se nedan. Byalag — täcks av det
#    nyupptäckta Bredbandsstödet. Studieförbund — nyupptäckt bidrag.
#
# NYA BIDRAG TILLAGDA (7 st, alla I_KALLA_EJ_SKRIVET i föregående version):
# - Bidrag till studieförbund (fanns på kommunens egen bidragsformer-sida,
#   men saknades i föregående YAML trots att den listar övriga 11
#   kultur-fritid-bidrag från exakt samma sidträd — ren utelämning).
# - Hållbarhetsbidrag, Landsbygds- och skärgårdsutvecklingspeng,
#   Trygghetsfonden, Anläggningsbidrag för gång- och cykelvägar på
#   landsbygden, Bredbandsstöd — samtliga administrerade av andra
#   förvaltningar än kultur- och fritid, tidigare medvetet exkluderade med
#   skälet "administreras av andra förvaltningar", vilket RESEARCH_SPEC_v2.md
#   §2.4 inte tillåter ("Aldrig godkända skäl: ... 'liknar ett annat bidrag'").
#   Samtliga är genuina, sökbara föreningsbidrag med egen målgrupp,
#   ansökningsperiod och (i flera fall) egen riktlinje-PDF.
# - Stiftelser och fonder (samlat enligt §2.7): av kommunens 12 förvaltade
#   fonder/stiftelser är två öppna för föreningar — Ebba Genteles stiftelse
#   (pensionärsföreningar, Rådmansö-prioritet) och Stenbergska I (föreningar
#   med ideella/sociala ändamål). Trygghetsfonden räknas formellt också till
#   "fonder och stiftelser som kommunen förvaltar", men har egen dedikerad
#   ansökningsväg, egna fasta ansökningsfönster och en egen plats på
#   kommunens huvudöversikt över bidrag — skriven som eget bidrag, inte
#   inbakad i samlingsposten (samma logik som särskiljer Halmstads 52
#   samlade stiftelser från dess namngivna vägbidrag).
#
# MEDVETET UTESLUTNA (§2.4, kategoriskt skäl):
# - Idrotts- och fritidsstipendium, Jämställdhets- och inkluderingspris,
#   Kulturpris, Kulturstipendium, Kulturarvsstipendium, Årets eldsjäl,
#   Årets barn- och ungdomsförening — individuella pris/stipendier eller
#   konkurrensutsatta årliga utmärkelser, inte sökbara verksamhetsbidrag.
#   https://www.norrtalje.se/info/kultur-och-fritid/bidrag-och-stipendier/
# - Verksamhetsavtal (Roslagsblomman, Norrtälje Naturvårdsstiftelse,
#   Färsna 4H, Norrtälje Luftvärnsmuseum m.fl.) — undersökt specifikt
#   (sökning efter kriterier/ansökningsförfarande gav inga träffar). Endast
#   efterhandsbeslut om förlängning av redan existerande, namngivna avtal
#   hittades; inget publicerat kriterium eller ansökningsväg för nya
#   föreningar att söka ett verksamhetsavtal. Gränsfall — skiljer sig från
#   Växjös "Stöd till samhällsuppdrag" som har en publicerad kriteriesida.
#   Utesluten med reservationen att den bör omprövas om en kriteriesida
#   hittas senare. https://www.norrtalje.se/nyheterna/2025-12/ny-pristagare-verksamhetsavtal-och-anlaggningsbidrag
# - 10 av 12 kommunala fonder/stiftelser (Carlssonska Roslagsbro, J.M.
#   Holmers och Österholms fond, Norrtälje skolfond, Stenbergska stiftelsen,
#   Fonden till förmån till behövande, Karl Johan Mattssons stiftelse,
#   Linnéa Anderssons fond, Fonden till förmån för lärare, Anna och Rolf
#   Balkenhausens Donationsfond) — riktar sig uteslutande till privatpersoner
#   (elever, lärare, äldre, behövande), inte föreningar.
#   https://www.norrtalje.se/info/stod-vard-omsorg/fonder-och-stiftelser-som-kommunen-forvaltar/
#
# KÄLLKONFLIKT (§2.5): Trygghetsfondens vårfönster ges som "31 januari–1
# april" på kommunens fonder-och-stiftelser-sida men som "13 februari–1
# april" på trygghetsfondens egen självservicesida. Inget av källorna var
# daterat vid hämtningstillfället. Slutdatumet (1 april) sammanfaller i båda
# — endast öppningsdatumet skiljer. Se anteckning på bidraget.
#
# ÖVRIGT: Evenemangsbidragets tidigare olösta källkonflikt (mars-april 2026
# vs. sep-okt 2027) är nu upplöst — både den redaktionella
# bidragsformer-sidan och den dedikerade självservicesidan (uppdaterad
# 2026-03-09) anger samstämmigt 1 september–15 oktober som gällande fönster
# för evenemang 2027, utan någon motstridig sökträff denna omgång.
