    anteckning: "Avser exempelvis arrangerad sammankomst. Källan anger deadline för ansökan som veckonummer (\"vecka 2\"), inte exakt kalenderdatum — distinkt från Verksamhetsbidrag sociala insatser (vecka 4). SKRIVET_EJ_I_REGELVERK (§2.3) — finns inte som egen post i kultur- och fritidsnämndens bidragsregler (KFN 2025/84-50); kan vara konsoliderat in i Verksamhetsbidrag sociala insatser (som uttryckligen omfattar funktionshindersföreningar) utan att webbsidan hunnit uppdateras, eller ett fortfarande aktivt separat spår. Ingen bekräftelse hittad åt något håll — spot-checkas."
