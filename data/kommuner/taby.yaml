# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md/v2.1 §2). Föregående
# version (verifierad 2026-07-19, 12 bidrag) byggde enbart på kommunens
# redaktionella bidragssida. Denna omgång följer källkonvergens-ordningen:
# (1) regelverket, (2) förvaltningens egna sidor, (3) självservice/e-tjänst,
# (4) portalen (om extraherbar), (5) specialkategorier.
#
# (1) REGELVERK: Täby har TVÅ nivåer av antaget regelverk, med olika
# detaljgrad och olika ålder:
#   a) "Riktlinje för föreningsbidrag" (Dnr KS 2024/77-04), antagen av
#      Kommunfullmäktige 2024-10-07 — en övergripande policy (vem är
#      bidragsberättigad, vad beviljas ALDRIG: partipolitiska/religiösa/
#      fackliga föreningar, skolidrottsföreningar, verksamhet som
#      sammanfaller med kommunens egen, föreningar med skulder hos
#      kommunen/Skatteverket/Kronofogden). Den räknar INTE upp enskilda
#      bidragsformer — det delegeras till nämnderna.
#      https://www.taby.se/download/18.1472478b19d24ae5186c855/1774860321374/riktlinje-foreningsbidrag-1.0.pdf
#      (En äldre, ej ifylld utkastversion av samma dokument ligger kvar
#      både på doc.taby.se/.../Kommunfullmäktige/2024-10-07/ och på
#      kommunens styrande-dokument-sida — bytt ut mot den beslutade
#      versionen ovan, ingen innehållsskillnad utöver ifyllt beslutsdatum.)
#   b) "Riktlinjer, bidragsregler för kultur- och fritidsnämndens
#      verksamheter" (Dnr KFN 2025/84-50, skapad 2025-11-17, senast ändrad
#      2026-04-02) — DETTA är den faktiska bidragskatalogen: 10 namngivna
#      bidrag med syfte/villkor/belopp/ansökan/redovisning. Källan för
#      merparten av detaljerna nedan.
#      https://www.taby.se/download/18.1472478b19d24ae5186217e6/1775121438910/riktlinjer-bidragsregler-for-kultur-fritidsnamndens-verksamheter_TGA.pdf
#
# (2) FÖRVALTNING: Kultur- och fritidsnämnden administrerar samtliga
# föreningsbidrag i Täby, inklusive de sociala/pensionärs-/
# funktionsrättsinriktade. Riktad sökning mot Socialnämnden och
# Äldrenämnden hittade INGEN egen, aktuell (2025/2026) bidragslinje till
# föreningar — Socialnämnden hade ett eget "samverkansbidrag" 2020/2021
# (Dnr SON 2020/303-79), men det har uppenbarligen konsoliderats in under
# KFN:s "Verksamhetsbidrag sociala insatser"; inget nyare socialnämnds-
# spår återfanns. Kommunala pensionärsrådet (KPR) är ett rådgivande organ,
# inget bidrag.
#
# (3) SJÄLVSERVICE/E-TJÄNST: kommunens huvudsida för bidrag
# (taby.se/uppleva-och-gora/foreningsliv/stod-och-bidrag-till-foreningar)
# är EN sammanslagen sida med kollapsbara sektioner per bidrag (inga egna
# undersidor längre) — bekräftad kanonisk URL, 200-svar. Legacy-e-tjänster
# på service.taby.se (AFO, AKV, AAB) svarar 200 men kräver inloggning och
# är inte enumererbara. AFO används fortsatt för föreningsregistrering.
#
# (4) PORTAL: ActorSmartbook (taby.actorsmartbook.se) är Angular/JS-
# renderad — EJ_EXTRAHERBAR, bekräftat genom hämtning (ingen statisk
# bidragslista i HTML-svaret). Loggat i tackning.log, inte ett fel.
#
# (5) SPECIALKATEGORIER: riktad sökning gav inga träffar för Täby på
# vägföreningar/vägsamfälligheter, bygdegårdar/samlingslokaler, kommunala
# stiftelser/donationsfonder sökbara för föreningar, samhälls-/byalag
# (bortsett från allmän hänvisning till "Täby bygdeförening" i lokalpress,
# ingen kommunal bidragslinje), eller ett separat studieförbunds-bidrag.
# Rimligt för en tät Stockholms-förort utan glesbygd — men innebär att
# dessa kategorier är MEDVETET_UTESLUTNA av avsaknad, inte av aktivt val;
# se tackning.log.
#
# TÄCKNINGSFYND — SKILLNADER MOT WEBBSIDAN: KFN-regelverket (b) innehåller
# ett bidrag som INTE finns på den redaktionella webbsidan
# ("Arrangemangsstöd kulturföreningar" — troligen nytillkommet, ej ännu
# publicerat i sidträdet) — skrivet nedan per §2.1 (regelverket avgör
# täckning, inte redaktörens temp). Omvänt saknar KFN-regelverket tre
# bidrag som FINNS på webbsidan: "Städbidrag" (allmänt), "Städbidrag Täby
# Torg och Täby Park" (båda beskrivs på webbsidan som årsspecifika
# skräpplockningsprojekt "under 2026"/"under hösten 2026" — sannolikt
# återkommande kampanjer snarare än stående regelverksbidrag; loggat
# SKRIVET_EJ_I_REGELVERK) samt "Verksamhetsbidrag för funktionshinderförening"
# (egen sökväg och eget datum, vecka 2, distinkt från "Verksamhetsbidrag
# sociala insatser" vecka 4 — kan vara en äldre benämning som överlevt på
# webben men slagits ihop i det nya regelverket; ingen bekräftelse hittad
# åt något håll, skrivet med anteckning om osäkerheten).
#
# NAMNKONFLIKTER (§2.5 — webbsidan "Senast uppdaterad: 15 juni 2026" är
# nyare än regelverkets ModDate 2026-04-02, som är bästa tillgängliga
# datumproxy eftersom PDF:en saknar synligt revideringsdatum i brödtexten;
# nyare datum vinner => webbsidans namn/målgrupp behålls som primärvärde,
# regelverkets version dokumenteras i anteckning): "Arrangemangsstöd"
# (webb) vs "Arrangemangsbidrag" (regelverk, + explicit 6-månaders-
# ansökningsfrist som webben saknar helt); "Lokalbidrag" (webb) vs
# "Lokalbidrag till pensionärsföreningar och föreningar för personer med
# funktionsnedsättning" (regelverk, + explicit medlemströskel >25); "Stöd
# till kulturella insatser" (webb) vs "Verksamhetsbidrag kulturföreningar"
# (regelverk). STÖRSTA KONFLIKTEN: "Särskilt bidrag" beskrivs på webben
# som öppet för "alla bidragsberättigade föreningar", men regelverket
# avgränsar det uttryckligen till barn- och ungdomsföreningar som redan
# fått aktivitetsbidrag. Se konflikter.log och respektive anteckning —
# spot-checkas av Jacob/Fable före publik deploy, särskilt "Särskilt
# bidrag" som har en reell målgruppsskillnad, inte bara en namnskillnad.
#
# Dubbelhämtat i två oberoende pass — inga övriga avvikelser.
