    vad: "Bli godkänd/registrerad som bidragsberättigad förening"
    beskrivning: "Nya föreningar måste registrera sig som bidragsberättigad förening innan bidrag kan sökas. Alla ideella föreningar som bygger på demokratiska principer har rätt att söka bidrag; barn, ungdomar och personer med funktionsnedsättning är särskilt prioriterade grupper. Enligt riktlinje för föreningsbidrag (Dnr KS 2024/77-04, antagen av Kommunfullmäktige 2024-10-07) beviljas ALDRIG bidrag till partipolitiska, religiösa eller fackliga föreningar, skolidrottsföreningar, verksamhet som sammanfaller med kommunens egen verksamhet, eller föreningar med förfallna skulder hos Täby kommun, Skatteverket eller Kronofogden."
