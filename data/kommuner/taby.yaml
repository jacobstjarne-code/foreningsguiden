    anteckning: "NYTT I DENNA OMKÖRNING (§2.1) — finns i kultur- och fritidsnämndens bidragsregler (KFN 2025/84-50, senast ändrad 2026-04-02) men INTE på kommunens redaktionella bidragssida per 2026-07-21. Skrivet trots avsaknad på webben eftersom regelverket avgör täckning (§2.1). Ansökan görs löpande i Actor Smartbook och ska innehålla projektplan, budget samt underlag från senaste årsmöte. Redovisning (könsuppdelad deltagarstatistik + ekonomisk uppföljning) senast en månad efter genomfört arrangemang. Spot-checkas — kan vara så nytt att det ännu inte är sökbart i praktiken."
