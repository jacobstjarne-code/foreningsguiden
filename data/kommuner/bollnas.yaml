  # förekom varken på föreningsbidragssidan eller i Actor Smartbook ---
  - id: "bollnas-bidrag-enskild-vaghallning"
    namn: "Bidrag för enskild väghållning"
    kategori: ["ovrig"]
    malgrupp: "Väghållare för enskilda vägar i Bollnäs kommun: fastighetsägare (via utsett ombud), vägföreningar och vägsamfälligheter, samt väghållare av skogsbilvägar med allmänt intresse för friluftslivet"
    deadlines:
      typ: "fasta"
      datum: ["03-31"]
    krav:
      - "Statsbidragsberättigad väg, vägkategori A/B (fast boende): kommunalt bidrag med högst 20 % av statsbidragsgodkänd underhållskostnad"
      - "Statsbidragsberättigad väg, vägkategori C/D (genomfart/friluftsliv): kommunalt bidrag med högst 10 % av statsbidragsgodkänd underhållskostnad"
      - "Statsbidragsberättigad väg, vägkategori E/F (fritidsbebyggelse/näringsliv): inget kommunalt bidrag"
      - "Ej statsbidragsberättigad väg, minst 100 meter till permanent bebodd fastighet: 3,50 kr/meter väg, kräver skriftlig överenskommelse om fördelning och utsett ombud som mottagare"
      - "Vägbelysningsanläggning i enskild ägo: 160 kr/ljuspunkt och år i årligt drift- och underhållsbidrag"
      - "Byggande/upprustning av väg eller belysning: kommunalt bidrag 5–20 % av godkänd kostnad beroende på statsbidragsnivå, endast utfartsväg längre än 100 meter"
      - "Regn- och vindskydd vid busshållplats: 5 000 kr per vindskydd, kräver beviljat bygglov och tillstånd från väghållare"
      - "Skogsbilväg öppen för allmänheten, ej statsbidragsberättigad: 0,60 kr/meter, kräver fritidskontorets yttrande och skriftlig försäkran om att vägen hållits öppen för allmänheten"
      - "Väg med kommunalt bidrag får inte avstängas för trafik annat än under tjällossningsperiod"
    belopp: "Underhåll: högst 20 % (vägkategori A/B) eller 10 % (vägkategori C/D) av statsbidragsgodkänd kostnad; 3,50 kr/meter för ej statsbidragsberättigade vägar; 160 kr/ljuspunkt/år för vägbelysning. Byggande/upprustning: 5–20 % av godkänd kostnad beroende på statsbidragsnivå. Skogsbilväg: 0,60 kr/meter. Vindskydd vid busshållplats: 5 000 kr/st."
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://bollnas.se/download/18.5b9d7e311872c3a813f104b3/1680589413938/Bidrag%20f%C3%B6r%20enskild%20v%C3%A4gh%C3%A5llning%20.pdf"
    anteckning: "Regelverk antaget av Kommunfullmäktige 1994-12-12 § 171, Tekniska nämnden 1996-11-18 § 106 och Tekniska nämnden 2000-09-11 § 6, gäller bidrag utbetalda fr.o.m. 1997 (vindskydd fr.o.m. 2000) — ingen nyare version hittad, men detta är den PDF som länkas från kommunens aktuella sida om gator och vägar (2026). Kombinerar flera delregler (statsbidragsberättigade vägar, ej statsbidragsberättigade vägar, vägbelysning, byggande/upprustning, skogsbilvägar) i EN bidragsform snarare än separata, eftersom regelverket presenteras som ett enda dokument utan egna namngivna delbidrag på kommunens sida — jämför Halmstad där motsvarande vägbidrag var tre separat namngivna poster i ansökningsportalen. 31 mars-deadline gäller specifikt punkt A2 (ej statsbidragsberättigade vägar) och C (skogsbilvägar) — punkt A1 (statsbidragsberättigade vägar) betalas ut automatiskt efter redovisat beslut från Trafikverket/Vägverket, punkt B (byggande/upprustning) har ingen fast deadline utan ska sökas i god tid innan arbetet påbörjas. Bidragsbeloppens storlek fastställs årligen av tekniska nämnden inom ramen för anvisade medel. PDF:en lästes i fulltext, inte sammanfattad av tredje part."
