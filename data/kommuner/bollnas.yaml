# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md + v2.1 §2 —
# källkonvergens ersätter "kommunens redaktionella bidragssida = facit").
# Föregående version (verifierad 2026-07-19) rapporterades komplett med 9
# bidrag men saknade sex bidragsformer och uteslöt två felaktigt:
#
# 1. "Integrationsprojekt (§10-medel)" fanns redan på huvudsidans föreningsbidrag,
#    men uteslöts förra körningen med hänvisning till att källunderlaget var en
#    daterad PDF från 2022 och bara syntes i ett av två pass. Vid denna omkörning
#    bekräftat i två oberoende, fristående hämtningar av den nuvarande live-sidan,
#    med namngiven kontaktperson (Katarina Ahlström) — återinfört.
# 2. "Avtalsföreningar - kultur" uteslöts förra körningen med motiveringen "inte
#    en löpande sökbar post" (ansökningsfönstret för 2024–2027 stängde redan
#    2023-08-31). Detta är INTE ett godkänt uteslutningsskäl enligt §2.4 — det är
#    en genuin återkommande fyraårig bidragsform administrerad av kulturnämnden
#    (jämför Halmstads treåriga verksamhetsstöd inom kultur) — återinfört.
# 3. Tre bidrag under Arbråfonderna hittades via §2.1 punkt 5 (specialkategori
#    stiftelser/fonder), geografiskt avgränsade till f.d. Arbrå kommun/församling,
#    öppna för föreningar: Årligt verksamhetsbidrag, Bidrag till särskilda
#    projekt och utvecklingsarbete, samt Bidrag och stöd till äldre, sjuka och
#    funktionshindrade. Administreras via pappersblankett till Arbrå
#    Donationsråd — inte via Actor Smartbook. Saknades helt förra körningen.
# 4. "Bidrag för enskild väghållning" — kommunalt regelverk antaget av
#    Kommunfullmäktige 1994-12-12 § 171 samt Tekniska nämnden 1996/2000, hittat
#    via §2.1 punkt 5 (specialkategori väg/samfällighet). Länkas från kommunens
#    sida om gator och vägar, förekom inte på föreningsbidragssidan eller i
#    Actor Smartbook. PDF:en lästes i fulltext (ej sammanfattad av tredje part).
#    Saknades helt förra körningen.
# 5. "Årets förening" (hederspris, 15 000 kr) — se GRÄNSFALL-anteckning på
#    bidraget. Inkluderad efter avvägning mot §2.4:s tre uteslutningsskäl, av
#    vilka inget täcker "nomineringsbaserat pris utan egenansökan".
#
# Uteslutna med kategoriskt skäl (§2.4 — inte bara i kommentar, se även
# tackning.log):
# - Elitidrottspriset (privatperson/lag), Föreningsledarpriset (privatperson),
#   Kulturpriset (privatperson), Kulturstipendium (privatperson, 22 000 kr),
#   Hasselgårdstipendium (privatperson, jazzmusiker), Stipendium för körkort
#   (privatperson) — samtliga individuella pris/stipendier till privatperson.
#   https://bollnas.se/uppleva-och-gora/foreningar-foreningsliv/stod-bidrag-och-stipendier/priser-och-stipendier
# - Arbrå-Undersvik Vindkraftfond — administreras av fristående stiftelse med
#   egen styrelse (ordförande Katarina Wådell, sekr/kassör John-Erik Eriksson),
#   ansökan sker via egen extern domän (vindkraftfonden.se), inte bollnas.se.
#   https://bollnas.se/kommun-och-politik/stipendier-fonder-och-priser/fonder-och-stiftelser/arbra---undersvik-vindkraftfond
# - Sociala fonderna (Bollnäs Kommuns Sociala Stiftelse + Sven Hjelm
#   Donationsstiftelse) — ingen öppen ansökan för föreningar; medel fördelas av
#   kommunal kommitté/socialtjänst till behövande privatpersoner respektive
#   vårdinstitutioner efter internt underlag, inte efter förenings-ansökan.
#   https://bollnas.se/kommun-och-politik/stipendier-fonder-och-priser/fonder-och-stiftelser/sociala-fonderna
# - Anna Norlander-Palmérs donationsstiftelse, Ester och Ernst Linells
#   stipendiestiftelse, Stiftelsen Arbrå Jordägarefond, Syskonen Norlanders
#   donationsstiftelse, Arbråfondernas "Årets Arbråstipendium" och "Stipendier
#   för studerande" — samtliga uttryckligen riktade till privatpersoner
#   (bosättning/studier), ingen förenings-ingång hittad på respektive sida.
#   https://bollnas.se/kommun-och-politik/stipendier-fonder-och-priser/fonder-och-stiftelser
#
# EJ_EXTRAHERBAR: Actor Smartbook-portalen (bollnas.actorsmartbook.se/Grants/)
# är JS-renderad (template-platshållare {{grant.Name}} synliga i statisk HTML)
# — kunde inte räknas upp direkt, vilket bekräftar v2.1:s antagande att
# källkonvergens (regelverk + förvaltningssidor + självservice + special-
# kategorier) är den metod som faktiskt fungerar, inte portal-uppräkning.
#
# Täckning byggd genom: (1) regelverks-PDF för enskild väghållning (Kommun-
# fullmäktige/Tekniska nämnden), (2) huvudsidan för föreningsbidrag (Teknik-,
# service- och fritidsförvaltningen), (3) kulturenhetens avtalsföreningssida,
# (4) kommunens fonder-och-stiftelser-sida med samtliga sju under-stiftelser
# genomgångna individuellt, (5) prissidan, (6) självservice-sidan för
# föreningsadministratör (forutsattning), (7) riktad sökning väg/samfällighet
# och byalag/bygdegård (inget utöver anläggningsbidraget och vägbidraget
# hittades — "nolltaxa" diskuterad i lokaltidning som förslag, inte antaget,
# därför inte skriven som bidrag).
#
# Se tackning.log och konflikter.log för fullständig avstämning.
