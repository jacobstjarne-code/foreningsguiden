# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) hade en olöst trevägskonflikt om aktivitetsbidragets deadline
# (15/2+15/8 vs 25/2+25/8 vs 15/5) eftersom WebFetch bara fick ut
# navigeringsskalet på Motalas bidragssidor — samma blinda fläck som
# RESEARCH_SPEC_v2 §0 beskriver. Denna omgång användes curl + pdftotext för
# att läsa sidorna och regelverks-PDF:erna på riktigt.
#
# KONFLIKT LÖST: Motalas bildningsnämnd antog en NY reviderad version av
# "Riktlinjer för föreningsbidrag inom Verksamhet kultur och fritid" den
# 2026-01-21 (diarienummer BN-2025/00333), gällande från 2026-02-01 — bara
# fem och en halv månad före denna körning. PDF:ens Ansökningsdatum-tabell
# OCH den levande webbsidan (senast uppdaterad 2026-02-25, dvs efter
# regelverksrevideringen) anger båda entydigt: 25 februari, 25 augusti.
# Ingen av de tre tidigare kandidaterna (15/2+15/8, 15/5) förekommer i någon
# nu levande källa. Se motala-aktivitetsbidrag nedan.
#
# Metod denna omgång: (1) Sökte upp och läste regelverks-PDF:erna i sin
# helhet via pdftotext (inte bara WebFetch-sammanfattning som gav
# navigeringsskal): "Riktlinjer för föreningsbidrag inom Verksamhet kultur
# och fritid" (Bildningsnämnden, reviderad 2026-01-21), "Riktlinjer
# föreningsbidrag föreningar/organisationer som bedriver frivilligt arbete
# inom det sociala området" (Socialnämnden, 2024-09-18, § 109) samt
# "Riktlinjer föreningsbidrag – pensionärsföreningar och föreningar för
# personer med funktionsnedsättning" (Socialnämnden, 2024-09-18, § 108).
# (2) Läste varje förvaltningssida i sin helhet via curl+textextraktion
# (WebFetch trunkerade konsekvent till navigeringsskal på dessa sidor) —
# barn-och-ungdomsföreningar, kulturföreningar, sociala området,
# föreningsjubileum-och-idrottsprestationer, bidragsansökan-via-Interbook-go,
# föreningsregister, tillfällig övernattning. (3) Läste HTML-metadata
# (article:modified_time) för varje sida för att kunna avgöra källkonflikter
# enligt §2.5 (nyare vinner). (4) Sökte riktat efter specialkategorier
# (§2.1.5): vägföreningar/vägsamfälligheter (hittade automatiskt vägbidrag,
# ingen ansökan krävs), stiftelser/fonder (Motala förvaltar 7 fonder — samtliga
# riktade till privatpersoner, ingen öppen för föreningar, se uteslutning
# nedan), byalag/samhällsföreningar (hittade Bygdepeng, men uttryckligen
# undantagen av källan själv, se uteslutning), bygdegårdar/hembygdsföreningar
# (täcks av Årligt kulturbidrag, ingen separat bidragsform hittad),
# studieförbund (uttryckligen undantagna från BÅDA de granskade
# regelverken — ingen kommunal bidragsform för studieförbund finns i
# Motala). Ansökningsportalen Interbook go (ibgo.motala.se) är, liksom i
# Växjö/Halmstad/Karlstad, en Vue.js-SPA (JS-renderad, EJ_EXTRAHERBAR) —
# täckning byggd genom sidkonvergens, inte portalräkning.
#
# YTTERLIGARE KONFLIKTER LÖSTA/DOKUMENTERADE (§2.5, nyare vinner):
# - Driftsbidrag/Anläggningsbidrag samt Lokalbidrag: regelverkets
#   Ansökningsdatum-tabell (reviderad 2026-01-21) anger "30 april", men
#   webbsidan för barn- och ungdomsföreningar (senast uppdaterad
#   2026-02-25, dvs EFTER regelverksrevideringen) anger konsekvent
#   "Ansök senast 15 april" för båda. Webbsidans datum är nyare — 15 april
#   används. Se anteckning på respektive bidrag.
# - Föreningsbidrag inom det sociala området (frivilligt arbete): Social-
#   nämndens regelverk (beslutat 2024-09-18) anger "2 000 kr grundbelopp +
#   30 kr per medlem" utan tröskel. Webbsidan (senast uppdaterad
#   2025-03-13, nyare än regelverket) anger "2 000 kr + 20 kr per medlem,
#   gäller från medlem nummer 16". Webbsidans värde används, konflikten
#   noteras. Samma avvägning tillämpad på pensionärs-/funktionsrätts-
#   bidraget, vars eget regelverk (också 2024-09-18) anger samma "30 kr
#   utan tröskel"-formel.
#
# RÄTTELSE FRÅN FÖREGÅENDE VERSION: "Grundbidrag till barn- och
# ungdomsförening" (1 000 kr, automatiskt, deadline 15 april) fanns i
# föregående fil under fel förvaltning/kategori. Grundbidraget på 1 000
# kr existerar — men uteslutande för KULTURFÖRENINGAR (bekräftat i både
# regelverkets kulturdel och kulturföreningssidan), inte för barn- och
# ungdomsföreningar inom fritid. Ingen motsvarighet till ett automatiskt
# grundbidrag finns i vare sig regelverkets fritidsdel eller barn- och
# ungdomssidan. Rättat till motala-grundbidrag-kultur nedan (kategori
# kultur, inte idrott).
#
# NYA BIDRAG SOM SAKNADES HELT I FÖREGÅENDE VERSION (I_KALLA_EJ_SKRIVET
# åtgärdat): Driftsbidrag/Anläggningsbidrag (tabellbaserat, per
# anläggningstyp), Driftsbidrag för maskinpreparerade skidspår, Lokalbidrag,
# Kvalitativt verksamhetsbidrag (=Utvecklande verksamhetsbidrag),
# Föreningsbidrag för pensionärsföreningar och föreningar för personer med
# funktionsnedsättning (eget regelverk, eget diarienummer — helt separat
# bidrag från det generella sociala bidraget), Bidrag för lokaler och
# driftskostnader till träffpunkter för 65+, samt automatiskt Vägbidrag till
# vägsamfälligheter.
#
# UTESLUTNA (kategoriskt/metodiskt skäl, §2.3–§2.4):
# - "Kultur- och idrottsstipendier" (Motala kulturstipendium, musikstipendium,
#   utvecklingsstipendium, utbytesstipendium) — individuella pris/stipendier
#   till enskilda personer (t.ex. "Mattias Löw får årets kulturstipendium"),
#   inte föreningsbidrag. Jämför Halmstads uteslutning av Kulturstipendium.
#   https://www.motala.se/uppleva-och-gora/kultur-och-idrottsstipendier/
# - Samtliga 7 fonder på Motala kommuns fondsida (W och Anna Mathilda
#   Wernströms fond, Jungqvistska stiftelsens stipendiefond, August Wibergs
#   donationsfond, Anette Hoffstedts Minne, AP Anderssons och Stina-Maja
#   Carlsdotters donationsfond, Syskonen Carlssons stiftelse, Syskonen
#   Bengtssons donationsfond) — samtliga riktade uteslutande till
#   privatpersoner (studerande ungdomar, behövande äldre kvinnor, behövande
#   skolbarn, personer med Downs syndrom/funktionshinder). Ingen är öppen
#   för föreningar, till skillnad från Karlstad/Halmstad där minst en fond
#   var förenings-sökbar. Ingen samlad §2.7-post skriven eftersom ingen
#   kvalificerar.
#   https://www.motala.se/omsorg-och-hjalp/ekonomi-stod-och-radgivning/fonder/
# - "Bygdepeng till landsbygdsförening" (8 000 kr/år) — källan säger
#   uttryckligen: "Bygdepengen är inget föreningsbidrag, tvärtom är den till
#   för att underlätta samverkan mellan samtliga föreningar och boende i ett
#   område." Söks av en lokal utvecklingsgrupp (kan bestå av boende och/eller
#   föreningar tillsammans), inte av en enskild förening.
#   https://www.motala.se/stadsplanering-och-trafik/landsbygdsutveckling/bygdepeng-till-landsbygdsforening/
# - "Föreningsjubileum och idrottsprestationer" (uppvaktning vid 50/100/150-
#   årsjubileum samt vid SM-guld/EM-/VM-medalj: blommor, tårtcheck, diplom)
#   — inte ekonomiskt bidrag i egentlig mening, inget kronbelopp publicerat.
#   Jämför Karlstads uteslutning av Lokalt klimatkontrakt (icke-monetärt).
#   https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsjubileum-och-idrottsprestationer/
# - "Tillfällig övernattning" — rent brandskydds-/anmälningsförfarande för
#   övernattning i offentliga lokaler, ingen ekonomisk komponent alls.
# - Studieförbund — sökt riktat, uttryckligen undantagna som icke
#   bidragsberättigade i BÅDA granskade regelverk (fritid/kultur-PDF:en och
#   socialnämndens frivilligt-arbete-PDF). Ingen egen kommunal bidragsform
#   för studieförbund identifierad i Motala, till skillnad från Halmstad/
#   Karlstad/Växjö.
# - Vägföreningar/vägsamfälligheter: inget separat administrations- eller
#   investeringsbidrag hittat utöver det automatiska vägbidraget (se
#   motala-vagbidrag nedan) — till skillnad från Halmstad, som hade tre
#   distinkta vägbidragsformer.
#
# Dubbelhämtat i två oberoende pass (§3): samtliga sidor och PDF:er hämtade
# och lästa två gånger under körningen (curl-hämtning + separat
# textextraktions-/analyspass). Inga ytterligare fältkonflikter utöver de
# ovan dokumenterade. Spot-checkas av Jacob/Fable före publik deploy.
kommun: "Motala"
kommun_slug: "motala"
lan: "Östergötlands län"
befolkning: 43131
forvaltning: "Bildningsförvaltningen samt Socialförvaltningen"
ansokningssystem:
  namn: "Interbook Go"
  url: "https://ibgo.motala.se/"
kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/"
verifierad: 2026-07-20
bidrag:
  # --- BILDNINGSNÄMNDEN / KULTUR- OCH FRITIDSKONTORET: fritid (barn- och ungdomsverksamhet), via Interbook Go ---
  - id: "motala-aktivitetsbidrag"
    namn: "Aktivitetsbidrag"
    kategori: ["idrott", "ovrig"]
    malgrupp: "Bidragsberättigade föreningar, för sammankomster med deltagare i åldern 6–25 år som uppfyller villkoren för statligt lokalt aktivitetsstöd (LOK-stöd)"
    deadlines:
      typ: "fasta"
      datum: ["02-25", "08-25"]
    krav:
      - "Sammankomsten ska uppfylla villkoren för statligt lokalt aktivitetsstöd (LOK-stöd)"
      - "Högst 15 deltagare räknas per sammankomst, ledare i åldersgruppen kan räknas in"
      - "Verksamheten ska dokumenteras på närvarokort eller i digitalt närvarosystem vid varje sammankomst"
    belopp: "8 kronor per deltagare i åldern 6–25 år (max 15 deltagare per sammankomst). Dubbelt aktivitetsbidrag för grupper särskilt riktade till personer med funktionsnedsättning."
    sen_ansokan: "Sena ansökningar kan avslås; om årlig dokumentation saknas en månad efter sista ansökningsdatum kan ansökan avslås. Ansökan för fel verksamhets-/budgetår avslås helt (inga retroaktiva bidrag)."
    kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsbidrag-till-barn-och-ungdomsforeningar/"
    anteckning: "KONFLIKT LÖST vid denna omkörning (se filhuvud): föregående version hade en olöst trevägskonflikt (15/2+15/8, 25/2+25/8, 15/5). Både regelverket 'Riktlinjer för föreningsbidrag inom Verksamhet kultur och fritid' (reviderat av Bildningsnämnden 2026-01-21, gäller från 2026-02-01) och den levande webbsidan (senast uppdaterad 2026-02-25) anger entydigt 25 februari och 25 augusti. Ingen av de tidigare kandidatdatumen förekommer längre i någon källa."
  - id: "motala-driftsbidrag-anlaggning"
    namn: "Driftsbidrag / Anläggningsbidrag"
    kategori: ["idrott", "ovrig"]
    malgrupp: "Bidragsberättigade föreningar med egen anläggning som drivs i föreningens regi"
    deadlines:
      typ: "fasta"
      datum: ["04-15"]
    krav:
      - "Föreningen ska redovisa vilka anläggningar som sköts av föreningen"
      - "Bidrag för lokal ges antingen via lokalbidrag eller anläggningsbidrag, inte båda samtidigt"
      - "Föranmälan med motivering krävs för bidrag till nya orienteringskartor"
    belopp: "Fastställd tabell per anläggningstyp, t.ex. fotbollsplan huvudplan gräs 12 000 kr, fotbollsplan grus 2 200 kr, klubbstuga/omklädningsbyggnad (isolerad, uppvärmd) 70 kr/m², golfbana 18 hål 18 000 kr, elljusspår 1 400 kr/km — se riktlinjerna för fullständig tabell."
    sen_ansokan: "Sena ansökningar kan avslås; komplettering krävs inom den tidsram bidragsnormerna anger för respektive bidrag."
    kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsbidrag-till-barn-och-ungdomsforeningar/"
    anteckning: "KONFLIKT (§2.5): regelverkets Ansökningsdatum-tabell (reviderad 2026-01-21) anger '30 april' för Driftsbidrag. Webbsidan (senast uppdaterad 2026-02-25, nyare än regelverksrevideringen) anger konsekvent 'Ansök senast 15 april'. Webbsidans datum används eftersom den är nyare. SAKNADES I FÖREGÅENDE VERSION som egen bidragsform (fanns bara som ett odaterat 'anläggningsbidrag' som i själva verket motsvarade dagens Investeringsbidrag, se motala-investeringsbidrag)."
  - id: "motala-driftsbidrag-skidspar"
    namn: "Driftsbidrag för maskinpreparerade skidspår"
    kategori: ["idrott"]
    malgrupp: "Bidragsberättigade föreningar som maskinpreparerar skidspår som hålls öppna för allmänheten"
    deadlines:
      typ: "fasta"
      datum: ["05-15"]
    krav:
      - "Skidspåren ska hållas öppna för allmänheten"
      - "Kostnadsverifikationer ska bifogas ansökan"
      - "Ansökan gäller för avslutad säsong (retroaktivt)"
    belopp: "Högst 4 000 kronor per säsong, beroende på skidspårens omfattning och säsongslängd."
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsbidrag-till-barn-och-ungdomsforeningar/"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20. Egen deadline (15 maj, retroaktivt för avslutad säsong) skiljer sig från det generella driftsbidragets 15 april, därför skrivet som eget bidrag. I regelverkets anläggningstabell listas motsvarande post som 'Skötsel, skidspår: 4 000 kr'."
  - id: "motala-lokalbidrag"
    namn: "Lokalbidrag"
    kategori: ["idrott", "ovrig"]
    malgrupp: "Bidragsberättigade föreningar för egna eller hyrda lokaler inom kommunen"
    deadlines:
      typ: "fasta"
      datum: ["04-15"]
    krav:
      - "Kostnader för hyra, uppvärmning och el ska styrkas med kvitton"
      - "Ges inte till lokaler som tillfälligt nyttjas av föreningen, till lokaler där kommunen subventionerat hyran, eller till lokal som samtidigt erhåller anläggningsbidrag"
      - "Eventuella hyresintäkter från andrahandsuthyrning avräknas hyreskostnaden innan bidrag beräknas"
    belopp: "75 procent av styrkta kostnader för hyra, uppvärmning och el. Max 9 000 kronor/år (organisation med 15–150 medlemmar i åldern 7–20 år) eller max 10 000 kronor/år (151 medlemmar och däröver i åldern 7–20 år)."
    sen_ansokan: "Sena ansökningar kan avslås; komplettering krävs inom den tidsram bidragsnormerna anger för respektive bidrag."
    kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsbidrag-till-barn-och-ungdomsforeningar/"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20. Samma konflikt (§2.5) som Driftsbidrag/Anläggningsbidrag: regelverkets tabell anger 30 april, webbsidan (nyare, uppdaterad 2026-02-25) anger 15 april. Webbsidans datum används."
  - id: "motala-investeringsbidrag"
    namn: "Investerings- och underhållsbidrag"
    kategori: ["idrott", "ovrig"]
    malgrupp: "Bidragsberättigade barn- och ungdomsföreningar med egen anläggning"
    deadlines:
      typ: "fasta"
      datum: ["10-31"]
    krav:
      - "Avser kostnader för investeringar, reparationer och förbättringar av egen anläggning, samt inköp av inventarier eller annan utrustning"
      - "Prövas av bildningsnämnden"
      - "Investeringar som främjar miljöförbättring/energieffektivitet samt egen insats av föreningen prioriteras"
    belopp: null
    sen_ansokan: "Sena ansökningar kan avslås; komplettering krävs inom den tidsram bidragsnormerna anger för respektive bidrag."
    kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsbidrag-till-barn-och-ungdomsforeningar/"
    anteckning: "Deadline (31 oktober) bekräftad identisk i både regelverket (reviderat 2026-01-21) och webbsidan — ingen konflikt. Akuta/oförutsedda behov kan hanteras löpande under året efter dialog med kommunens fritidsstrateg. Motsvarar det som i föregående version felaktigt kallades 'anläggningsbidrag' (id motala-anlaggningsbidrag) — regelverket kallar detta 'Investeringsbidrag'; namnet i denna fil är justerat för att matcha källans egen terminologi ('Investerings- och underhållsbidrag' på webbsidan)."
  - id: "motala-kvalitativt-verksamhetsbidrag"
    namn: "Kvalitativt verksamhetsbidrag (utvecklande verksamhetsbidrag)"
    kategori: ["idrott", "ovrig"]
    malgrupp: "Bidragsberättigade föreningar som planerar verksamhet för ökad inkludering, ökad jämställdhet, eller förbättrad folkhälsa"
    deadlines:
      typ: "lopande"
      datum: []
    krav:
      - "Planerad verksamhet ska höra till minst ett av områdena: ökad inkludering, ökad jämställdhet, eller förbättrad folkhälsa"
      - "Ansökan sker genom dialog mellan föreningen och fritidskontoret"
      - "Återrapportering krävs efter genomförd verksamhet (hur pengarna använts, resultat, vägen framåt)"
    belopp: null
    sen_ansokan: "Ej angivet i källan (dialogbaserad ansökan utan fast deadline)"
    kalla_url: "https://www.motala.se/uppleva-och-gora/foreningar-och-foreningsbidrag/foreningsbidrag-till-barn-och-ungdomsforeningar/"
    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20. Kallas 'Kvalitativt verksamhetsbidrag' i regelverkets löptext men 'Utvecklande verksamhetsbidrag' i regelverkets egen Ansökningsdatum-tabell och i Interbook Go-vägledningen — samma bidrag, terminologin varierar inom källorna själva."

