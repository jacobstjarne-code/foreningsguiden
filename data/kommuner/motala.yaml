    vad: "Uppfylla grundkraven som bidragsberättigad förening (fritid/kultur, Bildningsnämnden)"
    beskrivning: "Föreningen ska vara demokratiskt uppbyggd med av årsmöte antagna stadgar, vald styrelse och valda revisorer. Av stadgarna ska det framgå att alla som instämmer i föreningens målsättning äger rätt till medlemskap och deltagande i verksamheten. Föreningen ska ha varit verksam i minst ett år och ha minst fem medlemmar i åldern 6–25 år (undantag kan prövas), en majoritet av aktiva medlemmar bör vara mantalsskrivna i Motala kommun. Föreningen åläggs att begära in och granska begränsat registerutdrag ur belastningsregistret för ledare som arbetar med barn och ungdomar, i 2-årsintervaller. Föreningen ska årligen inlämna signerat årsmötesprotokoll, verksamhetsberättelse, ekonomisk årsredovisning och signerad revisionsberättelse i Interbook Go. Skolföreningar (utom skolidrottsföreningar anslutna till Svenska Skolidrottsförbundet), studieförbund, politiska organisationer, ekonomiska föreningar samt fackliga organisationer är undantagna."
