# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) rapporterades DELVIS med bara 2 bidrag, med motiveringen att
# kommunens detaljsidor ("Föreningsbidrag från kommunen" och "Allmänna
# villkor och förutsättningar") gav 404 trots att de är Google-indexerade.
# Denna körning bekräftar att de sidorna FORTFARANDE ger 404 (verifierat på
# nytt, samma två URL:er) — men löser täckningen genom källkonvergens
# istället för att stanna vid den enskilda döda länken.
#
# Metod och fynd:
# (1) REGELVERKET. Sökte efter det nya antagna regelverket från reformen
# (1 januari/1 april 2026) och hittade det i sin helhet — inte som fristående
# PDF, utan som Bilaga 2 ("Kultur och fritidsnämndens ekonomiska bidrag till
# civilsamhällesorganisationer — Bestämmelser") till en tjänsteskrivelse
# (Dnr KFN/2025:272) i Kultur- och fritidsnämndens kallelse till samman-
# trädet 2025-12-16 (233 sidor, hämtad och lästa i sin helhet via curl +
# pdftotext). Kallelsen visar att nämnden samtidigt beslutade upphäva fyra
# äldre styrdokument: "Bestämmelser för föreningsbidrag" (2022-11-23),
# "Bestämmelser för ekonomiskt stöd till studieförbunden" (2023-09-28),
# "Bestämmelser om bidrag till Friluftsliv" (2022-11-23) och "Kriterier för
# stöd till stiftelsedrivna museer" (2020-11-06) — alla fyra är nu
# INTEGRERADE i det enhetliga regelverkets sju kategorier (studieförbund
# under arrangemangs-/utvecklings-/kompetensbidrag, friluftsliv under
# lokal- och driftsbidragets "Driftbidrag friluftsområde", museistiftelser
# under verksamhetsbidraget). Det förklarar varför ingen av dessa syns som
# egna bidrag i denna fil — de existerar, men som inriktningar inom de sju
# kategorierna, inte som egna poster. Exakt paragrafnummer för nämndens
# beslut 2025-12-16 kunde inte oberoende bekräftas (kallelsen visar
# FÖRSLAGET till beslut, inte det justerade protokollet) — men att
# bestämmelserna faktiskt trädde i kraft 2026-01-01 är bekräftat via
# kommunens nyhetsartikel samma datum och den nu levande bidragssidan.
# En andra nämndbehandling ("Revidering av ekonomiska bidrag till
# civilsamhällesorganisationer") stod som första ärende på kallelsen till
# sammanträdet 2026-03-12, vilket sammanfaller med att reviderade
# bestämmelser trädde i kraft 1 april 2026 (bekräftat via kommunens
# nyhetsartikel 2026-04-01). Kallelse/protokoll för just 2026-03-12-mötet
# gick inte att hitta via sökmotor eller kommunens (JS-renderade)
# kallelse-och-protokoll-sida — men det är inte ett hinder: det aktuella,
# levande regelverkets INNEHÅLL (efter april-revideringen) är direkt
# extraherat från kommunens nuvarande, publicerade och extraherbara
# översiktssida (se punkt 2), som per definition är den mest aktuella
# källan (§2.5, nyare datum vinner).
# (2) FÖRVALTNINGENS EGEN SIDA. Huvudsidan
# uppleva-och-gora/.../bidrag-stod-och-stipendier.html gav 200 och var FULLT
# extraherbar (statisk HTML, inte JS-renderad) — till skillnad från
# föregående körning användes den nu som primär detaljkälla, eftersom den
# innehåller alla åtta bidragskategoriers fullständiga faktarutor, villkor,
# poängsystem och (för lokal- och driftsbidraget) en komplett belopps-
# tabell. Sidan är publicerad 2026-07-02 och uppges uttryckligen gälla
# "från och med den 1 januari 2026 ... reviderad den 1 april 2026" — det är
# alltså den mest aktuella sammanställningen som finns, nyare än december-
# kallelsens regelverksbilaga. DUBBELVERIFIERING AV RISKOMRÅDET: den exakta
# belopps-/procenttabellen för lokal- och driftsbidraget (som
# RESEARCH_SPEC_v2.md §3 pekar ut som platsen där en trolig hallucination
# fångades i en tidigare Uddevalla-körning) hämtades och extraherades två
# gånger, oberoende, ur två helt olika dokument: december-kallelsens
# regelverksbilaga (pdftotext) och den nu levande webbsidan (egen HTML-
# strippning). Samtliga siffror är identiska mellan de två källorna, med
# ETT tillägg i webbsidans nyare version — schablonraden "Badplatser eget
# ansvar: 2 500 kr/st" — som saknas i decemberversionen men som exakt
# matchar april-nyhetsartikelns text om att "badplatser fick ett
# schabloniserat driftbidrag om 2 500 kronor per badplats". Det är alltså
# en bekräftad TILLÄGGD rad från aprilrevideringen, inte en konflikt.
# (3) SJÄLVSERVICE/E-TJÄNSTER. sjalvservice.uddevalla.se är, till skillnad
# från Rbok, INTE JS-renderad — indexsidan (/oversikt) listar samtliga
# e-tjänster inklusive "Ansökan om Giraffstöd", "Sponsring, ansökan" och
# "Ansökan om utvecklingsmedel för folkhälsa". Den sistnämnda visade sig
# vid närmare läsning vara stängd för föreningar (se MEDVETET_UTESLUTET).
# (4) ANSÖKNINGSPORTALEN (Rbok). uddevalla.rbok.se gav 200 men är en ren
# JS-app (27 synliga textrader, "Var god vänta...", inget bidragsinnehåll
# extraherbart via curl) — EJ_EXTRAHERBAR, som väntat enligt v2.1.
# (5) SPECIALKATEGORIER (§2.1.5): väg/samfälligheter SÖKT MEN EJ HITTAT —
# kommunens enda sida om ämnet (trafik-och-resor/.../vagsamfalligheter-.html)
# beskriver bara hur en gemensamhetsanläggning bildas, ingen kommunal
# bidragsform till väghållare hittades. Bygdegårdar/hembygdsföreningar
# TÄCKS inom lokal- och driftsbidragets kategori "Kultur, samlingslokaler
# och hembygdsföreningar" (65 %, 100 000 kr) — ingen egen post behövs.
# Stiftelser/fonder: kommunens fullständiga lista
# (omsorg-och-hjalp/.../stipendier-och-fonder-.html) granskades post för
# post, se nedan. Byalag/samhällsföreningar: ingen egen bidragsform utöver
# de generella civilsamhällesorganisationskategorierna hittades. Studie-
# förbund: se punkt (1) — integrerat, inte eget bidrag.
#
# STIFTELSER GRANSKADE (8 st, kommunens fullständiga lista):
# - Stiftelsen Barnens Dag i Uddevalla — INKLUDERAD. Sidan säger uttryck-
#   ligen "Även föreningar, skolor och andra sammanslutningar kan söka."
# - Thordenstiftelsen — INKLUDERAD. "Thordenstiftelsen stödjer främst
#   föreningslivet med bidrag i Bohuslän."
# - Gustafsbergsstiftelsen, Max Albin Dahlgrens stipendiefond, Otto
#   Hedströms stiftelse, Stiftelsen Barnhemmets vänner, Stiftelsen Hemmet
#   för Gamla och Sjuka — UTESLUTNA, samtliga uttryckligen riktade till
#   enskilda privatpersoner (studerande ungdomar, enskilda markägare,
#   studerande flickor, långvarigt sjuka/handikappade individer). §2.4.
# - Stiftelsen Samfond nr 6 — UTESLUTEN som gränsfall: riktar sig till
#   "Behövande inom förutvarande Skredsviks socken", vilket språkligt pekar
#   mot enskilda nödställda snarare än föreningar, och sidan nämner ingen
#   förening som möjlig sökande. Inte lika entydigt uteslutet som de fyra
#   ovan — flaggas för Fables granskning.
#   https://www.uddevalla.se/omsorg-och-hjalp/ekonomi-och-pengar/stipendier-och-fonder-/stiftelsen-samfond-nr-6.html
#
# MEDVETET UTESLUTET (övrigt, §2.4):
# - Utvecklingsmedel för folkhälsa — kategoriskt uteslutet: sidan säger
#   uttryckligen "Kommunens förvaltningar och verksamheter kan ansöka om
#   medel", dvs. bara kommunens EGNA enheter, inte föreningar/civilsamhälle.
#   https://www.uddevalla.se/omsorg-och-hjalp/folkhalsoarbete/utvecklingsmedel-for-folkhalsa.html
# - "Game Changer" — nämns i kallelsens bakgrundsbilaga och i en sökträff om
#   nämndens arbete 2025 ("två Game Changer-processer med totalt 50
#   deltagare") som en workshop-metod för att utveckla nya aktivitets-
#   former tillsammans med unga och föreningsliv — men ingen publik
#   ansökningssida eller käll-URL för ett sökbart bidrag hittades. Bedöms
#   som en intern arbetsmetod, inte ett sökbart föreningsbidrag. EJ_SKRIVET,
#   bör dubbelkollas av Fable om en ansökningsväg dyker upp.
# - Bidragskollen — ett matchningsverktyg/filter för att hitta RÄTT bidrag
#   bland de åtta kategorierna, inte ett eget bidrag.
#
# TIDIGARE VERSIONENS PLACEHOLDER-ANTECKNINGAR: föregående körnings
# osäkerhet kring lokal- och driftsbidragets beloppstak och de exakta
# ansökningsperioderna är nu löst i sak (se punkt 2 ovan) — de exakta
# datumen för VARJE periods öppning saknas dock fortfarande på kommunens
# sida för flera kategorier (bara en av två perioder är oftast publicerad);
# detta är INTE samma brist som föregående körnings 404-problem, utan en
# genuin lucka i vad kommunen själv publicerat utanför Rbok, och hanteras
# per bidrag nedan med typ: lopande + anteckning i stället för påhittade
# datum (§4).
#
# Befolkning: 56 744 per 2025-12-31, hämtat direkt från kommunens egen sida
# (kommun-och-politik/kommunfakta/befolkning-arbete-byggande.html),
# oförändrat mot föregående körning. En extern källa (Wikipedia, med
# hänvisning till SCB:s kvartalssiffra 2026-03-31) anger 56 698 — nyare
# mätdatum, men INTE kommunens egen domän (§4 kräver kommunens egen domän
# som källa) och därför inte använt för att skriva över det kommun-
# publicerade värdet. Ingen formell §2.5-konflikt loggad, eftersom Wikipedia
# faller utanför källkretsen — men avvikelsen noteras här för transparens.
#
# Dubbelhämtat i två oberoende pass (§3): den fullständiga bidragssidan
# (bidrag-stod-och-stipendier.html) samt december-kallelsens regelverks-
# bilaga hämtades och lästes två gånger via oberoende metoder (WebFetch-
# sammanfattning + egen curl/pdftotext-extraktion av råtext). Inga
# fältkonflikter identifierade utöver den redan förklarade Badplatser-
# tilläggsraden. Spot-checkas av Jacob/Fable före publik deploy.
