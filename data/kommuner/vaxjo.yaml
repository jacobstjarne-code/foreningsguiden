# Källa: omkörning 2026-07-20 mot RESEARCH_SPEC_v2.md §2 (Fables stickprov
# hittade en täckningslucka i tidigare version — åtta publicerade bidrag
# uteslöts uttryckligen "för att hålla filen hanterbar", vilket v2 §2.3 inte
# tillåter som skäl). Denna version är hämtad och strukturerad i två
# oberoende pass (§3). Portalen vaxjo.rbok.se är JS-renderad och exponerar
# ingen statisk, enumererbar bidragslista (bekräftat via två separata
# hämtningsförsök) — täckningsfacit är därför byggt genom konvergens mellan
# fyra oberoende kommunala källor: (1) kommunens huvudöversikt
# stod-och-bidrag-till-fritids--och-kulturforeningar.html, (2) kommunens
# äldre bidragsträd sok-stod-till-foreningar.html med sju undersidor, (3)
# tre nyligen antagna regelverks-PDF:er ("REGELVERK OCH STÖDFORMER",
# antagna av Kommunstyrelsen/Kultur- och fritidsnämnden/Omsorgsnämnden,
# daterade 2025-06-19), samt (4) riktad sökning efter stiftelser,
# vägföreningar/samfälligheter och trossamfund (ingen kommunal
# föreningsbidrag hittades för väg-/samfällighetsföreningar i Växjö;
# trossamfund är uttryckligen undantagna i regelverket). Alla åtta tidigare
# uteslutna bidrag (driftsstöd, utbildningsstöd, investeringsstöd,
# projektstöd, stöd till nybildad förening, stöd till samhällsuppdrag,
# stort evenemangsstöd, hyresstöd för pensionärs-/funktionsrättsföreningar)
# är verifierade som faktiska, sökbara föreningsbidrag och ingår nu nedan.
# Varje deadline är individuellt verifierad mot sin egen sida/sektion — de
# upprepade 04-01-datumen (11 av 27 bidrag) är en genuin egenskap i källan:
# flertalet av Kultur- och fritidsnämndens samt Omsorgsnämndens bidrag
# rapporteras retroaktivt "senast 3 månader efter avslutat verksamhetsår",
# vilket för kalenderårsföreningar sammanfaller på 1 april. Övriga bidrag
# har egna, avvikande datum (10-01, 10-31→10-01, 03-31, 04-30, löpande) —
# se enskilda bidrag för detaljer.
#
# KONFLIKT OLÖST (§3): "Driftstöd till allmän samlingslokal" anges med två
# olika kronor/kvm-nivåer i två källor (kommunens bidragssida: 250/400/600
# kr/kvm; Kommunstyrelsens antagna regelverk 2025-06-19: 175/280/420
# kr/kvm). belopp är satt till null. Se anteckning på bidraget.
