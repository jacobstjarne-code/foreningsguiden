    anteckning: "Formellt en affärsmässig sponsringsrelation, inte ett bidrag i traditionell mening — kommunens egna riktlinjer skiljer uttryckligen sponsring från föreningsbidrag. Ansökan ska vara utvecklingsutskottet tillhanda sista februari; beslut fattas av kommunstyrelsen under april. Avtalstid längst innevarande budgetår. Totalt sponsringsutrymme fastställs i kommunstyrelsens årsbudget — inget fast belopp per förening publicerat."
