# Källa verifierad 2026-07-20 mot huddinge.se, regelverket HKF 8020 (antaget av
# kommunfullmäktige 1992-12-09, senast ändrat 2019-05-13) och kommunens
# bidragssidor (huvudsidan "Bidrag till föreningar och studieförbund" uppdaterad
# 2026-02-19 enligt sidan själv). Källkonvergens (RESEARCH_SPEC_v2 §2): täckning
# fastställd genom regelverket HKF 8020 + kultur- och fritidsförvaltningens
# bidragssida + separata sidor för funktionsnedsättning/social och miljö.
# Ansökningsportalen (Actor Smartbook, huddinge.actorsmartbook.se) är inte
# maskinläsbar för uppräkning (JS-renderad) — täckning bygger på regelverk +
# redaktionella sidor, se tackning.log-avsnittet nedan.
#
# KONFLIKTER (§2.5, nyare källa vinner — webbsidan 2026-02-19 > HKF 8020 2019-05-13):
# - "Bidrag till arrangemang": HKF 8020 §6.1 anger löpande ansökan (senast två
#   månader innan arrangemanget). Webbsidan (nyare) anger fyra fasta datum
#   (1 feb/1 maj/1 sep/1 dec). Webbsidans datum använda.
# - "Bidrag till fritidsaktiviteter för personer med funktionsnedsättning"
#   (kultur- och fritidsnämndens variant): HKF 8020 §6.3 anger 15 december och
#   30 maj. Webbsidan (nyare) anger fyra fasta datum. Webbsidans datum använda.
# - "Bidrag till lokaler för öppen kulturverksamhet": HKF 8020 §7.4 ("Bidrag
#   till lokaler för kulturverksamhet") anger upp till 100 % av kostnaden,
#   deadline 1 december. Webbsidan (nyare) anger 65 % / högst 60 000 kr,
#   deadline 1 februari. Webbsidans värden använda.
# - "Hyresersättningsbidrag": HKF 8020 §3.2 anger upp till 100 % av kostnaden,
#   deadline 15 februari. Webbsidan (nyare) anger 65 % / högst 60 000 kr,
#   deadline 1 februari. Webbsidans värden använda.
#
# SKRIVET_EJ_I_REGELVERK: "Utvecklingsbidrag" och "Lovbidrag" finns på
# webbsidan men har inte identiska namn i HKF 8020 (närmast §3.3 Projektbidrag/
# särskilda ungdomssatsningar, som troligen bytt namn efter 2019 utan att
# regelverket uppdaterats). "Föreningsbidrag för miljöförbättrande insatser"
# saknar helt motsvarighet i HKF 8020 — ingen egen HKF hittad för detta bidrag.
#
# BEKRÄFTADE ENDAST I REGELVERKET (ingen egen webbsida hittad 2026-07-20, men
# giltiga enligt HKF 8020 källa 1): Vänortsutbyte (§7.5), Verksamhetsbidrag
# Kommunstyrelsen (§7.1), Bidrag för särskilda åtgärder (§7.2), generellt
# Startbidrag via Kommunstyrelsen (§7.6).
#
# MEDVETET UTESLUTET (§2.4 — individuella priser/stipendier, inte
# föreningsbidrag för verksamhet): Demokratipriset, Miljöpriset, Karin Boyes
# litterära pris, Kulturpriset, Idrottspriset, Pris för ideella insatser,
# Stipendium för unga talanger, Årets pedagog, Socialtjänstens kvalitetspriser,
# Huddinges arkitekturpris (alla på huddinge.se/organisation-och-styrning/
# sa-arbetar-vi-med/stipendier-och-priser). Föreningscenter (kontorsservice på
# huvudbiblioteket) uteslutet — det är en tjänst/lokal, inte ett bidrag.
# Externa bidrag (Arvsfonden, Idrottslyftet, Kulturrådet, MUCF) uteslutna —
# annan huvudman än kommunen.
#
# EJ HITTADE (specialkategorier, RESEARCH_SPEC_v2 §2.1 punkt 5): inget bidrag
# till vägföreningar/vägsamfälligheter hittat för Huddinge (sökning gav inga
# träffar på huddinge.se, endast externa samfällighetsguider). Inget separat
# bygdegårdsbidrag hittat (Stortorps bygdegård är en kommunal anläggning, inte
# ett föreningsbidrag). Inga kommunala stiftelser för föreningar hittade.
# Studieförbund har egna bidragsformer (grundbidrag/arrangemangsbidrag/
# projektbidrag/fritidsaktiviteter funktionsnedsättning), skrivna som fyra
# separata bidrag nedan. Kommunen publicerar inga belopp eller specifika
# deadlines för dessa — deadlines.typ satt till "lopande" med anteckning,
# aldrig ett gissat datum (§4).
