# Källa verifierad 2026-07-23 mot alingsas.se — källkonvergens enligt v2.1 §2.
# Regelverk (bäst källa): "Kultur- och utbildningsnämndens regler och
# riktlinjer för föreningsbidrag" (KUN 2024.040, PDF, municipio.alingsas.se,
# uppladdad 2025-11), som listar sju bidragstyper + ett separat pensionärs-
# bidragsavsnitt. En äldre version av samma dokument (2024/05-URL) gav 404 —
# CMS-migrerad till 2025/11-URL, inte försvunnen (RESEARCH_SPEC §2.1 fälla).
# PDF:ens "Datum för beslut"-fält är ifyllt med mallens platshållare
# "ÅÅÅ-MM-DD" i den publicerade filen — sannolikt ett redaktionellt
# förbiseende hos kommunen, dokumentet är ändå det live-länkade regelverket.
#
# Regelverket täcker Kultur- och utbildningsnämndens sju bidragstyper +
# pensionärsbidrag (övertaget från Vård- och omsorgsnämnden genom KF-beslut
# 2024-03-27 § 35). Specialkategorier utanför detta regelverk sökta aktivt
# och bekräftade som egna, dokumenterade stöd: investeringsbidrag och
# sponsring (båda Kommunstyrelsen, egna antagna riktlinjer), bidrag till
# våldsutsatta (Socialnämnden, egen riktlinje SN 2026.017 antagen
# 2026-03-17), samt ordinarie och utökat vägbidrag (Trafik- och
# parkenheten/Samhällsbyggnad). Stiftelser/stipendier (skolfond, samfond,
# gymnasiefond, Lendahl, Trolle Lindgren) kontrollerade och uteslutna —
# samtliga är riktade till enskilda elever/privatpersoner, ingen kan sökas
# av en förening (§2.4). Ansökningssystemet Actor SmartBook
# (alingsas.actorsmartbook.se) är inloggningskrävande och JS-renderat —
# EJ_EXTRAHERBAR, se tackning.log. "Årets idrottsprestation" är ett
# individuellt pris (idrottare, ej förening) — medvetet uteslutet.
# "Projektbidrag" och "Folkhälso- och miljöbidrag" beskrivs som EN bidragstyp
# i regelverket ("Projektbidrag samt folkhälso- och miljöbidrag") trots att
# webbsidans rubriker antyder två separata bidrag — sammanslagna till en rad
# här, se tackning.log. Startbidrag (max 10 000 kr) är administrativt en del
# av samma bidragspott men behålls som egen rad eftersom det har egen
# målgrupp (nystartade föreningar) och egen webbrubrik, i linje med praxis i
# övriga kommun-YAML i denna batch (t.ex. Södertälje, Kalix, Sigtuna).
# Spot-checkas av Jacob före publik deploy.
