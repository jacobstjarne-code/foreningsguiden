    vad: "Bli stödberättigad förening (godkänd Sundbybergsförening) hos kultur- och fritidsnämnden"
    beskrivning: "Föreningen registrerar sig hos kultur- och fritidssektorn och skickar in stadgar och verksamhetshandlingar. Sektorn bedömer om föreningen uppfyller grundkraven (demokratisk uppbyggnad, öppen för alla att bli medlem, ideellt engagemang, verksamhet i Sundbyberg) samt tilläggskravet att minst 50 % av de aktiva medlemmarna ska vara bosatta i Sundbyberg, eller att den största medlemsgruppen är bosatt i Sundbyberg (undantag finns för avtalsföreningar, funktionsrättsföreningar och föreningar med stort regionalt upptagningsområde). Politiska partier, ekonomiska föreningar, stiftelser, företagsföreningar, riksförbund utan lokalavdelning i Sundbyberg och studieförbund kan inte bli stödberättigade föreningar (studieförbund har i stället rätt att söka det egna studieförbundsbidraget)."
