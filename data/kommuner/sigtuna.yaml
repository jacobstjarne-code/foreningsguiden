# Källa verifierad 2026-07-21 mot sigtuna.se, källkonvergens enligt RESEARCH_SPEC_v2
# §2: regelverk (SN/2024:19-PDF:erna för socialnämnden) + förvaltningarnas egna sidor
# (kultur-och-fritid, individ-och-familjeomsorg, vård-och-omsorg) + specialkategori-sök
# (landsbygdsutveckling, fonder/stiftelser, väg, bygdegårdar, studieförbund, byalag).
# Fullständig täckningsavstämning i tackning.log, konfliktbedömning i konflikter.log
# (repo-rot). Två kända EJ_EXTRAHERBAR-luckor: "Bidrag till sverigefinska projekt"
# (sidan gick aldrig att hämta med 200-svar trots 5 försök, innehåll bara känt via
# sökträffsutdrag — utelämnad, kandidat för nästa körning) och kultur- och
# fritidsnämndens egen bidragsregel-PDF (beställs via e-post, ej publicerad på webben).
# Sigtuna.se har två parallella URL-mönster i drift (trolig migrationsfas), vilket gav
# intermittenta 404 på annars fungerande sidor — se anmärkning i tackning.log.
# Spot-checkas av Jacob före publik deploy (leveransordning steg 4).
