forutsattningar:
  - id: "varberg-bidragsberattigad-forening"
    vad: "Vara registrerad och verksam förening i Varbergs kommun"
    beskrivning: "Föreningen ska vara registrerad och verksam i Varbergs kommun, med verksamhet som huvudsakligen bedrivs inom kommunen. Verksamheten ska vara till nytta för allmänheten och bedrivas utan ekonomisk vinning för medlemmarna, vila på en värdegrund om allas lika värde och respektera demokratins principer. Medlemmarna ska betala en rimlig medlemsavgift. Registrering sker i föreningssystemet Interbook Go. Gäller kultur- och fritidsnämndens bidrag (idrott, fritid, kultur, studieförbund) — socialförvaltningens, väg-, och landsbygdsbidragen har egna separata registrerings-/ansökningsvägar (se respektive bidrags anteckning)."
    system: "Interbook Go"
    ledtid: null
    ledtid_text: null
    giltighet: "Kräver årlig uppdatering av uppgifter i föreningsregistret samt inlämning av årsmöteshandlingar"
