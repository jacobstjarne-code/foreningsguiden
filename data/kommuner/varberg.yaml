# KORRIGERANDE OMKÖRNING 2026-07-21 mot RESEARCH_SPEC_v2.md / v2.1 §2
# (källkonvergens). Föregående version (2026-07-19, v1-metod) hade 15 bidrag
# och missade att "Föreningsbidrag för verksamhet inom idrotts- och
# fritidsområdet" är EN URL med FYRA distinkta bidrag (bara LOK-stödet var
# extraherat) samt att "Bidrag för lokaler och anläggningar" har en femte
# systerbidragskategori (Bidrag till RF Sisu Halland) på samma sida.
#
# Facit byggt via §2.1-konvergens: (1) regelverket "Riktlinje för kommunala
# bidrag inom kultur- och fritidsnämndens område" (Kommunfullmäktige,
# 2024-11-12 § 136, KS 2024/0703) — hämtat som PDF och läst i sin helhet
# (22 sidor), enda uttömmande förteckningen över kultur-/fritidsnämndens
# bidrag. (2) Förvaltningarnas egna sidor genomsökta specifikt utanför
# kultur-/fritidsspåret: Hamn- och gatuförvaltningen (enskilda vägar —
# TRÄFF, tre distinkta bidrag helt utanför kultur-/fritidsträdet) och
# landsbygdsutveckling/samhällsutveckling (Byapengen, Landsbygdschecken,
# Mötesplatser — TRÄFF, tre bidrag helt utanför kultur-/fritidsträdet).
# Socialförvaltningen sökt riktat (TRÄFF, ett bidrag, redan känt sedan
# tidigare körning). (3) självservice: sjalvservice.varberg.se genomsökt
# för socialförvaltningens föreningsbidrag, Byapengen och Landsbygdschecken.
# (4) portalen (varberg.ibgo.se, Interbook Go) bekräftat EJ_EXTRAHERBAR —
# JS-renderad, visar bara "- Interbook" utan inloggning, samma mönster som
# Rbok/FRI/Smartbook i tidigare omkörningar. (5) specialkategorier sökta
# riktat: väg/samfällighet — TRÄFF (tre bidrag, Hamn- och
# gatuförvaltningen); bygdegårdar/samlingslokaler — täcks redan av
# "Bidrag till samlingslokaler och bygdegårdar"; stiftelser/fonder —
# Sparbanksstiftelsen Varberg identifierad men MEDVETET_UTESLUTET (annan
# huvudman, oberoende sparbanksstiftelse, ej kommunal); Socialnämndens
# fonder identifierad men MEDVETET_UTESLUTET (riktar sig i första hand till
# enskilda behövande privatpersoner, föreningar kan bara i andra hand
# tilldelas och bara om föreningens ändamål är att hjälpa behövande);
# byalag/samhällsförening — TRÄFF (Byapengen); studieförbund — täcks redan
# av "Stöd till studieförbund".
#
# SJÄLVKORRIGERING: "Verksamhetsstöd till det fria kulturlivet" var
# felaktigt MEDVETET_UTESLUTET i föregående körning (2026-07-19) med
# motiveringen "riktar sig till professionella enskilda kulturutövare/bolag
# med F-skattsedel, inte föreningar". Regelverket (§5) anger dock
# uttryckligen att sökande "ska ha en juridisk person eller organisation
# som huvudman... En juridisk person kan vara en ideell eller ekonomisk
# förening, stiftelse eller bolag" — en ideell förening är alltså en
# uttryckligt godkänd sökandeform. §2.4(b) ("stöd som ENDAST riktas till
# företag eller privatpersoner") gäller därmed inte. Bidraget är återinfört
# i denna körning.
#
# KONFLIKTER LÖSTA ENLIGT §2.5 (nyare datum vinner):
# - Verksamhetsstöd till arrangörs- och kulturföreningar SAMT Verksamhetsstöd
#   till det fria kulturlivet: regelverket (2024-11-12) anger deadline
#   1 oktober, webbsidan (senast ändrad 2026-03-16) anger 30 oktober.
#   Webbsidan nyare — 30 oktober används.
# - Kulturprojektstöd: regelverket (2024-11-12) beskriver två fasta
#   ansökningsomgångar (10 jan-10 mar, 10 aug-10 nov), webbsidan (senast
#   ändrad 2026-03-16) beskriver löpande ansökan med paus 1 juni-1 augusti.
#   Webbsidan nyare — löpande med paus används (matchar tidigare version).
#
# KÄLLKONFLIKTER EJ LÖSTA (§2.5, datum saknas på minst en källa → nollställt):
# - Byapengen belopp: sjalvservice.varberg.se/oversikt/overview/65 (odaterad,
#   bekräftad i två oberoende hämtningar) anger 10 000/5 000/15 000 kr.
#   varberg.se/.../stod-till-landsbygdsutveckling (senast ändrad 2026-07-01)
#   anger 15 000/10 000/20 000 kr. E-tjänsten saknar synlig datummärkning
#   → belopp nollställt, båda värdena noterade nedan.
# - Landsbygdschecken belopp: sjalvservice.varberg.se/oversikt/overview/64
#   (odaterad, bekräftad i två oberoende hämtningar) anger "upp till 20 000
#   kr/år". Samma redaktionella sida som ovan anger "upp till 30 000 kr/år".
#   Belopp nollställt, båda värdena noterade nedan.
#
# Dubbelhämtat i två oberoende pass (samtliga huvudsidor + regelverks-PDF +
# vägbidrags-PDF hämtade två gånger var; inga ytterligare fältkonflikter
# utöver de ovan). Spot-checkas av Jacob före publik deploy.
