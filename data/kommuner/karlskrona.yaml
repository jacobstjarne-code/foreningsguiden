# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) rapporterades DELVIS med 6 bidrag, alla med belopp: null, på
# grund av att "Belopp och ansökningstider för stöd inom kultur och
# fritidsområdet"-PDF:en inte gick att läsa och att fri.karlskrona.se gav
# DNS-fel i den körningen. Båda problemen är lösta denna omgång.
#
# VIKTIGT FYND — fri.karlskrona.se är nedlagd, inte ett miljöfel: en
# auktoritativ DNS-slagning mot 8.8.8.8 och 1.1.1.1 gav NXDOMAIN för
# fri.karlskrona.se (SOA-svar från karlskrona.se:s egen namnserver,
# inte ett generellt uppslagningsfel). Domänen är historisk — den
# indexerades av sökmotorer när den fortfarande fanns men svarar inte
# längre. Den faktiska, levande ansökningsportalen är
# https://karlskrona.interbookfri.se/ (Interbook FRI, en Vue-app, JS-
# renderad — innehållet gick inte att enumerera via fetch/curl, se
# EJ_EXTRAHERBAR nedan). Länken till det nya systemet återfinns direkt på
# kommunens egna bidragssidor. ansokningssystem är uppdaterat i denna fil.
#
# Metod: (1) Regelverket. Kommunens antagna regelverk hittades i två
# versioner: en äldre ("Riktlinje för stöd inom kultur- och
# fritidsområdet", antagen 2023-05-22 §57, reviderad 2024-12-03 §96) och
# en NYARE som ersätter den ("Riktlinjer för stöd, priser och stipendier
# inom kultur- och fritidsområdet", antagen av kultur- och fritidsnämnden
# 2025-12-16 §99, giltig 2026-03-01–2029-12-31, ersätter uttryckligen
# både den äldre riktlinjen och de fristående stadgarna för stipendier/
# priser). Den nyare versionen är den som länkas från kommunens aktuella
# bidragssidor och är den som gäller idag (2026-07-21) — den används som
# primärkälla här. Innehållsmässigt är stödformerna identiska mellan
# versionerna (samma 10 idrotts-/fritidsstöd, samma 4 kulturstöd),
# kontrollerat kapitel för kapitel. Utöver denna hittades tre ytterligare
# regelverks-PDF:er som inte är kopplade till kultur- och fritidsnämnden:
# "Riktlinjer för bidrag till föreningar inom socialtjänstens område"
# (Socialnämnden, fastställt 2017-09-25 §109), "Bestämmelser för bidrag
# till pensionärsföreningar och andra föreningar som bedriver särskilt
# riktad verksamhet för äldre" (Äldrenämnden, fastställt 2018-02-28) samt
# "Riktlinjer för elitidrottsstöd" (beslutad av Kommundirektören
# 2025-09-21, HELT NYTT stöd som ersätter tidigare "sponsringsmedel" fr
# o m 2025 — hittades inte i föregående körning). Den efterfrågade
# bilagan "Belopp och ansökningstider för stöd inom kultur och
# fritidsområdet 2026" hittades och lästes i sin helhet via pdftotext —
# den gav exakta belopp/budgetrader och ansökningsdatum för i princip
# samtliga kultur- och fritidsstöd, vilket löser samtliga belopp:null
# och "ej verifierat datum"-luckor från föregående körning.
# (2) Förvaltningarnas egna sidor lästes i sin helhet, inklusive sidor
# som INTE länkas direkt från huvudöversikten "Stöd till föreningar och
# kulturorganisationer": Elitidrott i Karlskrona (ny undersektion, 2
# sidor), Trygghetsvandrande föreningar, samt Miljö- och samhälls-
# byggnadsförvaltningens sida om skötsel av vägar (vägbidrag).
# (3) Självservice/specialkategorier (§2.1.5) genomsöktes riktat:
# vägföreningar/vägsamfälligheter (HITTAT: kommunalt bidrag för
# underhåll av enskild utfartsväg, BL5028), byalag/samhälls-/hembygds-
# föreningar (HITTAT: Landsbygds- och skärgårdsmiljonen, 2 mkr/år,
# administreras av Miljö- och samhällsbyggnadsförvaltningen/
# Kommunstyrelsen — inte av kultur- och fritidsnämnden, därför lätt att
# missa), stiftelser/fonder (samtliga identifierade stiftelser/fonder —
# tre donationsstiftelser, fyra arvsfonder, Leopold Rubens sjukvårdsfond,
# Gösta Håkanssons minnesfond, fyra utbildningsstipendier — är uteslutet
# riktade till PRIVATPERSONER, se MEDVETET_UTESLUTET nedan; Karlskrona
# saknar, till skillnad från Växjö och Karlstad, en stiftelse öppen för
# föreningar som sökande), studieförbund (SÖKT MEN EJ HITTAT som aktiv,
# sökbar sida — se anmärkning nedan, ej skrivet till filen).
# Ansökningsportalen karlskrona.interbookfri.se är, liksom övriga
# Rbok/FRI-kommuners motsvarigheter, JS-renderad och gick inte att
# enumerera via fetch — EJ_EXTRAHERBAR, täckning byggd genom
# sidkonvergens (regelverk + förvaltningssidor + specialkategorisidor).
#
# Befolkningskonflikt LÖST (§2.5, nyare datum vinner): föregående version
# hade 66021 vs 66012 olöst. 66021 är SCB:s befolkningssiffra per
# 2025-12-31 (kommunens årssiffra). 66012 är SCB:s kvartalssiffra per
# 2026-03-31, publicerad av SCB 2026-05-12 ("Folkmängd och
# befolkningsförändringar — Kvartal 1, 2026"). 66012 har senare
# mätdatum och senare publiceringsdatum — det värdet används.
#
# Uteslutna (kategoriskt skäl, §2.3–§2.4):
# - Föreningsledarpriset, Idrottsstipendium, Karlskrona idrottspris,
#   Kulturpris, Kulturstipendium, Världsarvets eldsjälspris (kapitel 5 i
#   regelverket) — individuella pris/hedersutmärkelser och stipendier,
#   tilldelas genom nominering/urval av nämnden, inte genom en
#   konkurrensutsatt ansökan om verksamhets-/projektfinansiering. Gränsfall:
#   Kulturpriset kan formellt gå till "person, grupp, förening eller
#   organisation", men är ändå ett erkännande-pris, inte ett sökbart
#   bidrag i den mening övriga poster i denna fil är — jämför Halmstads
#   uteslutning av Kulturstipendium.
#   https://www.karlskrona.se/kultur-fritid-och-turism/foreningar/stipendier-och-priser/
# - Fritidskortet — individuell förmån för barn 7–16 år, administreras av
#   den statliga E-hälsomyndigheten (fritidskortet.se), inte av
#   Karlskrona kommun. Annan huvudman + individuellt riktat.
#   https://www.karlskrona.se/kultur-fritid-och-turism/foreningar/fritidskortet/
# - Samtliga donationsstiftelser (Familjen Westrings donationsfond,
#   Ingrid Catharina Bergs minne, Aug. Andréns o Anna Lundbergs samfond),
#   arvsfonder (Carl Stefanus Rosells Donationsfond, Flyerydsfonden,
#   Karlskrona kommuns veterinärfond), Leopold Rubens sjukvårdsfond,
#   Gösta Håkanssons minnesfond samt fyra utbildningsstipendier —
#   uteslutna enligt §2.4, riktar sig uttryckligen till privatpersoner
#   (sjuka med låg inkomst, gravida kvinnor, barn under LVU, veterinärer,
#   studerande etc), ingen förening kan söka.
#   https://www.karlskrona.se/kommun-och-politik/stipendier-och-fonder/
#   GRÄNSFALL noterat: Adolf Gulins donationsfond (en av fyra arvsfonder)
#   har en öppnare formulering ("allmännyttiga ändamål, som kommunen inte
#   har till ansvar att verkställa och bekosta") utan uttrycklig
#   begränsning till privatperson eller förening. Uteslöts ändå i denna
#   omgång eftersom källan inte uttryckligen bekräftar att föreningar kan
#   söka (till skillnad från Växjös Anna Bondes Fond och Karlstads två
#   föreningsöppna fonder, där käll-texten uttryckligen nämner
#   föreningar) — flaggat som gränsfall för Fables granskning, inte en
#   säker uteslutning.
# - Kvinnojouren Frideborgs riktade anslag ur socialnämndens bidrags-
#   budget (10 kronor per kommuninvånare, beslutat av Kommunfullmäktige)
#   — uteslutet som eget bidrag: det är en på förhand namngiven mottagare
#   med en fast formel, inte ett allmänt sökbart bidrag andra föreningar
#   kan ansöka om (jämför Karlstads uteslutning av "Stöd till näringsliv
#   och politiska verksamheter"). Nämns i anteckningen på
#   karlskrona-social-verksamhetsbidrag för transparens.
#   https://www.karlskrona.se/globalassets/kultur-och-fritid/foreningar/dokument/riktlinjer-for-bidrag-till-foreningar-inom-socialtjanstens-omrade.pdf
# - Ansök om säsongstider, Bilda förening, Lotteri, Tillfällig
#   övernattning och arrangemang nattetid — inga ekonomiska bidrag
#   (lokalbokning, informationssida respektive tillstånds-/
#   registreringsärenden).
#
# EJ SKRIVET (osäker status, ingen aktiv sida hittad):
# - Studieförbund. Nyhetsartiklar (2024–2025) beskriver att Karlskrona-
#   alliansen lade 500 000 av tidigare 1,8 mkr i reserv för studieförbunds-
#   stöd under en översyn, och att antalet studiecirklar minskat kraftigt.
#   Ingen aktiv, sökbar bidragssida för studieförbund hittades på
#   karlskrona.se vid denna körning (till skillnad från Halmstad/Växjö
#   som båda har en tydlig "Stöd till studieförbund"-sida). Kan vara
#   administrerat direkt utan öppen ansökan, pausat under översynen, eller
#   nyligen borttaget från webben. Inte skrivet till filen — osäker
#   status, ingen verifierbar käll-URL för en aktiv ansökan.
#
# Karlskrona har fem administrativa hem för föreningsbidrag: Kultur- och
# fritidsförvaltningen (störst — 18 stödformer inom idrott/fritid/kultur),
# Socialförvaltningen (socialt inriktad föreningsverksamhet),
# Äldreförvaltningen (pensionärs-/äldreföreningar), Miljö- och samhälls-
# byggnadsförvaltningen (vägbidrag samt, tillsammans med Kommunstyrelsen,
# Landsbygds- och skärgårdsmiljonen) samt Kommundirektörens stab (nya
# elitidrottsstödet, för att hållas "enkelt och transparent" skilt från
# ordinarie nämndbeslut). Ansökan sker för kultur-/idrotts-/fritidsstöd
# samt elitidrottsstöd via Interbook FRI; social- och äldrebidrag via
# separat självservice/e-tjänst eller pappersblankett; Landsbygds- och
# skärgårdsmiljonen via egen e-tjänst; vägbidrag via pappersblankett
# (BL5028) — se anteckning per bidrag. Spot-checkas av Jacob/Fable före
# publik deploy.
kommun: "Karlskrona"
kommun_slug: "karlskrona"
lan: "Blekinge län"
befolkning: 66012
forvaltning: "Kultur- och fritidsförvaltningen, Socialförvaltningen, Äldreförvaltningen, Miljö- och samhällsbyggnadsförvaltningen samt Kommunstyrelsens förvaltning/kommundirektörens stab"
ansokningssystem:
  namn: "Interbook FRI"
  url: "https://karlskrona.interbookfri.se/"
kalla_url: "https://www.karlskrona.se/kultur-fritid-och-turism/foreningar/foreningsbidrag/"
verifierad: 2026-07-21
bidrag:
