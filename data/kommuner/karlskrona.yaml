  - id: "karlskrona-lokal-driftstod"
    namn: "Lokal- och driftstöd"
    kategori: ["idrott", "kultur"]
    malgrupp: "Samtliga stödberättigade ideella föreningar inom kultur- och fritidsområdet, med kostnader för hyrd eller egenägd lokal/anläggning"
    deadlines:
      typ: "fasta"
      datum: ["03-15"]
    krav:
      - "Föreningen ska vara godkänd stödberättigad, samt särskilt godkänd för att söka drift- och lokalstöd"
      - "Lokal som hyrs av kultur- och fritidsförvaltningen (t.ex. gymnastiksalar) är inte bidragsberättigad"
      - "Stöd för lokalkostnader kan inte ges till delar av en lokal som används kommersiellt"
    belopp: "Stöd för lokalkostnader (hyrd lokal): 20–40 % av bidragsgrundande kostnader (arrende, kallhyra, försäkring, myndighetsavgifter, sotning, vatten/avlopp, värme/el, fiber), lägst 10 000 kr/år i kostnad, maxbelopp 30 000–70 000 kr/år beroende på verksamhetstyp. Driftsstöd (egenägd lokal/anläggning): samma procentsatser, maxbelopp 30 000–250 000 kr/år beroende på objektstyp, plus separat skötselstöd för egenägda anläggningar (schablon: 20 000–40 000 kr för underhåll av omklädningsrum + 5 000–30 000 kr per plan beroende på plantyp, där andelen som betalas ut är 10–80 % beroende på antal deltagartillfällen)"
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://www.karlskrona.se/globalassets/kultur-och-fritid/foreningar/dokument/belopp-och-ansokningstider-for-stod-inom-kultur-och-fritidsomradet-2026.pdf"
    anteckning: "Delas i regelverket i två delar: stöd för lokalkostnader (hyrda lokaler) och driftsstöd (egenägda lokaler/anläggningar, inklusive skötselstöd). Fullständig beloppstabell i bilagan 'Belopp och ansökningstider för stöd inom kultur och fritidsområdet 2026'. Föregående körning kunde inte läsa denna PDF och satte belopp till null — löst denna omgång."
