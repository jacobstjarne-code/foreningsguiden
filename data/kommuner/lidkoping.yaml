# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) skrev bara 2 bidrag eftersom Lidköping mitt under research-
# tillfället var mitt i en bidragsreform: den nya konsoliderade sidan
# "Stöd till kultur- och fritidsverksamhet (föreningsbidrag)" gav 200 men
# innehållet gick inte att extrahera (JS-renderad, samma mönster som
# Växjös/Halmstads/Karlstads Rbok-portaler).
#
# Metod denna omgång: (1) Sökte efter Lidköpings antagna bidragsregelverk-
# PDF på flera sätt (direkta frågor, site:lidkoping.se filetype:pdf,
# insynsverige.se). INGET regelverk hittades för Lidköping specifikt — två
# träffar på insynsverige.se som såg lovande ut ("Lokala riktlinjer för
# bidrag till ideella föreningar", "Kultur- och fritidsnämndens riktlinjer
# för stöd") visade sig vid nedladdning och PDF-läsning vara FELAKTIGA
# TRÄFFAR för andra kommuner (Stockholm/Östermalms stadsdelsförvaltning
# respektive Tyresö kommun) — insynsverige.se:s sökindex matchar på
# generisk frastext oberoende av kommun, samma fälla i två separata
# sökningar. En nyhetsartikel (NLT 2025-04-21) bekräftar att fritids- och
# föreningsnämnden skulle besluta om nya konsoliderade riktlinjer "nästa
# vecka" (dvs. ca slutet av april/början av maj 2025), men inget publikt
# indexerat PDF-dokument med det antagna regelverket hittades. Regelverket
# (steg 1 i §2.1) är alltså EJ_HITTAT, inte EJ_EXTRAHERBAR — täckning är i
# stället byggd på steg 3 (självservice-sidor). (2) Kommunens redaktionella
# sidor under lidkoping.se/kommun-och-politik/bidrag-och-stipendier/* är
# genomgående JS-renderade — 200-svar men inget extraherbart innehåll,
# bekräftat på nio separata undersidor (den konsoliderade föreningsbidrags-
# sidan, bidrag-till-folkbildningen, bidrag-till-lokal-utveckling, kultur--
# och-fritidsstipendium, stod-till-landsbygdsutveckling, tillgänglighets--
# och-bemotandepriset, ungdomspeng-sidan, m.fl.). (3) Självservice-portalen
# (sjalvservice.lidkoping.se) är DÄREMOT extraherbar sida för sida — dess
# indexsida listar 26 e-tjänster under kategorin "Bidrag och Stipendier".
# Samtliga 26 hämtades individuellt. De flesta är formellt "stängda" med
# meddelandet "E-tjänsten är nu stängd" och hänvisar till den nya
# konsoliderade sidan för själva ansökningssteget — men varje stängd sida
# behöll sin fullständiga målgrupps-, krav- och (ibland) belopps-/deadline-
# text, vilket gör dem till en fullgod detaljkälla trots att de inte längre
# är den aktiva ansökningsvägen (samma mönster som Halmstads FRI-baserade
# enskilda bidragssidor). Detta är täckningsfacit för denna körning: 26
# portalobjekt, varav 2 är förutsättningar (stödberättigad förening/
# organisation), 6 är exkluderade (se nedan) och 2 är uppföljningsformulär
# utan eget bidragsinnehåll — resterande 16 skrivna nedan. (4) Special-
# kategorier (§2.1.5): väg/samfälligheter — hittade "Kommunalt bidrag till
# enskilda vägar utan statsbidrag" (skrivet nedan); bygdegårdar/samlings-
# lokaler — täcks av "Bidrag för samlingslokaler" (skrivet nedan);
# stiftelser/fonder — sökt riktat, inget kommunalt förvaltat stiftelse-
# bidrag till föreningar hittat (Lidköping tycks inte förvalta en jämförbar
# stiftelseportfölj som Halmstad/Karlstad); studieförbund — "Bidrag till
# folkbildningen" identifierad men EJ_EXTRAHERBAR (se nedan); byalag —
# "Bidrag till lokal utveckling" identifierad men EJ_EXTRAHERBAR.
#
# FÖREGÅENDE PLACEHOLDER ERSATT: förra körningens enda substantiella bidrag,
# det vaga samlingsbidraget "Stöd till kultur- och fritidsverksamhet
# (föreningsbidrag)" (skrivet med belopp: null, krav: [1 rad]), är borttaget
# och ersatt av de 16 faktiska bidragsformerna nedan. Den konsoliderade
# sidan är numera bara den gemensamma ANSÖKNINGSINGÅNGEN för dessa 16 —
# att behålla den som ett eget 17:e bidrag hade dubbelräknat samma pengar
# under två id:n.
#
# Uteslutna (kategoriskt/metodiskt skäl, §2.3–§2.4):
# - "Kultur- och fritidsstipendium" (4 underkategorier: Fritidsstipendium,
#   Fritidsstipendium för unga, Kulturstipendium, Kulturstipendium för
#   unga) — individuellt stipendium till privatperson bosatt i/med
#   anknytning till kommunen, deadline 1 april. Jämför Halmstads uteslutna
#   Kulturstipendium. https://sjalvservice.lidkoping.se/oversikt/overview/297
# - "Stipendie Axel Lennart Larsson" — individuellt stipendium till elev
#   vid Lidköpings högre läroverk, ansöks av eleven själv.
#   https://sjalvservice.lidkoping.se/oversikt/overview/337
# - "Ungdomspriset" — hedersutmärkelse + 5 000 kr till EN NAMNGIVEN individ
#   13–25 år, inte till en förening eller grupp.
#   https://sjalvservice.lidkoping.se/oversikt/overview/726
# - "Hållbarhetspriset - företagsnominering" — riktar sig uteslutande till
#   företag, inte föreningar (jämför den parallella föreningsnomineringen,
#   som ÄR skriven nedan som lidkoping-hallbarhetspris-forening).
#   https://sjalvservice.lidkoping.se/oversikt/overview/246
# - "Föreningsstäd - anmälan" — inte ett bidrag utan ersättning för utfört
#   uppdrag (6 000 kr per städområde/helg för att städa avgränsade
#   områden i kommunen) — transaktionellt köp av en tjänst, inte stöd till
#   föreningens egen verksamhet. https://sjalvservice.lidkoping.se/oversikt/overview/43
# - "Sponsring ansökan/uppföljning" — sidan anger uttryckligen att
#   kommunen slutat ta emot nya sponsringsansökningar sedan ett nytt bidrag
#   till elit- och kulturverksamhet infördes 2022 (riktlinjer daterade
#   januari 2017) — inaktuell/överspelad tjänst, ersatt av det nu skrivna
#   lidkoping-elitidrott m.fl. https://sjalvservice.lidkoping.se/oversikt/overview/167
# - "Tillgänglighets- och bemötandepriset" — EJ_EXTRAHERBAR (JS-renderad
#   sida på lidkoping.se, ingen motsvarande självservice-e-tjänst hittad).
#   Målgrupp (individ/företag/förening) gick inte att bekräfta — utesluten
#   av försiktighet snarare än ett bekräftat kategoriskt skäl; se
#   tackning.log. https://lidkoping.se/kommun-och-politik/bidrag-och-stipendier/tillganglighets--och-bemotandepriset
# - "Stöd till landsbygdsutveckling" — EJ_EXTRAHERBAR (JS-renderad),
#   listad under kommunens meny "Företag, näringsliv och exploatering"
#   snarare än "Bidrag och stipendier"-huvudkategorin för föreningar, vilket
#   antyder företagsinriktning. Utesluten av försiktighet — inte tillräckligt
#   bekräftat att föreningar är målgrupp. Se tackning.log.
#   https://lidkoping.se/kommun-och-politik/bidrag-och-stipendier/stod-till-landsbygdsutveckling
# - "Föreningsbidrag äldre- och funktionsnedsättning" / "Vård och omsorg
#   föreningsbidrag" — EJ_EXTRAHERBAR trots stark indicium: sökmotorns
#   cachade indexträffar beskriver konsekvent ett bastöd på 5 562 kr +
#   107 kr per aktivitetstillfälle (möten, utflykter, lägerverksamhet,
#   sång/gymnastik, bassängträning, motionsdans m.m.), deadline 15 mars
#   (20 % avdrag vid sen ansökan) och absolut stopp 15 april. BÅDA kända
#   URL:er — lidkoping.se/.../foreningsbidrag-aldre--och-funktionsnedsattning
#   OCH sjalvservice.lidkoping.se/oversikt/overview/421 — gav 404 vid
#   upprepad hämtning 2026-07-20. Kan inte skrivas utan en levande käll-URL
#   (§4). Troligen borttagen/omstrukturerad i samband med reformen utan att
#   sökmotorns cache hunnit uppdateras. Se tackning.log — detta är den
#   käll-avvikelse som mest liknar Halmstads ursprungliga miss och bör
#   dubbelkollas manuellt av Fable/Jacob mot kommunens kontaktcenter.
#
# Dubbelhämtat i två oberoende pass (§3): samtliga 26 självservice-sidor
# samt de nio JS-renderade redaktionssidorna hämtades två gånger oberoende
# under körningen (initial kartläggning + verifieringspass för belopp/
# deadlines). Inga fältkonflikter identifierade. Spot-checkas av Jacob/
# Fable före publik deploy — särskilt lidkoping-aldre-funktionsnedsattning-
# avvikelsen ovan.
