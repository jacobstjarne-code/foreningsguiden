# Källa verifierad 2026-07-23 mot partille.se. Regelverk: "Bidragsregler för
# idrottsföreningar" (KFN/2026:3, antaget av kultur- och fritidsnämnden
# 2026-02-26 § 15) och "Bidragsregler för kulturföreningar" (KFN/2024:11,
# antaget 2024-04-11 § 22), båda hämtade som PDF och extraherade ordagrant
# med pdftotext -layout (ej modell-sammanfattat).
# Ansökningssystem har bytt namn: kultur-PDF:n (2024) anger "Adoxa", men
# kommunens nuvarande bidragssida (live 2026-07-23) länkar samtliga bidrag
# (idrott, kultur, pensionär/övriga idébärande) till Rbok
# (partille.rbok.se) — nyare källa vinner (§2.5), Rbok skrivet som
# ansökningssystem. Rbok kräver BankID-inloggning och gick inte att räkna
# upp portalinnehållet (EJ_EXTRAHERBAR, se tackning.log).
# Fyra priser/stipendier (Breddpriset, Barnkonventionspriset,
# Hållbarhetspriset, Hälsopriset) är medtagna eftersom källan uttryckligen
# anger att föreningar kan nomineras/vinna (§2.4/§2.6-praxis i denna batch).
# Partille idrottsstipendium, Partille kulturstipendium (båda uteslutande
# för två namngivna privatpersoner), Sociala Samfond (behövande
# kommuninvånare) och Inger och Gösta Sundströms kulturstiftelse (privat
# donation, tillsätts av familjerepresentant + kommunrepresentant utan
# öppen ansöknings-/nomineringsprocess) är medvetet uteslutna — se
# tackning.log. Ingen väg-/samfällighetsbidrag, bygdegårds-/samlingslokal-
# bidrag eller separat studieförbundsbidrag hittades på partille.se;
# kulturarrangemangsbidraget omfattar uttryckligen studieförbund. Spot-
# checkas av Jacob före publik deploy.
