# Källa verifierad 2026-07-20 mot solna.se (källkonvergens enligt RESEARCH_SPEC_v2 §2/v2.1).
# Huvudkälla: "Förenings- och bidragsregler" (senast uppdaterad 2026-05-26) — kommunens
# egen regelverkstext i sex numrerade avsnitt (1-6), fungerar som regelverket (§2.1 punkt 1)
# trots att den är en HTML-sida och inte en fristående PDF. Kryssad mot "Söka bidrag"
# (uppdaterad 2026-05-21) och "Lokalt aktivitetsstöd" (uppdaterad 2026-02-24) — samma
# sju bidragskategorier i alla tre källor, ingen avvikelse.
# Ansökningsportalen (solna.ibgo.se / Interbook Go) är JS-renderad — EJ_EXTRAHERBAR,
# gick inte att räkna upp separat. Självservice-portalens indexsida (sjalvservice.solna.se)
# är också JS-renderad — EJ_EXTRAHERBAR som lista, men enskilda e-tjänstsidor (resebidrag,
# bilda ny förening) var läsbara och bekräftar samma bild.
# Sökt men EJ funnet på solna.se: vägförening/samfällighetsbidrag, bygdegårds-/
# samlingslokalbidrag, stiftelser/fonder för föreningar, byalag/samhällsförening-bidrag,
# separat social-/funktionsrättsbidrag hos Socialnämnden eller Omvårdnadsnämnden (endast
# en 2019-revisionsrapport nämner föreningsbidrag i omsorgssammanhang, hostad på docplayer.se
# — utanför solna.se-domänen och för gammal för att användas som källa). Solna är en tät,
# urban kommun utan landsbygd i klassisk mening, vilket är konsistent med avsaknaden av
# väg-/samfällighetsbidrag.
# Fyra stipendier (kulturstipendium barn/ungdom/vuxen, Krausstipendiet) och "Årets
# föreningsledare" är individuella pris till privatpersoner — uteslutna enligt §2.4 (a).
# Spot-checkas av Jacob före publik deploy.
