# sidor. Stockholm har flera förvaltningar med separata bidragsspår —
# idrottsförvaltningen (Idrottsportalen), kulturförvaltningen (kulturstod.
# stockholm.se) och socialförvaltningen (OFU). Idrottsförvaltningen flyttar
# under 2026 successivt stöd till e-tjänsten Idrottsportalen. Spot-check av
# Jacob före deploy; detta är den mest sammansatta kommunen i urvalet.
