# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens). Föregående version (verifierad 2026-07-19) hade redan ett
# solitt regelverks-PDF-baserat researcharbete (10 bidrag) och missade inte
# lika brett som Växjö/Halmstad/Karlstad — men två klasser av fel fanns
# ändå: (1) ETT bidrag i regelverkets egen text lästes förbi ("Särskilt
# bidrag", ett kompletterande bidrag utanför de namngivna bidragsformerna,
# stod i PDF:en men saknades i föregående YAML och på webbsidans
# sammanfattande tabell — precis den typen av "en sida rymmer fler bidrag än
# ingressen visar"-miss v2.1 ska fånga), och (2) specialkategorier (§2.1.5)
# söktes inte alls föregående omgång: vägföreningar/vägsamfälligheter och
# landsbygds-/byalagsmedel saknades helt.
#
# Metod denna omgång: (1) Läste regelverket "Bidragsbestämmelser" (KF §81/23,
# senast reviderad 2026-01-20, version 10) i sin helhet sida för sida —
# inklusive Bilaga 1 (schablonbidrag för föreningsägda anläggningar) och
# avsnittet "Särskilt bidrag" som inte syns i webbsidans tabellsammanfattning.
# (2) Läste förvaltningarnas egna sidor: kultur- och fritidsförvaltningens
# föreningsbidragssida (med "senast uppdaterad"-stämpel per underavsnitt),
# socialförvaltningens och vård- och omsorgsförvaltningens riktlinje-PDF:er.
# (3) Enumererade självservice-portalen (sjalvservice.vetlanda.se) — till
# skillnad från Rbok/FRI i tidigare omkörda kommuner är denna portal INTE
# JS-renderad och gick att räkna upp direkt: 11 tjänster med "bidrag/stöd/
# stipendium/fond" i namnet hittades, vilket bekräftade fullständigheten i
# kultur- och fritidsförvaltningens bidragsutbud (alla 11 var redan kända
# eller kategoriskt uteslutna — se nedan). (4) Sökte riktat efter
# specialkategorier (§2.1.5): vägföreningar/vägsamfälligheter (kommunalt
# underhålls- och nybyggnadsbidrag för enskild väg hittat, tekniska
# förvaltningen), bygdegårdar/samlingslokaler (inget separat kommunalt bidrag
# utöver schablonbidraget för föreningsägda lokaler i Bilaga 1 — bygdegårdar
# omfattas redan av vetlanda-allmant-foreningsbidrag), byalag/
# samhällsföreningar (Landsbygdssatsningar, 500 000 kr/år, hittat),
# stiftelser/fonder (~20 kommunalt förvaltade stiftelser identifierade —
# samtliga riktar sig uteslutande till privatpersoner, se uteslutningar
# nedan; ingen samlingspost enligt §2.7 behövs eftersom ingen är öppen för
# föreningar), studieförbund (regelverket utesluter uttryckligen
# studieförbund från Bidragsbestämmelser — "Studieförbund är inte
# berättigade till föreningsbidrag som beskrivs i Bidragsbestämmelser" — och
# ingen alternativ studieförbundsbidragsform hittades någon annanstans, till
# skillnad från t.ex. Karlstad).
#
# KONFLIKT LÖST (§2.5, skiljer sig från föregående version): för
# "Föreningsbidrag – inriktning social utsatthet" nollställde föregående
# omgång deadline-fältet p.g.a. motstridiga datum (kommunsidan 28 februari,
# socialförvaltningens riktlinje-PDF 15 mars). Denna omgång hittades en
# explicit "Senast uppdaterad: 3 februari 2026"-stämpel på kommunens
# föreningsbidragssida — nyare än riktlinje-PDF:ens datum (Socialnämnden
# 2010-02-08, aldrig reviderad sedan dess). Enligt §2.5 vinner den nyare
# källan: deadline satt till 28 februari (fasta, "02-28"). Båda värdena och
# båda URL:erna kvarstår i anteckningen på bidraget och i konflikter.log
# nedan.
#
# Uteslutna (kategoriskt/metodiskt skäl, §2.3–§2.4):
# - Georg Selanders donationsstiftelse — individuellt stipendium till
#   privatperson (ungdomar som studerar jord-/skogsbruk).
#   https://vetlanda.se/kultur-och-fritid/stod-och-stipendier/georg-selanders-donationsstiftelse
# - PA och Lisbeths musikstiftelse — individuellt stipendium till
#   privatperson (musiker/musikstuderande bosatta/uppvuxna i kommunen).
#   https://vetlanda.se/kultur-och-fritid/stod-och-stipendier/pa-och-lisbeths-musikstiftelse
# - Samstiftelsen för social hjälpverksamhet — individuellt ekonomiskt stöd
#   till privatpersoner (kommuninvånare med behov), inte ett föreningsbidrag.
#   https://vetlanda.se/kultur-och-fritid/stod-och-stipendier/samstiftelsen-for-social-hjalpverksamhet
# - Utbildningsstipendium inom kultur — individuellt stipendium till
#   privatperson verksam inom kultur.
#   https://vetlanda.se/kultur-och-fritid/stod-och-stipendier/utbildningsstipendium-inom-kultur
# - Kulturpris — kan visserligen gå till "personer, föreningar eller
#   organisationer", men källan saknar helt belopp, ansökningsformulär,
#   nomineringsprocess och deadline (verifierat genom fullständig läsning av
#   sidan, senast uppdaterad 16 maj 2024). Samma skäl som Halmstads
#   uteslutning av "Stöd till unga arrangörer": ett kontaktnav/hedersomnämnande,
#   inte ett sökbart bidrag i den mening övriga poster i denna fil är.
#   https://vetlanda.se/kultur-och-fritid/stod-och-stipendier/kulturpris
# - Ledarpris — individuellt pris till privatperson ("personer som arbetar
#   ideellt med att leda ungdomsverksamhet"), nomineras av andra, ingen
#   egenansökan.
#   https://vetlanda.se/kultur-och-fritid/stod-och-stipendier/ledarpris
# - Årets landsbygdsbo — hederspris till en enskild privatperson (boende på
#   landsbygden), inget publicerat prisbelopp.
#   https://vetlanda.se/bygga-bo-och-miljo/planer-och-utveckling/landbygdsutveckling
# - Stiftelsen Werner von Seydlitz — fristående stiftelse med egen styrelse
#   (Wernerstiftelser), egen ansökningsportal (wernerstiftelser.se), inte en
#   av kommunens egna listade stiftelser (saknas på
#   vetlanda.se/kultur-och-fritid/stod-och-stipendier). Administreras av
#   annan huvudman än kommunen (§2.4) och har ingen sida på kommunens egen
#   domän att citera (§4).
#   https://wernerstiftelser.se/stiftelsen-werner-von-seydlitz/
# - Astrid Lindgrens Hembygd — leader-liknande partnerskapsorganisation för
#   tio kommuner (Aneby, Eksjö, Hultsfred, Högsby, Kinda, Nässjö, Vetlanda,
#   Vimmerby, Ydre, del av Oskarshamn), EU-/stats-/kommunfinansierad men med
#   egen styrelse och egen ansökningsportal (astridlindgrenshembygd.se).
#   Annan huvudman än Vetlanda kommun ensamt (§2.4), ingen ansökan sker på
#   kommunens egen domän (§4).
#   https://vetlanda.se/bygga-bo-och-miljo/planer-och-utveckling/landbygdsutveckling
# - Hemsändningsbidrag — riktar sig till livsmedelsbutiker på landsbygden
#   (företag), inte föreningar (§2.4).
#   https://vetlanda.se/bygga-bo-och-miljo/planer-och-utveckling/landbygdsutveckling
# - Trafikverkets bidrag för enskild väg — statligt bidrag, administreras och
#   söks hos Trafikverket, inte kommunen; källan är trafikverket.se, inte
#   kommunens egen domän (§4). Kommunens EGET underhålls- och
#   nybyggnadsbidrag (för vägar UTAN rätt till Trafikverket-bidrag) är
#   inkluderat nedan.
#   https://www.trafikverket.se/e-tjanster/bidrag-for-enskild-vag/
#
# Varningssignal (§2.6) undersökt: Investeringsbidrag (10-31) och
# Landsbygdssatsningar (avslutas 09-02) är de enda två med hösten som
# ansökningsfönster — verifierade individuellt mot sina respektive källor,
# ingen ärvd/kopierad deadline. Landsbygdssatsningars exakta datumfönster
# (13 april–2 september) gäller uttryckligen 2026 års omgång (avser
# satsningar för 2027) — ansökningsfönstret kan flytta något mellan år,
# verifiera inför nästa omverifiering.
#
# Dubbelhämtat i två oberoende pass (§3) för samtliga nya poster
# (landsbygdssatsningar, väg-bidragen) — identiska belopp och krav i båda
# passen. Regelverkets sakinnehåll är hämtat direkt ur PDF-originalet
# (primärkälla, inte AI-sammanfattning) och därför inte föremål för samma
# dubbelhämtningsrisk. Ingen fältkonflikt kvarstår denna omgång utöver den
# lösta social-utsatthet-konflikten ovan. Spot-checkas av Jacob/Fable före
# publik deploy.
