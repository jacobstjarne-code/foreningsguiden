# Källa verifierad 2026-07-20 mot kungalv.se. Täckning fastställd genom
# källkonvergens (RESEARCH_SPEC v2.1 §2): kommunens antagna regelverk
# "Riktlinjer för förenings- och studieförbundsstöd" (KS2024/2174, beslut
# Kommunstyrelsen 2025-02-19, ersätter KS2023/1118, giltig t.o.m. 2027-12-31)
# läst i fulltext (13 sidor) och jämförd mot kommunens självservice-portal
# och redaktionella bidragssida — två oberoende källor, samstämmig bild.
# Regelverkets §5 (Avgränsning) exkluderar uttryckligen kulturpris/
# kulturstipendium, idrottspris/idrottsstipendium, IOP, kulturbidrag i form
# av verksamhetsstöd (eget regelverk) och stöd till föreningsarkiv (eget
# regelverk) ur SIN egen räckvidd — de två sistnämnda är ändå verkliga
# kommunala stöd och hanteras separat nedan/i anteckningar.
# Spot-checkas av Jacob före publik deploy (leveransordning steg 4).
