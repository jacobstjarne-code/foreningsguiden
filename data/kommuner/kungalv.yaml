    anteckning: "Stödet ges endast för aktiva medlemmar, max 30 deltagare per sammankomst räknas bidragsgrundande, och samma deltagare i flera sammankomster samma dag i samma förening räknas bara en gång. Fester, läxläsning, högtidsfirande, religiösa studier, skolverksamhet och studiecirklar är inte stödberättigade. Statligt lokalt aktivitetsstöd söks separat av föreningen enligt Riksidrottsförbundets/specialförbundens anvisningar (IdrottOnline) — det är ett annat stöd än den kommunala delen. Redovisning sker via systemet APN (Aktivitetskort på nätet): period jan–juni redovisas senast 25 augusti, period jul–dec senast 25 februari påföljande år. Beloppet utbetalas per halvår; kvarvarande medel i potten fördelas ibland som fyllnadsutbetalning, aldrig garanterat."
