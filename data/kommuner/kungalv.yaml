forutsattningar:
  - id: "kungalv-foreningsregister"
    vad: "Registrera föreningen i Kungälvs föreningsregister"
    beskrivning: "Föreningen ska finnas med i kommunens föreningsregister på kommunens hemsida för att vara berättigad till föreningsstöd. Registreringen görs via e-tjänst i fem steg: föreningsuppgifter, kontaktuppgifter, verksamhetsbeskrivning, förhandsgranska, skicka in. Föreningen ska ha av årsmötet antagna stadgar, vald styrelse (minst tre personer, ordförande och kassör ej samma person), revisorer och organisationsnummer, samt bankkonto registrerat i föreningens namn."
    system: "Kommunens e-tjänst (Självservice och Mina sidor)"
    ledtid: null
    ledtid_text: "Kommunen anger ingen handläggningstid"
    giltighet: null
    ordning: 1
    kalla_url: "https://sjalvservice.kungalv.se/oversikt/overview/472"
  - id: "kungalv-registerutdrag"
    vad: "Begära begränsat registerutdrag ur belastningsregistret för ledare med barnkontakt"
    beskrivning: "För att erhålla föreningsstöd måste föreningen säkerställa att alla som anställs eller har uppdrag i föreningen med direkt och regelbunden kontakt med barn har begärt begränsat registerutdrag ur belastningsregistret hos Polisen vid nytillsättning. Föreningen kontrollerar utdraget, dokumenterar att kontrollen genomförts, och arkiverar noteringen (inte själva utdraget). Kommunen gör stickprovskontroller av att föreningar lämnat in utdrag."
    system: null
    ledtid: null
    ledtid_text: "Kommunen anger ingen handläggningstid; utdraget begärs direkt hos Polisen, inte i ett kommunalt system"
    giltighet: "Ska begäras vid varje nytillsättning av ledare med barnkontakt; rekommenderas ske regelbundet även för redan tillsatta ledare"
    ordning: 2
    kalla_url: "https://www.kungalv.se/siteassets/dokument/kommun-och-politik/styrdokument/kultur-fritid-foreningar/riktlinje-for-forenings--och-studieforbundsstod.pdf"
