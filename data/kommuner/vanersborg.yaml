    anteckning: "Beslutas av Kommunstyrelsen, handläggs av Näringslivsavdelningen — inte kultur- och fritidsnämnden och inte del av Föreningsregistret. Två bidragsformer: evenemangsbidrag (kostnadstäckning för planering, marknadsföring och genomförande) och marknadsföringsbidrag (mot exponering/marknadsföring av kommunen). E-tjänstens rubrik (minasidor.vanersborg.se/ksf47) nämner även \"sponsring\" som tredje sökalternativ inom samma ansökan/formulär — regelverket för kultur- och fritidsnämndens bidrag (sid 3) bekräftar att \"bidrag till sponsring, marknadsföring eller arrangemang av större, strategisk karaktär (exempelvis ett VM)\" hanteras hos Kommunstyrelsen, men ingen egen belopps-/kravtabell för sponsring specifikt är publicerad — hanteras här som samma bidragsform."

  # --- SAMHÄLLSBYGGNADSFÖRVALTNINGEN (specialkategori §2.1.5: väg) ---
  - id: "vanersborg-driftbidrag-enskild-vag"
    namn: "Driftbidrag för enskild väghållning"
    kategori: ["ovrig"]
    malgrupp: "Väghållare för enskilda vägar i Vänersborgs kommun — fastighetsägare och organisationer (t.ex. samfällighets-/vägföreningar) som ansvarar för väghållningen av en väg som är utfartsväg till bebodd fastighet inom kommunen"
    deadlines:
      typ: "fasta"
      datum: ["10-31"]
    krav:
      - "Vägen ska vara minst 200 meter lång och normalt körbar för personbil året runt"
      - "Vägen ska vara utfartsväg från fastighet inom kommunen där sökanden/den boende är folkbokförd, och öppen för allmän trafik"
      - "Det kommunala driftbidraget kan inte kombineras med bidrag från Trafikverket för samma vägsträcka — vägar som redan har Trafikverksbidrag hänvisas i stället till det statskommunala driftbidraget"
      - "Vid första ansökningstillfället ska en karta bifogas som visar vägens sträckning"
    belopp: "Kommunalt driftbidrag: högst 2 000 kronor per kilometer och år. Statskommunalt driftbidrag (tillägg för vägar som redan får bidrag från Trafikverket): baseras på vägkategori och driftkostnader, ingen fast schablon publicerad i källan"
    sen_ansokan: "Ej angivet i källan utöver ordinarie deadline 31 oktober"
    kalla_url: "https://vanersborg.se/trafik-och-resor/trafik-och-gator/enskild-vag"
    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20 (specialkategori §2.1.5). Administreras av Samhällsbyggnadsförvaltningen/Samhällsbyggnadsnämnden, separat från kultur- och fritidsnämndens bidrag vars regelverk uttryckligen undantar vägföreningar och vägsamfälligheter (se anteckning på vanersborg-arrangemangsbidrag). Utbetalning i början av året efter ansökan. Väghållare som får kommunalt driftbidrag får inte stänga vägen för trafik utan Samhällsbyggnadsnämndens godkännande. Källan preciserar inte uttryckligen om även en samfällighetsförening (till skillnad från en enskild fastighetsägare) räknas som sökande \"väghållare\" — bedömt som troligt givet att detta är den vanliga organisationsformen för gemensamt förvaltade enskilda vägar i Sverige, men inte ordagrant bekräftat i källan."

