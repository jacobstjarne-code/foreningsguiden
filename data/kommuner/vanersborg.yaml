    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION, utan dokumenterad uteslutning — tillagd vid korrigerande omkörning 2026-07-20 (§2.7). Vänersborgs kommun förvaltar totalt 19 donationsstiftelser (samlat kapital ca 23 miljoner kronor enligt senaste bokslut); merparten är uteslutande riktade till privatpersoner eller saknar dokumenterad möjlighet för föreningar att söka (Ellen och Knut Petrés stiftelse, Kulturstipendium, Stipendier för vidare utbildning — samtliga uteslutna enligt §2.4, se topp-kommentar). Endast dessa tre är dokumenterat öppna för organisationer/föreningar och skrivs här som ETT samlat bidrag enligt §2.7 i stället för tre separata poster. Ansökan sker via Mina sidor eller pappersblankett. Sidan senast uppdaterad enligt källan 2023-03-06 — kontrollera vid nästa omverifiering om antalet stiftelser (19) och de tre föreningsöppna stiftelsernas villkor fortfarande stämmer."
forutsattningar:
  - id: "vanersborg-bidragsberattigad-forening"
    vad: "Bli bidragsberättigad förening hos kultur- och fritidsnämnden"
    beskrivning: "Föreningen ska vara en sammanslutning som är demokratiskt uppbyggd och öppen för alla, ha en organisatorisk fasthet (stadgar där syfte och målsättning står inskrivet), ha en vald styrelse och valda revisorer, genomföra årsmöte där verksamhets-, kassa- och revisionsberättelse föredras och godkänns, ta ut medlemsavgift och föra medlemsmatrikel, samt inte driva partipolitisk verksamhet, ha en rasistisk/främlingsfientlig inriktning eller på annat sätt strida mot diskrimineringslagen. Föreningen ska vara hemmahörande och verksam i Vänersborgs kommun. Som medlem räknas fysisk person folkbokförd i Vänersborgs kommun, upptagen i föreningens medlemsförteckning med personnummer/samordningsnummer, som betalar personlig medlemsavgift och deltar regelbundet i föreningens verksamhet."
