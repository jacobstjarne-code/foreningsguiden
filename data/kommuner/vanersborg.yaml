# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) hade redan hittat kultur- och fritidsnämndens regelverks-PDF
# och fångade alla 7 bidrag däri korrekt (verifierat denna omgång genom att
# läsa hela PDF:en sida för sida, inklusive innehållsförteckning — exakt
# överensstämmelse, inga skillnader i belopp/deadlines/krav). Föregående
# version missade dock två hela specialkategorier (§2.1.5) eftersom den
# bara sökte inom kultur- och fritidsnämndens och socialnämndens spår, inte
# brett över samtliga förvaltningar.
#
# Metod denna omgång: (1) Läste regelverks-PDF:en i sin helhet (19 sidor,
# inte bara ingressen) — bekräftade att den innehåller exakt 7 bidrag
# (Start-, Grund-, Medlems-, Aktivitets-, Lokal- och anläggnings-,
# Motionsspårs- och Arrangemangsbidrag), samt att PDF:en EXPLICIT undantar
# "Vägföreningar, vägsamfälligheter, hamnföreningar, villa- och
# bostadsrättsföreningar" från kultur- och fritidsnämndens bidrag (sid 2).
# (2) Läste kultur-/fritidsförvaltningens, socialförvaltningens och
# näringslivsavdelningens sidor i sin helhet — 10 bidrag bekräftade,
# matchar föregående version exakt. (3) Sökte riktat efter specialkategorier
# (§2.1.5): vägföreningar/vägsamfälligheter — hittade att just DÄRFÖR att
# kultur-fritid undantar dem finns ett separat, eget bidrag hos en annan
# nämnd (Samhällsbyggnadsnämnden): driftbidrag för enskild väghållning,
# sökbart av väghållare (inklusive samfällighets-/vägföreningar) — SAKNADES
# HELT i föregående version. Bygdegårdar — sidan uppleva-och-gora/motesplatser/
# bygdegardar är bara en kontaktlista, inget eget bidrag; bygdegårdsföreningar
# får istället del av kultur-fritids generella bidrag (bekräftat i PDF:ens
# föreningskategori-tabell sid 5, "Kultur- och bygdegårdsförening"). Byalag/
# samhällsföreningar — enda hittade spåret är Leader/EU-stöd
# (naringsliv-och-arbete/landsbygdsutveckling), som uttryckligen kanaliseras
# via externa Leader-organisationer (Leader längs Göta älv & Lillån,
# Framtidsbygder), inte ett kommunalt bidrag med egen ansökan hos kommunen —
# uteslutet som administrerat av annan huvudman (§2.4). Stiftelser/fonder —
# kommunen förvaltar 19 donationsstiftelser (stipendier-och-fonder-sidan);
# läste samtliga sex namngivna stiftelsers enskilda sidor. Tre är
# dokumenterat öppna för föreningar/organisationer (Besparingsstiftelsen,
# Dr och fru Karl Graméns donationsstiftelse delvis, Stiftelsen Vänersborgs
# Skollovskoloni) och SAKNADES HELT i föregående version, utan dokumenterad
# uteslutning. Skrivna som ETT samlat bidrag enligt §2.7. (4) Ansökningsportalen
# InterbookGo (vanersborg.ibgo.se/AssociationRegister) testad på nytt —
# bekräftat JS-renderat sökgränssnitt utan statisk, enumererbar bidragslista
# (EJ_EXTRAHERBAR, som väntat enligt v2.1).
#
# Uteslutna (kategoriskt/metodiskt skäl, §2.3–§2.4):
# - Kulturstipendium (18–30 år) — individuellt pris/stipendium till
#   privatperson, kan i undantagsfall tilldelas en grupp men är inte en
#   löpande föreningsverksamhetsbidrag. Jämför Halmstads uteslutna
#   kulturstipendium.
#   https://vanersborg.se/uppleva-och-gora/kulturstipendium
# - Ellen och Knut Petrés stiftelse — uteslutande behövande barn, kvinnor
#   och "pauvres honteux", endast privatpersoner bosatta i kommunen.
#   https://vanersborg.se/omsorg-och-hjalp/ekonomi-ekonomiskt-bistand/stipendier-och-fonder/ellen-och-knut-petres-stiftelse
# - Stipendier för vidare utbildning — endast privatpersoner (avgångselever
#   som fortsätter till högskola/universitet).
#   https://vanersborg.se/omsorg-och-hjalp/ekonomi---ekonomiskt-bistand/stipendier-och-fonder/stipendier-for-vidare-utbildning
# - Fritidskortet — statlig satsning (administreras av Försäkringskassan);
#   familjer får kortet, föreningar får kompensation från staten, inte ett
#   kommunalt bidrag föreningen ansöker om hos Vänersborgs kommun.
#   Administrerat av annan huvudman, §2.4.
#   https://vanersborg.se/uppleva-och-gora/fritidskortet
# - Klimatklivet, energieffektiviseringsbidrag, Hållbarhetscheck m.fl. under
#   bygga-bo-och-miljo/energi-och-uppvarmning/bidrag-och-stod — samtliga
#   statliga/regionala (Naturvårdsverket, Boverket, VGR), inte kommunala.
#   Administrerat av annan huvudman, §2.4.
# - LONA-projekt (lokal naturvård) — kommunen är sökande hos Naturvårdsverket;
#   föreningar kan initiera projekt men det finns inget eget kommunalt
#   bidrag med egen ansökan/regelverk hos Vänersborgs kommun.
#   https://vanersborg.se/bygga-bo-och-miljo/miljo-och-halsa/naturvard/naturvardsprojekt/lona-projekt
# - Leaderprojekt/landsbygdsutveckling — se ovan, kanaliseras via externa
#   Leader-organisationer, inte ett kommunalt bidrag.
#   https://vanersborg.se/naringsliv-och-arbete/landsbygdsutveckling
#
# Varningssignal (§2.6) undersökt: sju av tio ursprungliga bidrag delar
# deadline 30 september (grundbidrag, medlemsbidrag, lokal-/anläggnings-,
# motionsspår, samt en av arrangemangsbidragets två tillfällen) — verifierat
# i regelverks-PDF:en som en genuin, gemensam ansökningsomgång "inför
# nästkommande år" (sid 8, 9, 13, 14), inte en extraktionsbugg. Övriga
# bidrag (startbidrag: löpande, aktivitetsbidrag: 25/8+25/2, sociala
# föreningar: 31/10, studieförbund: 30/6, evenemang: löpande, väg: 31/10,
# stiftelser: 30/4+31/5) har egna, avvikande datum.
#
# Dubbelhämtat i två oberoende pass (§3) — de tio ursprungliga bidragen
# omverifierade denna omgång mot regelverks-PDF:en sida för sida (exakt
# match). De två nya bidragen (väg, stiftelser) vardera hämtade två gånger
# från källsidorna (första och andra fetch identiska på ändamål/belopp/
# deadline). Inga fältkonflikter identifierade denna omgång. Spot-checkas
# av Jacob/Fable före publik deploy.
