    kalla_url: "https://www.tyreso.se/uppleva--gora/forening/foreningsbidrag-och-stipendier/ekonomiskt-stod-till-foreningar-inom-det-sociala-omradet.html"
    anteckning: "Administreras separat från kultur- och fritidsnämndens riktlinjer — av arbetsmarknads- och socialnämnden respektive äldre- och omsorgsnämnden (nämns som eget spår redan i KFN-riktlinjernas inledning). Beslut meddelas i slutet av februari. Utbetalning tidigast i mars, efter att föreningen lämnat in årsmöteshandlingar (verksamhetsberättelse, ekonomisk redovisning, revisionsberättelse) för aktuellt år. Kontakt: Aila Thorsander (arbetsmarknads-/socialnämnden), Sofia Bågander (äldre-/omsorgsnämnden). Sida senast uppdaterad 2025-03-19."
forutsattningar:
  - id: "tyreso-bidragsberattigad"
    vad: "Bli godkänd som bidragsberättigad förening"
    beskrivning: "Föreningen registrerar sig själv i kommunens boknings- och bidragssystem Rbok och ansöker därefter om status som bidragsberättigad förening (logga in på föreningen → 'Ansök' → 'Bidragsberättigad förening'). Kräver demokratiskt vald styrelse och antagna stadgar, att föreningen motverkar diskriminering utifrån de sju diskrimineringsgrunderna, alkohol- och drogfri barn- och ungdomsverksamhet, samt registrering i kultur- och fritidsnämndens föreningsregister. Föreningen ska årligen, efter respektive årsmöte, uppdatera föreningsuppgifter (verksamhetsberättelse, revisionsberättelse, ekonomisk redovisning) och medlemsantal i registret — de senast fastställda uppgifterna måste vara registrerade i samband med att föreningen lämnar in en bidragsansökan för att ansökan ska räknas som komplett."
    system: "Rbok"
    ledtid: null
    ledtid_text: "Ingen handläggningstid för själva godkännandet som bidragsberättigad förening publicerad av kommunen."
    giltighet: null
    ordning: 1
