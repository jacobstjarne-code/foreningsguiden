  - id: "tyreso-lokalt-aktivitetsstod"
    namn: "Lokalt aktivitetsstöd (LOK)"
    kategori: ["idrott", "ovrig"]
    malgrupp: "Föreningar med ledarledda gruppaktiviteter för medlemmar i åldern 7–20 år"
    deadlines:
      typ: "fasta"
      datum: ["08-25", "02-25"]
    krav:
      - "Sammankomsten ska vara en ledarledd gruppaktivitet på minst 60 minuter, med gemensam samling och avslutning"
      - "Minst en ansvarig ledare, minst 13 år, ska närvara hela sammankomsten"
      - "Minst tre deltagare 7–20 år (utöver ledaren) per sammankomst"
      - "Deltagaren ska vara individuellt ansluten och ha betalt föreningens årsavgift"
    belopp: null
    sen_ansokan: "Sen ansökan ger avdrag enligt trappa (bekräftad ordagrant i både regelverket och kommunsidan): inkommer 26 augusti–1 september respektive 26 februari–1 mars → 10 procent avdrag. 2–15 september respektive 2–15 mars → 30 procent avdrag. 16–30 september respektive 16–31 mars → 50 procent avdrag. Från 1 oktober respektive 1 april avslås ansökan helt. Föreningen kan beviljas dispens om förseningen beror på omständigheter utanför föreningens kontroll eller om särskilda skäl föreligger, förutsatt att komplett ansökan och förklaring lämnas senast 30 september respektive 31 mars."
