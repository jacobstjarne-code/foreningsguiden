  - id: "tyreso-studieforbundsbidrag"
    namn: "Studieförbundsbidrag"
    kategori: ["ovrig", "funktionsratt"]
    malgrupp: "Studieförbund som Folkbildningsrådet erkänner som godkända, med verksamhet i Tyresö riktad huvudsakligen till kommunens invånare. Prioriterade målgrupper: arbetssökande, personer med utländsk bakgrund, personer med funktionsnedsättning"
    deadlines:
      typ: "fasta"
      datum: ["04-01"]
    krav:
      - "Uppfyller de allmänna bestämmelserna för studieförbund"
      - "Verksamheten genomförs i Tyresö och riktar sig huvudsakligen till kommunens invånare"
      - "Intyg från studieförbundets verksamhetsredovisning (STUV) ska bifogas ansökan"
    belopp: "16 kr per studietimme (ämneskategori 1 och 9), 29,50 kr per studietimme (kategori 0 och 2–8), 48 kr per studietimme om majoriteten av deltagarna vid tillfället tillhör en prioriterad målgrupp (oavsett kategori). Inget grundbelopp betalas ut. Studietimmar räknas x2 om över hälften av deltagarna har utländsk bakgrund/är arbetssökande och insatsen riktade särskilda insatser mot målgruppen, x2,5 vid motsvarande andel funktionsnedsättning, och halveras för 'annan folkbildningsverksamhet' till skillnad från studiecirkel."
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://www.tyreso.se/uppleva--gora/forening/foreningsbidrag-och-stipendier/studieforbundsbidrag.html"
    anteckning: "KÄLLKONFLIKT (se konflikter.log): kommunsidan (senast uppdaterad 2026-04-07) anger deadline '1 april', vilket är nyare och vinner enligt §2.5 och är vad som skrivits här. Både regelverkets 2024-version (beslutad 2024-03-18 § 26, §3.9.4) och den äldre 2020-versionen (§ 23) anger dock samstämmigt '1 maj' — två oberoende antagna regelverksversioner som är eniga mot en enskild webbsida är ett skäl till spot-check innan publicering."
