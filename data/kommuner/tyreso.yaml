# Regelverk: "Kultur- och fritidsnämndens riktlinjer för stöd till föreningar och
# studieförbund", beslutad 2024-03-18 § 26, diarienr 2024/KFN 0022 007, giltighetstid
# Tillsvidare (hämtad direkt från tyreso.se/download/..., inte tredjepartssajt). En äldre
# version av samma riktlinje (2020-03-30 § 23) och ett ännu äldre, numera överspelat
# regelverk (KF 1995-12-14, senast justerat KFN 2010-08-30 § 51, hostat på insynsverige.se
# — alltså ej tyreso.se-domän och därför aldrig en giltig källa i sig) konsulterades för
# jämförelse men är inte grund för några fältvärden. Se tackning.log/konflikter.log för
# fullständig avstämning, inklusive en verifierad datumkonflikt i studieförbundsbidraget.
