    kalla_url: "https://www.tyreso.se/uppleva--gora/forening/foreningsbidrag-och-stipendier/tillgang-till-kommunala-anlaggningar-och-lokaler.html"
    anteckning: "Inför varje säsong tilldelas aktiva föreningar återkommande tider automatiskt, utan ansökan. Barn/unga och personer med funktionsnedsättning prioriteras generellt, elitverksamhet prioriteras i idrottsanläggningar, pensionärsriktad verksamhet prioriteras dagtid i Kvarnhjulet. Enstaka bokningar görs via http://bokning.tyreso.se/. Föreningar som uppfyller allmänna bestämmelser (inkl. stödjande/intresseorganisationer) omfattas av subventionerad föreningstaxa. Regelverk §3.11 — i 2024 års version sammanslaget med det som i 2020 års version hette 'Subventionerade lokaler' (dåvarande §3.9)."
  - id: "tyreso-ekonomiskt-stod-socialt"
