    anteckning: "KONFLIKT VID DUBBELHÄMTNING (föregående version): en automatisk sammanfattning av kommunens webbsida angav 'sista ansökningsdag 20 november 2025'. Det officiella regelverket (antaget av kommunstyrelsen 2025-08-05) anger endast att elitbidrag 'kan sökas och beviljas en gång per år' via kommunens e-tjänst, utan fast kalenderdag — kommunstyrelsen beslutar årligen om bidragets storlek i samband med budgetbeslutet. Ingen fast deadline kunde verifieras i primärkällan, satt till löpande. Kontrollerad på nytt vid omkörning 2026-07-20, ingen ny avvikelse hittad. Fördelningsmodell: 10 procent av anslaget (pott 1) delas lika mellan alla mottagare, 65 procent (pott 2) mellan mindre och större lagidrotter, resterande (pott 3) mellan större lagidrotter."
