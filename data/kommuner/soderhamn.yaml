    anteckning: "Ansökan skickas till samhallsservicenamnden@soderhamn.se eller per post till Söderhamns kommun, Samhällsservicenämnden, 826 80 Söderhamn. KONTROLLERAT VID OMKÖRNING 2026-07-20 (§2.5): det bakomliggande antagna regelverket (SKFS 08:2024:02, antaget i samhällsservicenämnden 2024-02-28) anger explicit fasta ansökningsdatum 31 mars och 30 september. Kommunens webbsida (senast uppdaterad 2026-06-30, nyare källa) anger dock uttryckligen 'Bidraget kan sökas löpande'. Webbsidan vinner enligt §2.5 eftersom den är nyast — deadlines.typ förblir 'lopande'. Regelverket bekräftar i övrigt samma krav och syfte (stöd utöver ordinarie bidragsformer, minst 10 medlemmar, ANDT-policy för barn-/ungdomsverksamhet, genomförande inom två år)."
  - id: "soderhamn-enskild-vag"
    namn: "Bidrag till enskild väg"
    kategori: ["ovrig"]
    malgrupp: "Vägföreningar och vägsamfälligheter (eller väghållare med skriftlig överenskommelse om kostnadsdelning och utsedd företrädare) som ansvarar för enskild väg i Söderhamns kommun"
    deadlines:
      typ: "fasta"
      datum: ["04-30"]
    krav:
      - "Vägen ska betjäna minst tre permanentbebodda fastigheter (drift, ej statsbidragsberättigad väg)"
      - "Väghållningen ska vara organiserad genom vägförening/vägsamfällighet, eller genom skriftlig överenskommelse mellan väghållarna med en utsedd företrädare som tar emot bidraget"
      - "Utfartsväg (tillfartsväg utan permanentboende) ska vara minst 200 meter lång"
    belopp: "Drift, ej statsbidragsberättigad väg: högst 5,30 kr/meter. Drift, utfartsväg: 1,70 kr/meter. Anläggning, statsbidragsberättigad väg: 20 procent av Vägverkets/Trafikverkets godkända kostnad. Anläggning, ej statsbidragsberättigad väg: efter prövning, högst 45 procent av kommunens godkända anläggningskostnad"
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://www.soderhamn.se/sidor/trafik-och-gator/gator/enskild-vag.html"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20 (specialkategori, RESEARCH_SPEC_v2.md §2.1 punkt 5). Kommunen kan hjälpa till att bilda vägsamfälligheter för skötsel av enskild väg. Ansöks via e-tjänst (e-tjanster.soderhamn.se/oversikt/overview/477 för ej statsbidragsberättigad väg, /478 för utfartsväg), skickas till Söderhamns kommun, Sektor Samhällsservice. Administreras separat från bidragsreglementet SKFS 08:2021:04 och dess ansökningssystem Rbok."
