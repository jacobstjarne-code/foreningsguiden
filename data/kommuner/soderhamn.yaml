# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md, §2 reviderat till
# v2.1 — källkonvergens). Föregående version (verifierad 2026-07-19) hade
# redan ett gediget regelverks-baserat researcharbete för huvuddelen av
# bidragen (SKFS 08:2021:04 "Bestämmelser för kommunala bidrag till
# föreningar och organisationer", Elitbidrag SKFS 08:2025:01, Föreningsmil-
# jonen SKFS 08:2023:03, lästa direkt ur PDF). Den här omkörningen bekräftade
# att det arbetet står sig och utökade täckningen genom att systematiskt gå
# igenom källkategorierna v1 inte sökte metodiskt: förvaltningarnas egna
# sidor utanför kultur/fritid, självservice-/e-tjänstsidor, portalen, samt
# specialkategorierna väg/samfälligheter, bygdegårdar, stiftelser/fonder,
# byalag och studieförbund (RESEARCH_SPEC_v2.md §2.1 punkt 2–5).
#
# Metod: (1) Regelverket verifierat fortsatt aktuellt via kommunens författ-
# ningssamling — SKFS 08:2021:04 har ingen nyare ersättare (soderhamn.se/
# sidor/kommun-och-politik/styrdokument/forfattningssamling.html). (2) Kom-
# munens huvudöversikt för föreningsbidrag hämtad, alla undersidor och
# e-tjänstlänkar kartlagda. (3) Självservice: e-tjanster.soderhamn.se-
# översikterna för varje bidrag identifierade. (4) Portalen soderhamn.rbok.se
# hämtad — bekräftat JS-renderat applikationsskal utan statisk bidragsupp-
# räkning (endast navigationsmeny: Boka/Ansök/Föreningsregister/Logga in),
# loggat EJ_EXTRAHERBAR. (5) Specialkategorier genomsökta en och en: enskild
# väg/vägföreningar/vägsamfälligheter (NY), bygdegårdar (redan täckt av
# "Bidrag till allmän samlingslokal"), stiftelser/fonder (NY), byalag/sam-
# hällsföreningar (landsbygdsbidraget täcker föreningar generellt; "kommun-
# delspengen" som kommunbygderådet ALLiS administrerar kunde INTE källbe-
# läggas på kommunens egen domän, se nedan), studieförbund (redan täckt).
#
# NYTT VID DENNA OMKÖRNING (2 bidrag tillagda, se respektive post för detalj):
# - "Bidrag till enskild väg" — vägföreningar/vägsamfälligheter, special-
#   kategori §2.1 punkt 5. Saknades helt i föregående version.
# - "Stiftelser och fonder" — samlat bidrag per §2.7. Kommunen förvaltar
#   minst 22 stiftelser, varav minst 13 är sökbara; minst fyra av dessa
#   (verifierat) tillåter uttryckligen både privatpersoner OCH föreningar.
#   Saknades helt i föregående version.
#
# KONFLIKT LÖST VIA §2.5 (NYARE VINNER) — INGEN ÄNDRING AV FÄLTVÄRDE:
# "Föreningsbidrag för utveckling av landsbygden": det bakomliggande
# regelverket (SKFS 08:2024:02, antaget i samhällsservicenämnden 2024-02-28)
# anger explicit fasta ansökningsdatum 31 mars och 30 september. Kommunens
# webbsida (senast uppdaterad 2026-06-30 — nyare än regelverket) anger
# uttryckligen "Bidraget kan sökas löpande". Webbsidan vinner enligt §2.5
# eftersom den är nyast — deadlines.typ förblir "lopande", oförändrat från
# föregående version. Båda källorna och daten är loggade, se anteckning på
# bidraget och körningsrapportens konflikter.log.
#
# UTESLUTNA MED KATEGORISKT SKÄL (§2.4):
# - "Riktlinjer för lån till föreningar" (SKFS 08:2021:01) — är ett lån
#   (kräver amortering, säkerhet/pantbrev, ränteriskbedömning av kommunen),
#   inte ett bidrag. Kategoriskt en annan stödform än de bidrag schemat avser.
#   https://www.soderhamn.se/download/18.77d000c1180b44e21a821f9/1655281566881/Riktlinjer%20f%C3%B6r%20l%C3%A5n%20till%20f%C3%B6reningar%20SKFS%2008:2021:01.pdf
# - "Kulturstipendiet för unga" (30 000 kr) — individuellt stipendium till
#   konstnärligt verksam privatperson under 25 år, inte ett föreningsbidrag.
#   https://www.soderhamn.se/sidor/uppleva-och-gora/kultur/kulturutmarkelser-och-stipendier.html
# - "Kulturpriset"/"Hedersomnämnande" — nomineringsbaserad utmärkelse
#   (vartannat år), inte ett sökbart bidrag med ansökningsformulär/villkor.
#   https://www.soderhamn.se/sidor/uppleva-och-gora/kultur/kulturutmarkelser-och-stipendier.html
# - "Årets föreningsledarutmärkelse" (30 000 kr) — en förening kan NOMINERA
#   en enskild ledare, men utmärkelsen (och pengarna) tillfaller privatper-
#   sonen, inte föreningen. Samma kategori som Kulturstipendiet.
#   https://www.soderhamn.se/sidor/omsorg-och-stod/ekonomi-och-forsorjning/stipendier-och-fonder/arets-foreningsledarutmarkelse.html
# - 8 av kommunens stiftelser är märkta "Kan ej sökas" på kommunens sida
#   (intern tilldelning av sektorschef/rektor/enhetschef, i huvudsak elev-
#   fonder för enskilda studenter) — ingår inte i det samlade "Stiftelser
#   och fonder"-bidraget, som bara omfattar de faktiskt sökbara stiftelserna.
# - "Stiftelsen Per Ahlquists donationsfond" — administreras via extern
#   huvudman (Hälsinglands Utbildningsförbund/Staffangymnasiet, hufb.se),
#   inte kommunens egen domän eller nämnd (§2.4 + §4).
#
# EJ_EXTRAHERBAR / EJ KÄLLBELAGT:
# - soderhamn.rbok.se — JS-renderad applikation, ingen statisk bidragslista.
# - "Kommundelspengen" (enligt sekundärkällor 600 000 kr/år 2026–2028 till
#   byarna, administreras av kommunbygderådet ALLiS via ett IOP-avtal med
#   kommunen sedan 2018) — identifierad via ALLiS egen sajt (soderhamns-
#   bygder.se, EJ kommunens domän) och lokalpress. Ingen sida på
#   soderhamn.se med egen URL, beloppsdetaljer eller ansökningsprocess
#   kunde lokaliseras vid denna körning och kan därför inte källbeläggas
#   enligt §4 (endast kommunens egen domän duger som källa). Flaggas för
#   uppföljning nästa körning — trolig kandidat om/när kommunen publicerar
#   en egen sida.
#
# Dubbelhämtat i två oberoende pass (§3). Elitbidrags- och samlingslokal-
# konflikterna från föregående version kvarstår oförändrade (se anteckning
# på respektive bidrag nedan). Spot-checkas av Jacob/Fable före publik deploy.
