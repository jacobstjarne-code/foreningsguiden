    kalla_url: "https://www.soderhamn.se/sidor/omsorg-och-stod/ekonomi-och-forsorjning/stipendier-och-fonder.html"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20 (RESEARCH_SPEC_v2.md §2.7, samlat bidrag). Kommunen förvaltar minst 22 stiftelser/fonder, varav minst 13 är sökbara med gemensamt ansökningsdatum 31 mars (övriga 8 är märkta 'Kan ej sökas' — tilldelas internt av sektorschef/rektor/enhetschef, i huvudsak elevfonder för enskilda studenter, och ingår inte här; ytterligare en, Per Ahlquists donationsfond, administreras via extern huvudman och är utelämnad enligt §2.4/§4). Av de sökbara stiftelserna tillåter flera uttryckligen både privatpersoner och föreningar att söka (verifierat vid denna körning: Stiftelsen Söderhamns sociala fond — föreningar som arbetar socialt bland barn/vuxna med särskilt stödbehov, 10 256 kr 2025; Stiftelsen Wennströmska minnesfonden — Söderhamn-Sandarne församling, 232 157 kr 2026; Stiftelsen Edlingska fonden — Söderhamn-Sandarne församling, 35 011 kr 2026; Stiftelsen Frida Bodells fond — Skogs församling, 12 952 kr 2025). Belopp och exakt målgrupp varierar per stiftelse — se respektive stiftelses undersida under kalla_url. Beslut fattas i juni, i huvudsak av Barn- och lärandenämndens presidium."
forutsattningar:
  - id: "soderhamn-bidragsberattigad-forening"
    vad: "Bli bidragsberättigad förening"
    beskrivning: "Föreningen ska uppfylla Skatteverkets krav för en allmännyttig ideell förening: syftet ska vara till nytta för allmänheten, minst 90 procent av verksamheten ska bidra till att uppfylla föreningens syfte, minst 80 procent av inkomsterna ska användas till detta syfte, och föreningen ska vara öppen för alla som vill bli medlemmar. Därutöver krävs minst 10 medlemmar som betalar medlemsavgift, säte och stämma i Söderhamns kommun, samt styrelse och revisorer valda på årsmöte. Föreningar som bedriver barn- och ungdomsverksamhet ska ha en nedtecknad policy mot alkohol, narkotika, doping och tobak (ANDT-policy)."
    system: "Rbok"
