# Källa verifierad 2026-07-20 mot sodertalje.se, metod RESEARCH_SPEC_v2.1 §2
# (källkonvergens). Huvudkälla: "Regler och riktlinjer för föreningsbidrag"
# (dnr KS 2024/357, fastställt av kommunfullmäktige 2024-11-04, gäller från
# 2025-01-01) — hämtad som PDF och extraherad lokalt med pdftotext eftersom
# WebFetch inte kunde läsa den komprimerade PDF-strukturen direkt. 16
# bidragsformer i huvudregelverket (kultur- och fritidsnämnden). Utöver
# detta identifierades sex bidrag i separata styrdokument från andra
# nämnder/kontor (socialnämnden, tekniska nämnden, kommunstyrelsen) samt två
# tillfälliga 2026-bidrag (Kulturåret 2026, valfrämjande insatser 2026) —
# se tackning.log-sektionen nedan för fullständig avstämning. Portalen
# (sodertalje.fri-go.se / friweb.sodertalje.se) är på annan domän än
# sodertalje.se och räknas därför inte som källa per spec §"Endast
# sodertalje.se-domänen räknas som källa"; den gick heller inte att nå
# (404/DNS-fel) vid försök. Spot-checkas av Jacob före publik deploy.
#
# TÄCKNINGSAVSTÄMNING (RESEARCH_SPEC_v2.1 §2.3):
# Källor konsulterade:
#   1. Regelverk: sk-regler-och-riktlinjer-foreningsbidrag-003.pdf (2025-01-01) — 16 bidragsformer
#   2. Förvaltningssidor: Socialkontoret (riktlinjer-for-verksamhetsbidrag.pdf, 2020-02-25) — 1 bidrag
#      Tekniska nämnden (stod-till-enskild-vaghallare) — 1 bidrag
#      Kommunstyrelsen (kriterier-valframjande-insatser-2026, dnr KS 2026/000059) — 1 bidrag
#      Kultur- och fritidsnämnden, tillfälligt (regler-foreningsbidrag-kulturaret-2026, dnr KFN 2025/000098) — 1 bidrag
#      Kultur- och fritid, nyhetssida (Elitidrottsstöd, beslutat av KS 2026-02-20) — 1 bidrag
#      Kultur- och fritid, egen sida (Representationsanslaget) — 1 bidrag
#   3. Självservice/e-tjänst: foreningsstod/blanketter-och-e-tjanster/ — inga ytterligare bidrag utöver ovan
#   4. Portal: sodertalje.fri-go.se / friweb.sodertalje.se — EJ_EXTRAHERBAR (annan domän än sodertalje.se + 404/DNS-fel vid åtkomstförsök)
#   5. Specialkategorier:
#      - Väg/samfälligheter: BEKRÄFTAT (kommunalt driftbidrag till enskilda vägar, tekniska nämnden)
#      - Bygdegårdar/samlingslokaler: BEKRÄFTAT (Anläggningsbidrag till allmänna samlingslokaler, ingår i huvudregelverket 3.13.2, täcker bygdegårdar, hembygdsgårdar, Folkets hus/park)
#      - Stiftelser/fonder föreningar kan söka ur: EJ FUNNET — sökningar efter en samlad Södertälje-stiftelsesida för föreningar (motsvarande Halmstads 52 stiftelser) gav inga träffar på sodertalje.se; enda träffar var Länsstyrelsens generella stiftelseregister (ej sodertalje.se-domän). MEDVETET_UTESLUTET av det skälet — inget kommunförvaltat stiftelsesamlingsbidrag hittat att skriva som ett samlat bidrag (§2.7).
#      - Samhälls-/byalag: EJ FUNNET som eget bidragsspår utöver ordinarie föreningsbidrag/anläggningsbidrag.
#      - Studieförbund: BEKRÄFTAT, ingår i huvudregelverket 3.14 (två delbidrag: allmänt + funktionsnedsättning).
# Antal identifierat per källa: regelverk 16, förvaltningssidor/särskilda dokument 6 (socialnämnd, väg, val, kulturår, elitidrott, representation).
# Antal skrivet till YAML: 22.
# Avvikelser:
#   - SKRIVET_EJ_I_REGELVERK: Socialnämndens verksamhetsbidrag, Kommunalt driftbidrag till enskilda vägar,
#     Elitidrottsstöd, Representationsanslaget, Föreningsbidrag Kulturåret 2026, Valfrämjande insatser 2026 —
#     samtliga sex finns på sodertalje.se men inte i kultur- och fritidsnämndens regelverk (andra nämnder/tillfälliga
#     dokument). Skrivna ändå per §2.3.
#   - MEDVETET_UTESLUTET: samlat stiftelsebidrag — inget sådant hittat på sodertalje.se-domänen (se ovan).
#   - EJ_EXTRAHERBAR: bidragsportalen (fri-go.se/friweb.sodertalje.se) — annan domän + ej nåbar.
#   - Elitidrottsstöds exakta beloppstak per förening är inte publicerat (endast totalsumma 2026: 5 mnkr till
#     nio föreningar + tre individuella idrottare) — belopp satt till null.
