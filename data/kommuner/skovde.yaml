# Källa verifierad 2026-07-23 mot skovde.se enligt RESEARCH_SPEC_v2 §2
# (källkonvergens). Regelverk "Allmänna regler för bidrag" (KF 2022-02-28,
# reviderad 2026-03-04) + dedikerat regelverk för funktionsnedsättning
# (KF 2022-02-28, reviderad 2025-04-16) hämtade som PDF och lästa i sin
# helhet (pdftotext). Nio sidor under naringsliv-foretag-forening/forening/
# foreningsbidrag/ lästa djupt — flera av dem innehåller 3-7 namngivna
# delbidrag (bygdegård, ungdomsverksamhet, funktionsnedsättning) som
# skrivits som separata rader eftersom de har olika deadlines/belopp.
# Specialkategorier: enskilda vägar/vägföreningar (Samhällsbyggnad, egen
# sidträd) och socialt arbete (Socialnämnden, självservice-portal) låg
# utanför kultur- och fritidsnämndens sidträd, i linje med spec-varningen
# om att bidrag sprids över förvaltningar. Se tackning.log och
# konflikter.log i samma katalog för avstämning.
