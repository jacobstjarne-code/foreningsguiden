    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION — hittades bara i regelverket (antaget av fullmäktige 2000-04-10, § 38), ingen nuvarande redaktionell sida länkar hit. Fritidsnämndens ansvar övertogs av Kultur- och fritidsnämnden 2001-07-01. Bidraget betalas ut kvartalsvis i förskott efter beslut i nämnden, som fastställer de närmare villkoren (inget schablonbelopp publicerat). Ansökan ska lämnas årligen; inget specifikt datum publicerat."
