# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte redaktionella sidor först). Föregående version
# (verifierad 2026-07-19) rapporterades med 12 bidrag och hade redan
# identifierat de tre förvaltningarna (Kultur- och fritidskontoret,
# Socialkontoret, Vård- och omsorgskontoret) korrekt — v1-passet var för
# Sollentunas del ovanligt bra, men missade ändå fyra bidrag som bara fanns
# i regelverket eller nedgrävda som underklausul i en PDF som redan lästs.
#
# Metod: (1) Regelverket. Hela Sollentunas författningssamlingskategori
# "Bidrag, stiftelser och stipendier" hämtades och samtliga elva PDF:er i
# den listades och lästes i sin helhet (curl + pdftotext -layout), inte
# bara de sex som redan var kända. Detta gav tre helt nya fynd:
#   - "Bidrag till föreningsdrift av kommunägda fritidsanläggningar"
#     (antagen av fullmäktige 2000-04-10 § 38) — finns ENDAST i regelverket,
#     ingen nuvarande redaktionell sida länkar till den. Exakt det mönster
#     v2.1 varnar för (§0/§2.1): kommunens sidträd speglar inte vad som är
#     beslutat.
#   - "Bidrag till fristående enheters drift av fritidsverksamhet för barn-
#     och ungdomar" (antagen 1999, reviderad senast 2012) — samma mönster,
#     endast i regelverket.
#   - Ett helt nytt bidrag DOLT SOM UNDERKLAUSUL i en redan använd källa:
#     § 3.4 "Stöd till fysisk aktivitet på recept (FaR)" i
#     "Bidrag till ungdomsorganisationer.pdf" — samma PDF som redan
#     användes för aktivitetsstöd/lokalstöd/utbildningsstöd i föregående
#     körning, men bara §§ 1–3.3 lästes då. §3.4 (sista stödformen i
#     dokumentet, sida 3 av 4) beskriver ett separat, kompletterande stöd
#     på 50 kr/individ och aktivitetstillfälle för föreningar med utbildade
#     FaR-ledare. Detta är precis den typ av miss v2.1 §0 beskriver
#     ("flera distinkta bidrag under samma URL missas") — löst genom att
#     läsa hela dokumentet rad för rad i stället för att stanna vid första
#     träffen.
# (2) Förvaltningarnas egna sidor lästes i sin helhet (samtliga sex
# undersidor under Föreningsbidrag, plus Bilda förening, FaR-sidan,
# Trygghet i föreningslivet, samt sidorna för stipendier/priser/
# utmärkelser) — inga fler ekonomiska föreningsbidrag utöver det som redan
# fanns i regelverket eller webbtexten.
# (3) Självservice/e-tjänst (§2.1.3): sjalvservice.sollentuna.se
# genomsöktes — bekräftar en generisk "Föreningsbidrag - gör en ansökan"
# e-tjänst, ingen ny bidragsform. En tredje, tidigare okänd ansökningsväg
# hittades dock: boka.sollentuna.se/bidrag/ kör "FRI Webb-Bidrag" (Idavall
# Data AB — ett annat system än Interbook FRI trots liknande namn). Denna
# gick, ovanligt nog, att läsa direkt (ej JS-blockerad för de två poster
# som visas offentligt): Lokalbidrag och Utbildningsstöd, båda för
# "Bidragsår 2024". Innehållet (regeltext, belopp, datum) matchade exakt
# regelverket och stärker alltså befintliga poster snarare än att lägga
# till nya — men systemet verkar vara en äldre/parallell ingång som inte
# längre är den som länkas från de aktuella bidragssidorna (dessa pekar på
# Interbook/ApN). Loggat som kompletterande källa, inte primär.
# (4) Ansökningsportalen sollentuna.interbookfri.se (Interbook FRI) samt
# boka.sollentuna.se/forening/ (föreningsregister/sökkatalog, körs också
# på Interbook FRI-motorn under huven) är båda JS-renderade och gick inte
# att räkna upp — EJ_EXTRAHERBAR, se nedan.
# (5) Specialkategorier (§2.1.5): vägföreningar/vägsamfälligheter och
# bygdegårdar/byalag genomsöktes riktat — INGET hittades. Sollentuna är en
# tätortsdominerad Stockholms-förortskommun utan den typ av landsbygds-/
# skärgårdsbidrag som fanns i t.ex. Karlskrona; ingen indikation på att
# kommunen administrerar enskilda vägar eller har en landsbygdsmiljon.
# Stiftelser: Sollentuna Skolsamfond och Brit af Klerckers ungdomsfond
# identifierade och uteslutna (se MEDVETET_UTESLUTET) — båda riktar sig
# till enskilda elever/behövande, ingen stiftelse öppen för föreningar som
# sökande hittades (till skillnad från Växjö/Karlstad). En tredje fond,
# "Sollentuna sociala samfond", nämns i ett historiskt sökträffsutdrag
# (bildad genom sammanslagning av åtta äldre fonder, medel delas ut på
# socialnämndens initiativ utan fast ansökningsprocess) men sidan
# https://www.sollentuna.se/uppleva--gora/stipendier-priser-och--utmarkelser/Sollentuna-sociala-samfond
# gav 404 vid denna körning — ingen levande, citerbar källa (§4 kräver
# 200-svar). Inte skrivet, inte heller kategoriserat som säkert uteslutet;
# flaggat för framtida uppföljning om kommunen publicerar en ny sida.
#
# Konflikter: inga fältkonflikter mellan de två oberoende omgångarna denna
# körning. Befolkningssiffran kontrollerades mot en extern aggregator
# (Newsworthy, SCB-baserad kvartalssiffra 78 157 per 2026-03-31) men
# eftersom källan inte är kommunens egen domän (§4: "Endast kommunens egen
# domän är källa") behölls kommunens egen publicerade siffra (78 033,
# 2025-12-31) oförändrad.
#
# Ansökningssystem: namnet normaliserat till "Interbook FRI" (matchar
# domänen sollentuna.interbookfri.se och konventionen i övriga kommunfiler
# i denna batch, t.ex. Karlskrona). Tidigare version skrev bara "Interbook".
#
# Uteslutna (kategoriskt skäl, §2.3–§2.4):
# - Sollentuna kommuns kulturpris, Årets initiativtagare, Årets
#   föreningsledare, Stipendiet ung kultur, Stipendiet ung idrottsutövare,
#   Boris Kunos fotostipendium, Släkten Rudbecks stipendium — samtliga
#   individpriser/stipendier till enskild person, nominering/urval av
#   nämnden, inte konkurrensutsatt ansökan om verksamhets-/projektbidrag.
#   https://www.sollentuna.se/globalassets/kommun-och-politik/sa-styrs-sollentuna/sollentuna-forfattningssamling-sfs/stiftelser-och-stipendier/regler-for-kultur--och-fritidsnamndens-utmarkelser-och-stipendier-2025.pdf
#   GRÄNSFALL: Sofia Magdalenas sköld och Byggnadsvårdsdiplomet kan enligt
#   samma regelverk gå till "person, organisation eller företag" — men är
#   hedersutmärkelser (en sköldkopia respektive ett diplom) genom
#   nominering, inte sökbara ekonomiska bidrag. Samma bedömning som
#   Karlskronas uteslutning av sitt Kulturpris. Flaggat för Fables
#   granskning, inte en okontroversiell uteslutning.
# - Sollentuna lärarpris/skolledarpris, Sollentuna Trygghetspris —
#   individuella pris till lärare/rektor respektive för en trygghetsinsats,
#   nominering av enskild person, ingen föreningskoppling.
#   https://www.sollentuna.se/uppleva--gora/stipendier-priser-och--utmarkelser/
# - Sollentuna Skolsamfond — stadgeenligt riktad till enskilda ELEVER
#   (premier/stipendier för goda kunskaper, kamratanda eller flit), beslut
#   av gymnasienämnden. Individuellt, ingen föreningsansökan.
#   https://www.sollentuna.se/globalassets/kommun-och-politik/sa-styrs-sollentuna/sollentuna-forfattningssamling-sfs/bidrag-stiftelser-och-stipendier/stadgar-for-sollentuna-skolsamfond.pdf
# - Brit af Klerckers ungdomsfond — stiftelse med eget styrelseskick
#   (ledamöter utses av Sollentuna församlings kyrkoråd samt två kommunala
#   nämnder), ändamål är stipendier till enskilda ungdomar samt understöd
#   till enskilda tbc-sjuka. Individuellt riktad OCH annan huvudman
#   (samförvaltas med Svenska kyrkans lokala församling).
#   https://www.sollentuna.se/globalassets/kommun-och-politik/sa-styrs-sollentuna/sollentuna-forfattningssamling-sfs/stiftelser-och-stipendier/stadgar-for-berit-af-klerckers-ungdomsfond-reviderad-2015-11-05.pdf
# - Regler för bidrag för åtgärder mot buller från kommunens gator och
#   vägar ("bullerbidrag") — riktas till enskild FASTIGHETSÄGARE för en-
#   och tvåbostadshus, inte till föreningar.
#   https://www.sollentuna.se/globalassets/kommun-och-politik/sa-styrs-sollentuna/sollentuna-forfattningssamling-sfs/bidrag-stiftelser-och-stipendier/regler-for-bidrag-for-atgarder-mot-buller-fran-kommunens-gator.pdf
# - Regler för kommunalt bostadsbidrag för personer med funktionsnedsättning
#   (KBF) samt det allmänna Bostadsanpassningsbidraget — individuellt
#   riktade bidrag till enskild person med funktionsnedsättning, söks av
#   privatperson, ingen föreningskoppling.
#   https://www.sollentuna.se/globalassets/kommun-och-politik/sa-styrs-sollentuna/sollentuna-forfattningssamling-sfs/bidrag-stiftelser-och-stipendier/regler-for-kommunalt-bostadsbidrag-for-personer-med-funktionsnedsattning.pdf
# - Ansökan om specialtid i idrottshallar (för föreningar med verksamhet
#   för personer med funktionsnedsättning) — bokning av anläggningstid,
#   inget ekonomiskt bidrag.
#   https://www.sollentuna.se/uppleva--gora/foreningar-och-foreningsliv/Foreningsbidrag/aktiviteter-for-personer-med-funktionsnedsattning/
# - Bilda förening, Föreningsregister, Lotteritillstånd, FaR-informations-
#   sidan (själva sidan; §3.4-stödet i regelverket ÄR skrivet, se
#   sollentuna-idrott-far), Trygghet i föreningslivet — informations-/
#   registreringssidor utan ekonomiskt bidrag kopplat.
#
# EJ_EXTRAHERBAR:
# - sollentuna.interbookfri.se (Interbook FRI) — JS-renderad, kräver
#   inloggning, gick inte att räkna upp via fetch/curl.
# - boka.sollentuna.se/forening/ — JS-renderad föreningskatalog/sökportal
#   (körs på Interbook FRI-motorn), ingen bidragslistning i sig.
# - boka.sollentuna.se/bidrag/ (Idavall FRI Webb-Bidrag) — DELVIS
#   extraherbar (två offentliga poster för Bidragsår 2024 kunde läsas),
#   men listan är begränsad till kategorin "Stöd till ungdomsorganisationer"
#   och tycks vara en äldre parallell ingång som inte länkas från
#   nuvarande bidragssidor. Innehållet bekräftade befintliga poster,
#   gav inga nya.
#
# Sollentuna har tre administrativa hem för föreningsbidrag: Kultur- och
# fritidskontoret (störst — idrott, fritid, kultur, funktionsrätt,
# studieförbund samt de nyfunna fritidsanläggnings-/fritidsverksamhets-
# bidragen och FaR-stödet), Socialkontoret (social verksamhet) och Vård-
# och omsorgskontoret (seniorer 65+). Idéburet offentligt partnerskap
# (IOP) kan tecknas av VILKEN nämnd som helst och är därför upptaget som
# tvärgående. Ansökan sker primärt via Interbook FRI (idrott/fritid) samt
# ApN (aktivitetsstödets höstansökan), medan social/seniorer-bidrag söks
# via e-tjänst/pappersblankett till Socialkontoret/Vård- och omsorgskontoret,
# och kultur-/studieförbundsbidrag via blankett/e-post. Spot-checkas av
# Jacob/Fable före publik deploy.
kommun: "Sollentuna"
