# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19, v1) hade redan 17 bidrag och fyra förvaltningar identifierade —
# ett av de mer grundliga v1-resultaten. Denna omkörning bekräftar samtliga
# 17 som korrekta (en konflikt uppstod, se nedan) och lägger till 6 nya
# bidrag som låg utanför kultur- och fritidsnämndens sidträd: två
# vägbidrag (Miljö- och samhällsbyggnadsförvaltningen) och två aggregerade
# stiftelseposter (Kommunstyrelsen respektive Arbetslivs- och
# socialnämnden). Dessutom delades en tidigare sammanslagen lokalbidragspost
# upp i tre distinkta bidrag eftersom regelverket definierar dem som tre
# separata paragrafer (§2.2.3–2.2.5) med olika belopp.
#
# Metod: (1) Regelverket. "Bidragsbestämmelser" för Kultur- och
# fritidsförvaltningen (daterat 2020-11-09, publicerat som "KFN
# bidragsregler 2021-01-01.pdf") hämtades och lästes i sin helhet via
# pdftotext -layout — bekräftar samtliga tio kultur-/fritidsbidrag samt det
# uteslutna kartstödet. Utöver detta hittades ett HELT SEPARAT regelverk
# utanför kultur- och fritidsnämndens spår: "Bestämmelser om driftbidrag
# till enskilda vägar" (Miljö- och samhällsbyggnadsnämnden 2025-02-11,
# godkänt av Kommunfullmäktige 2025-05-15 § 86, i kraft 2025-07-01, ersätter
# bestämmelser antagna 2016-03-10) samt "Upprustningsbidragsmodell"
# (framtagen 2021-01-05) — båda lästa i fulltext via pdftotext.
# (2) Förvaltningarnas egna sidor lästa i sin helhet: bidrag-stod-och-
# stipendier (huvudöversikt), kulturverksamhet, fritids-och-
# idrottsverksamhet, pensionarsverksamhet, funktionshinderorganisationer,
# evenemangsstod, stiftelsen-for-fritidens-framjande, marknadsforingsavtal,
# kommunalt-lonebidrag, ekonomiskt-stod-vid-feriearbete,
# kommundelsutveckling — samtliga omhämtade oberoende av v1-körningen.
# (3) Självservice/specialkategorier (§2.1.5) genomsöktes riktat:
# vägföreningar/vägsamfälligheter (TRÄFF — Miljö- och
# samhällsbyggnadsförvaltningens spår, se ovan, låg helt utanför kultur-
# och fritidsnämndens sidträd/regelverk, samma systematiska blinda fläck
# som i Mölndal/Sundsvall/Karlskrona), bygdegårdar/samlingslokaler (täcks
# av de tre uppdelade lokalbidragen, inget separat funnet), stiftelser/
# fonder (TRÄFF — "Stiftelser och fonder att söka medel ur"-sidan på
# kommun--demokrati-nivå ledde till tre distinkta stiftelsegrupper:
# Kommunstyrelsens fem stiftelser, Omsorgsnämndens nio fonder och
# Arbetslivs- och socialnämndens stiftelser — rå-HTML-extraherad via curl
# + regex, inte AI-sammanfattad, för att säkerställa exakt målgruppstext
# per stiftelse), byalag/samhällsförening (täcks av kommundelsutveckling,
# inget ytterligare funnet), studieförbund (redan täckt av
# studieförbundsbidraget). (4) Ansökningsportalen falun.actorsmartbook.se
# bekräftat EJ_EXTRAHERBAR — AngularJS-mallar, inget bidragsinnehåll
# synligt utan JavaScript-körning.
#
# Befolkning: kommunens egen "Kommunfakta"-sida (uppdaterad 2026-02-23)
# anger fortfarande "cirka 59 750" — oförändrat från v1, ingen konflikt.
#
# KONFLIKT (§2.5, ej löst — se konflikter.log): pensionärsbidragets belopp
# gav TRE olika värden i tre källor med olika datum: redaktionella sidan
# pensionarsverksamhet.html (20 kr/medlem, sidan uppdaterad 2025-06-05),
# "Stöd för företag och föreningar på landsbygden 2026"-foldern (50
# kr/medlem, PDF publicerad 2026-02-24 enligt nedladdningslänkens
# tidsstämpel) och Kommunala pensionärsrådets sammanträdesprotokoll
# 2026-02-11 (anger att "pensionärernas bidrag från Falu kommun 2025 om 30
# kronor/medlem utbetalats i slutet av januari 2026"). En strikt
# datumjämförelse skulle ge landsbygdsfoldern (2026-02-24) företräde, men
# foldern är en allmän hänvisningsskrift från näringslivsavdelningen (inte
# den administrerande enhetens egen bidragssida) och protokollet beskriver
# en faktisk redan genomförd utbetalning (30 kr) på ett datum nästan lika
# nytt. Med tre inbördes motstridiga värden och en administrerande sida
# (Omsorgsförvaltningen) som inte bekräftar någon ändring: belopp satt till
# null, samtliga tre värden/källor/datum redovisade i bidragets anteckning
# och i konflikter.log. FLAGGAD för manuell kontroll direkt med
# Omsorgsförvaltningen före publik deploy.
#
# Uteslutna (kategoriskt skäl, §2.3–§2.4):
# - "Riktade verksamhetsbidrag: kartstöd" (bidragsbestämmelser §2.1.2,
#   "Riktade verksamhetsbidrag") — kartbidraget på 300 000 kr utbetalas i
#   sin helhet till EN namngiven mottagare (Falukretsens orienteringsklubb)
#   som sedan fördelar internt "utifrån klubbarnas interna dialog". Enskilda
#   orienteringsklubbar kan inte ansöka direkt hos kommunen om denna post —
#   samma struktur som Karlskronas uteslutning av Kvinnojouren Frideborgs
#   riktade anslag (en på förhand namngiven mottagare med fast formel, inte
#   ett allmänt sökbart bidrag). Bekräftat oförändrat sedan v1.
#   https://www.falun.se/download/18.7d272b3b181babd3d7365820/1657096546992/KFN%20bidragsregler%202021-01-01.pdf
# - Marknadsföringsavtal — GRÄNSFALL, flaggat explicit för Fables §6-grind.
#   Har två årliga ansökningsperioder (november/maj) vilket är
#   bidragslikt, men är strukturellt ett ömsesidigt sponsrings-/
#   marknadsföringskontrakt: motparten förbinder sig till exponering av
#   kommunens logotyp, banners och ambassadörskap i utbyte mot pengar, och
#   "Falu kommun kan även själv ta kontakt med aktörer" utan ansökan.
#   Strukturellt närmare betalning för motprestation än ansökan om stöd
#   till egen verksamhet — jämför Karlskronas uteslutning av
#   "Föreningsuppdrag". Bekräftat oförändrat sedan v1, men flaggat som
#   gränsfall (v1 hade inte denna nyansering).
#   https://www.falun.se/gora--uppleva/foreningar-och-bidrag/bidrag-stod-och-stipendier/marknadsforingsavtal.html
# - Idéburet offentligt partnerskap (IOP) — uttryckligen självdeklarerad
#   som ICKE ett bidrag: "IOP är inte detsamma som ett bidrag från Falu
#   Kommun till en verksamhet."
#   https://www.falun.se/kommun--demokrati/politik-och-demokrati/ideburet-offentligt-partnerskap.html
# - Hemsändningsbidrag — riktar sig till dagligvarubutiker (näringsidkare),
#   inte föreningar; 200 kr/hemsändning till lanthandlare för att sörja för
#   landsbygdshushållens varuförsörjning. Stöd som endast riktas till
#   företag (§2.4b).
#   https://www.falun.se/bygga-bo--miljo/landsbygd/service/hemsandning-av-mat.html
# - Bidrag till Region Dalarnas kulturinstitutioner (Stöd till
#   kulturinstitutioner) — administreras av Falu kommun/KFN men uttryckligen
#   förbehållet en fast, namngiven lista av sju-åtta regionala institutioner
#   (Dalarnas museum, Dalateatern, Bild och Form Dalarna, Länsbibliotek
#   Dalarna, Musik i Dalarna, Folkmusikens hus, Folkteatern i Dalarna,
#   Emaljverkstaden) — inte en allmänt sökbar post öppen för lokala
#   föreningar. Samma struktur som kartstödets uteslutning: fast mottagarlista,
#   inte konkurrensutsatt ansökan.
#   https://www.falun.se/gora--uppleva/foreningar-och-bidrag/bidrag-stod-och-stipendier/kulturverksamhet/stod-till-kulturinstitutioner.html
# - Falu kommun-priserna (Miljöpriset, Tillgänglighetspriset, Kulturpriset,
#   Mångfaldspriset — samtliga formellt öppna för "individer, föreningar,
#   företag eller organisationer") samt Kulturstipendiet och Barn- och
#   ungdomskulturpriset (endast individer/grupper) — samtliga är
#   NOMINERINGSBASERADE hederspriser (10 000–20 000 kr, nominering senast
#   1 oktober, beslut av kommunfullmäktige i december), inte en ansökan om
#   projekt-/verksamhetsfinansiering. Jämför Karlskronas uteslutning av
#   Kulturpriset: kan formellt gå till förening men är ändå ett
#   erkännande-pris, inte ett sökbart bidrag.
#   https://www.falun.se/kommun--demokrati/stipendier-bidrag-och-priser/falu-kommun-priserna.html
# - Omsorgsnämndens fonder (nio namngivna stiftelser: Sammils Anna
#   Erikssons fond, Mats Proselins fond, Djeken Maria Eriksson, Social
#   Samfond S4, Samfond S5, Pontus och Emelie Ljungdahls donation, Johanna
#   Erika Olssons patientfond, Hilda Dillströms patientfond, Samfond S3) —
#   samtliga uttryckligen riktade till enskilda pensionärer/boende på
#   ålderdomshem/servicehus, ingen förenings-ingång. Stöd som endast riktas
#   till privatpersoner (§2.4b).
#   https://www.falun.se/stod--omsorg/omsorgsnamndens-fonder.html
# - Stiftelsen A Carlssons testamentsfond (en av Kommunstyrelsens fem
#   stiftelser, se falun-ks-stiftelser nedan) — uteslutet ur den aggregerade
#   posten, målgrupp "fastighetsägare och hyresgäster efter samråd med
#   fastighetsägaren" för underhåll specifikt av Stadshotellets in- och
#   utsida, ingen förenings-ingång.
# - Föreningsregister och boknings-/bidragsportalens generella
#   informationssidor — ingen egen ekonomisk post, bara administrativa
#   funktioner (registrering, bokning).
#
# Falun har sex administrativa hem för föreningsbidrag: Kultur- och
# fritidsförvaltningen (störst, tio bidrag inom barn-/ungdom och publik
# verksamhet samt studieförbundsbidrag), Omsorgsförvaltningen
# (pensionärsbidrag), Arbetslivs- och socialförvaltningen
# (lönebidrag/feriearbetsstöd), Näringslivskontoret (evenemangsstöd,
# Stiftelsen för fritidens främjande), Miljö- och samhällsbyggnads-
# förvaltningen (NYTT vid denna omkörning — driftbidrag och
# upprustningsbidrag till enskilda vägar) samt Kommunstyrelsens förvaltning
# (NYTT vid denna omkörning — kommunstyrelsens fem stiftelser, varav fyra
# öppna för föreningar). Ansökan sker för kultur-/idrotts-/fritidsstöd samt
# funktionshinder-/evenemangsstöd via Föreningsportalen (ActorSmartbook,
# JS-renderad, EJ_EXTRAHERBAR); pensionärs-, löne- och feriearbetsstöd samt
# vägbidrag och stiftelser via pappersblankett/e-tjänst eller e-post — se
# anteckning per bidrag. Spot-checkas av Jacob/Fable före publik deploy.
