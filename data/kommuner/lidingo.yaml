# Källa verifierad 2026-07-21/22 mot lidingo.se. Kommunens webbplats migrerades
# till ny CMS-struktur (kultur-fritid/... i stället för toppmeny/...) — alla
# sökträffar på gamla toppmeny-URL:er gav 404 vid hämtning; nya, levande
# sidor under /kultur-fritid/foreningsliv/ och /omsorg-stod/ekonomiskt-stod/
# användes i stället (samtliga publicerade 2026-04-23 enligt sidfot). En äldre
# regelverks-PDF ("Bidragsregler föreningar i Lidingö stad", länkad från
# sökmotorcache med belopp som avviker från nuvarande sida, t.ex. 5 000 kr
# grundbidrag mot nuvarande 2 500 kr) gav 404 och bedöms överspelad av den
# nyare webbsidan (§2.5 — nyare källa vinner). Ingen fungerande PDF-regelverk
# hittades under körningen; kommunens sidor under föreningsbidrag/ fungerar
# själva som regelverk (grundvillkor + ansökan/utbetalning/bedömning-avsnitt).
# Bidragsportalen (app.bidragsportalen.se/lidingo) är en tredjepartstjänst som
# listar externa bidragsgivare (stiftelser, EU, statliga myndigheter) — inte
# stadens egna bidrag — och räknas därför inte som eget bidrag. Föreningsregistret
# FRI (fri.lidingo.se) är JS-renderat och går inte att räkna upp som portalkälla;
# fungerar som registrerings-/dokumentuppladdningssystem, inte bidragslista.
# Spot-checkas av Jacob före publik deploy.
