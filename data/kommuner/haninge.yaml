    vad: "Bli godkänd som bidragsberättigad förening"
    beskrivning: "Föreningen ansöker om att bli berättigad ekonomiskt stöd i Haninge kommun via Rbok. Kräver bl.a. att föreningen är ideell, registrerad i kommunens föreningsregister, har säte i Haninge, organisationsnummer, aktuellt bank-/plusgirokonto, minst 10 betalande medlemmar (IKFN-området), demokratiskt antagna stadgar och rutiner för begränsat utdrag ur belastningsregistret för ledare med direktkontakt med barn. Först när föreningen är godkänd kan den söka enskilda bidrag. Samma grundmodell gäller hos socialnämnden och äldrenämnden, som också kräver godkännande via Rbok innan respektive verksamhetsbidrag kan sökas."
