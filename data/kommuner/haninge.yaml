# Källa verifierad 2026-07-20 mot haninge.se, via källkonvergens (RESEARCH_SPEC v2 §2).
#
# TÄCKNING FASTSTÄLLD AV: "Riktlinje för ekonomiskt stöd till ideella föreningar inom
# IKFN:s verksamhetsområden" (idrotts-, kultur- och fritidsnämnden), beslutad
# 2025-12-03 (IKFN-2025-00149), gäller från 2026-01-01, ersätter IKFN 2024-11-13 §87.
# Detta är kommunens NYASTE och mest kompletta regelverk (44 sidor, täcker idrott/
# friluft, kultur/studieförbund, skollovsaktiviteter och trivselvandring i ett enda
# dokument). Källkonvergens bekräftad mot tre oberoende live-sidor: idrott-och-
# ovrigabidrag-kultur-fritid/, kulturbidrag/ och sjalvservice/foreningsbidrag---
# idrotts---och-friluftsforeningar/ — alla tre listar samma stödformer med samma
# deadlines som PDF:en.
#
# KONFLIKT LÖST ENLIGT §2.5 (NYARE VINNER): Ett äldre reglemente från 2017
# ("Reglemente för föreningsbidrag för ideella föreningar i Haninge kommun",
# kommunfullmäktige 2017-10-09, KOFN 2015/18) fanns kvar i kommunens dokumentarkiv
# och listade även Startbidrag (5000 kr), Utvecklingsbidrag (verksamhets-/ledar-
# utveckling), Partnerskapsavtal, Bidrag för föreningsdriven öppen verksamhet
# (skärgård/övrig) samt ett generellt Tillgänglighetsbidrag. Dessa saknas helt i
# 2025-12-03-regelverket. Sidorna som en gång beskrev dem separat (reglemente-ifn/,
# allmanna-villkor-IFN/) gav 404 vid hämtning 2026-07-20 — bekräftar att de är
# avvecklade/konsoliderade i den strukturomläggning som skett i tre steg sedan 2022
# (KF 2022-06-13 §86 → IFN 2023-03-22 → IKFN 2024-11-13 → IKFN 2025-12-03).
# Utelämnade som I_KALLA_EJ_SKRIVET med kategoriskt skäl "överspelad av nyare,
# levande regelverk" — inte MEDVETET_UTESLUTET (de är inte längre sökbara bidrag).
#
# EJ_EXTRAHERBAR: Rbok (kommunens ansökningsportal) är JS-renderad, gick inte att
# räkna upp direkt. Självservice-sidan för idrott/friluft (statisk lista av öppna
# ansökningar) användes som konvergenskälla istället — se anteckning ovan.
#
# SPECIALKATEGORIER (§2.1 punkt 5): sökt specifikt efter väg-/samfällighetsbidrag,
# bygdegårds-/samlingslokalbidrag, stiftelser sökbara för föreningar, samt byalags-/
# samhällsföreningsbidrag på haninge.se. Inget municipalt bidrag av dessa typer
# hittades (vägunderhåll hänvisas till Trafikverkets statliga bidrag, inte kommunalt;
# ingen stiftelseförteckning eller bygdegårdsbidrag publicerad). Loggas som
# "sökt, ej funnet" — inte MEDVETET_UTESLUTET.
#
# Socialnämndens och äldrenämndens verksamhetsbidrag är separata regelverk (egna
# nämnder, egna beslutsdatum) — inte del av IKFN-dokumentet. Bägge hämtade och
# verifierade separat nedan.
