forutsattningar:
  - id: "pitea-bidragsberattigad-forening"
    vad: "Bli registrerad och godkänd som bidragsberättigad förening"
    beskrivning: "Föreningen ska vara en ideell förening med säte och huvudsaklig verksamhet i Piteå kommun (majoriteten av medlemmarna hemmahörande i kommunen), ha bedrivit verksamhet i minst ett år (undantag kan medges), ha minst 10 registrerade, betalande medlemmar med verifierbar identitet, skriftliga stadgar, aktiv styrelse och revisor samt demokratisk verksamhet. Föreningen ska registreras i kommunens föreningsregister och uppdatera sina uppgifter senast 1 april varje år. Föreningen får inte ha skulder hos Kronofogden eller vara i konkurs/likvidation. Barn- och ungdomsverksamhet ska bedrivas alkohol- och drogfritt. Undantagna: politiska partier, religiösa samfund, riksorganisationer, branschorganisationer och vinstdrivande verksamhet."
