# Källa verifierad 2026-07-23 mot pitea.se. Kultur- och fritidsnämnden antog
# nya riktlinjer för föreningsstöd gällande från 2025 (fyra kategorier:
# verksamhet, anläggning, projekt/arrangemang, samt nya stödformer:
# startstöd, utvecklingsstöd, lov-/spontanaktiviteter, tillsynsavgiftsstöd).
# Sidträdet /Fritid-kultur/Foreningsliv-stod--stipendier/Sok-bidrag/ (gammalt,
# indexerat av sökmotorer) 404:ar helt — migrerat till
# /invanare/fritid-kultur/foreningar/foreningsstod/. Alla kalla_url nedan är
# från det NYA, levande trädet (verifierat 200 under körningen), plus tre
# andra nämnders träd (Samhällsbyggnad/landsbygd, Trafik-gator/väg,
# Omsorg-stod/social) och regelverks-PDF:en för landsbygdsstöd. Den
# huvudsakliga riktlinje-PDF:en för kultur-/fritidsbidragen ("Riktlinjer för
# Kultur- och fritidsnämndens stöd till föreningslivet", gällande fr.o.m.
# 2025) gick INTE att lokalisera med fast URL trots omfattande sökning —
# se tackning.log, EJ_EXTRAHERBAR. Täckning byggd på källkonvergens mellan
# redaktionella sidor, e-tjänstportaler och en fristående regelverks-PDF
# (landsbygd) istället, i linje med RESEARCH_SPEC v2.1 §2.1.
