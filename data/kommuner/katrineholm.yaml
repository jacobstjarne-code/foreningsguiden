# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 —
# källkonvergens). Föregående version (verifierad 2026-07-19) fångade 12
# bidrag genom att bara läsa de sex redaktionella undersidorna under
# "Föreningsbidrag". Denna omgång sökte i ordningen 1–5 (§2.1):
#
# 1. REGELVERKET FÖRST. Katrineholm har SJU antagna styrdokument, inte ett:
#    "Övergripande riktlinjer för föreningsstöd" (KF 2024-12-16 § 239, gäller
#    2024-01-01–2027-12-31) plus FYRA nämndspecifika komplement — ett per
#    nämnd (Kulturnämnden 2025-12-09 § 43, Service- och tekniknämnden
#    2025-11-20 § 62, Vård- och omsorgsnämnden 2025-12-11, Socialnämnden
#    2025-12-18 § 92, samtliga gäller 2026-01-01–2027-12-31) — samt separata
#    styrdokument för "Snabba stålar" (Kulturnämnden 2026-02-24 § 8) och
#    "Riktlinjer för sponsring" (kommundirektör 2025-12-01, KS_2026_21).
#    Samtliga sju hämtade och lästa i sin helhet (pdftotext, inte bara
#    ingress). De fyra nämndspecifika dokumenten gav den exakta
#    grundbidragsformeln (20 kr/medlem upp till 600 medlemmar, 10 kr/medlem
#    vid bokslutsresultat > 100 000 kr, tak 12 000 kr, golv 4 000 kr —
#    IDENTISK i alla fyra nämnders regelverk) samt exakta belopp för
#    arrangemangsbidrag (normalt < 150 000 kr) och driftbidrag (75 % av
#    vatten/el/slam-kostnader max 300 000 kr, plus 3 000 kr/anläggningsenhet)
#    — samtliga tidigare null i belopp-fältet, nu ifyllda.
# 2. FÖRVALTNINGARNAS EGNA SIDOR. De sex redaktionella undersidorna lästa på
#    nytt i sin helhet, korsverifierade mot regelverket (identiska datum/
#    belopp där båda anger dem — inga konflikter).
# 3. SJÄLVSERVICE/E-TJÄNST. Hela e.katrineholm.se:s tjänstekatalog (140+
#    tjänster) genomsökt för bidragsrelaterade poster. Detta var vägen in
#    till två bidrag som saknades helt i föregående version (se nedan).
# 4. PORTALEN. katrineholm.ibgo.se (Interbook Go) är en Vue.js-SPA (tomt
#    <div id="app">, inget statiskt innehåll) — EJ_EXTRAHERBAR, som väntat
#    enligt §2.1 punkt 4. Täckning byggd genom konvergens mellan 1–3 i
#    stället.
# 5. SPECIALKATEGORIER. Vägföreningar/vägsamfälligheter: HITTAT — "Bidrag
#    till enskilda vägar", administreras av Samhällsbyggnadsförvaltningen
#    (inte Föreningsservice), saknades helt i föregående version. Bygdegårdar
#    /samlingslokaler: Service- och tekniknämndens regelverk nämner uttryck-
#    ligen "Inom service- och tekniknämnden beslutas även om bidrag till
#    samlingslokaler" i inledningstexten, men nämndens egen "Bidrag"-lista
#    innehåller bara fyra poster (grund-, verksamhets-, arrangemangs- och
#    driftbidrag) — ingen femte, separat samlingslokalspost hittades i
#    regelverket, på webbsidorna eller i e-tjänstkatalogen. Bedömning:
#    samlingslokalsägande föreningar söker samma driftbidrag som andra
#    anläggningsägande föreningar; ingen dold, separat bidragsform finns.
#    Stiftelser/fonder: HITTAT — kommunens fondmedel (8 stiftelser under
#    Socialnämnden/Vård- och omsorgsnämnden) — men uteslutna, se nedan.
#    Byalag/samhällsföreningar och studieförbund: ingen separat kommunal
#    bidragsform hittad utöver kulturnämndens arrangemangsbidrag (som
#    uttryckligen även kan sökas av statsbidragsberättigade studieförbund).
#
# NYA BIDRAG (saknades i föregående version):
# - "Bidrag från kommunstyrelsen" — fanns på sidan "Sponsring och andra
#   bidrag" men var i föregående version sammanslaget med sponsringstexten
#   till EN felaktig post ("katrineholm-sponsring"). Sidan beskriver i
#   verkligheten TVÅ helt separata scheman (exakt det Karlstad-mönster
#   v2.1 varnar för: flera distinkta bidrag under samma URL). Bidraget från
#   kommunstyrelsen är skrivet som egen post nedan.
# - "Bidrag till enskilda vägar" — hittat via e-tjänstkatalogen (tjänst
#   "Kommunalt bidrag för enskild väg", id 470) samt en egen sida under
#   Trafik och gator, helt utanför Föreningsservice/Interbook Go-spåret.
#
# UTESLUTNA (kategoriskt skäl, §2.4 — inte i strid med "aldrig godkända
# skäl", se motivering):
# - Sponsring (kommunens sponsringssamarbeten, Riktlinjer för sponsring
#   KS_2026_21). Kommunens eget regelverk definierar sponsring som en
#   affärsmässig motprestation: "Sponsring ska inte förväxlas med bidrag,
#   som inte ställer några krav på motprestation" (s. 4). Sponsring kräver
#   en motprestation (exponering, ambassadörskap) och är enligt kommunens
#   egen distinktion inte ett föreningsbidrag. Föregående version skrev
#   detta felaktigt som bidrag (sammanslaget med kommunstyrelsens genuina
#   bidrag, se ovan).
#   https://www.katrineholm.se/uppleva-och-gora/foreningar/foreningsbidrag/sponsring-och-andra-bidrag.html
# - Fondmedel (Samfond för ändamål inom barnavård, Von Post-Manderströmska
#   fonden, Julita sockens fattigvårdsfond, Katrineholms samfond för lung-
#   och cancersjuka, Katrineholms blomsterfond, Arthur Bäckströms samfond,
#   Fröken Hanna Anderssons fond, Agda och Ragnar Brostedts minnesfond).
#   Sidan är genomgående skriven till en individuell sökande ("Katrineholms
#   kommun delar ut bidrag till personer som är behövande", kräver
#   folkbokföring, inte föreningssäte) — stöd som endast riktas till
#   privatpersoner (§2.4). Ansökan för 2026 var stängd vid verifieringen.
#   https://www.katrineholm.se/omsorg-och-stod/ekonomiskt-stod/fondmedel.html
#
# KORRIGERAT FAKTAFEL: föregående versions anteckning för Snabba stålar
# påstod "Svar från kulturförvaltningen inom 4 veckor efter ansökan" — denna
# uppgift återfinns varken i regelverket (Riktlinjer för Snabba stålar, KULN
# 2026-02-24 § 8) eller på webbsidan. Borttagen som overifierad; troligen en
# felläsning i föregående körning av "ansökan senast 4 veckor" som
# förekommer på ANDRA bidrag (Halmstad/Växjö-mönster), inte detta.
#
# Fyra nämnder hanterar föreningsbidrag: Service- och tekniknämnden (idrott
# och fritid, samt katrineholm-bidrag-enskilda-vagar hanteras separat av
# Samhällsbyggnadsförvaltningen), Kulturnämnden (kultur samt Snabba stålar),
# Vård- och omsorgsnämnden (seniorer och funktionsvariation) och
# Socialnämnden (social verksamhet). Kommunstyrelsen hanterar dessutom ett
# eget bidrag till arrangemang/projekt (se nedan), skilt från de fyra
# nämndernas föreningsbidrag. Ansökan för de fyra nämndernas bidrag sker via
# Interbook Go (katrineholm.ibgo.se). Snabba stålar, Bidrag från
# kommunstyrelsen och Bidrag till enskilda vägar hanteras i stället via
# separata e-tjänster på e.katrineholm.se.
#
# Dubbelhämtat (§3): samtliga sex redaktionella sidor och samtliga sju PDF:er
# hämtade och extraherade två gånger (curl+pdftotext samt oberoende
# WebFetch-läsning där tekniskt möjligt); inga avvikelser mellan passen.
# Spot-checkas av Jacob/Fable före publik deploy.
