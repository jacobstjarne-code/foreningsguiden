  - id: "katrineholm-arlig-redovisning-registrering"
    vad: "Lämna in årlig redovisning för att behålla föreningsregistrering och bidragsberättigande"
    beskrivning: "Föreningen ska varje år senast den 31 mars lämna in verksamhetsberättelse, verksamhetsplan, resultat- och balansräkning, revisionsberättelse samt årsmötesprotokoll till service- och teknikförvaltningen, samt uppdatera föreningsregistret vid förändringar (t.ex. ny styrelse eller kontaktperson). En förening som inte lämnar in dessa handlingar avregistreras och kan då inte längre söka föreningsbidrag. En registrerad förening har inte per automatik rätt till föreningsbidrag — grundbidrag, verksamhetsbidrag med mera prövas separat per bidrag. En förening ska dessutom ha minst 10 medlemmar (styrelsens ledamöter kan räknas in) för att bli registrerad."
