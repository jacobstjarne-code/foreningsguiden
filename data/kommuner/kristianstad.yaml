  - id: "kristianstad-bidragsberattigad-forening"
    vad: "Bli registrerad förening och godkänd som bidragsberättigad förening"
    beskrivning: "Föreningen ska först vara registrerad hos Skatteverket med organisationsnummer, ha antagit skriftligt utformade stadgar och sänt in dessa tillsammans med kopia av bildandemötesprotokoll och ifylld anmälningsblankett till kommunens föreningsregister (görs i Rbok), samt ha valt styrelse. Föreningen ska vara uppbyggd enligt demokratiska principer, öppen för alla personer och dela uppfattningen om alla människors lika värde. Årligen ska föreningen ha årsmöte och senast två månader efter uppdatera föreningsuppgifterna med aktuella kontaktuppgifter (vid stadgeändring ska nya stadgar laddas upp på nytt). För att därefter godkännas som bidragsberättigad förening krävs att föreningen har sitt säte i Kristianstads kommun, senast två månader efter årsmötet laddar upp årsmötesprotokoll, verksamhetsberättelse och årsbokslut, innehar PlusGiro, Bankgiro eller bankkonto, samt har en lägsta medlemsavgift på 50 kr/år och person (dispens kan ges för föreningar som är skyldiga till lägre medlemsavgift via sin riksorganisation)."
