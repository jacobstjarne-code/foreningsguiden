# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte redaktionell sida ensam). Föregående version (verifierad
# 2026-07-19) rapporterades komplett med 6 bidrag men byggde uteslutande på
# den redaktionella bidragssidan (upplevaochgora/bidrag.5404.html) och missade
# att den sidan i sig länkar fler bidrag än vad som lästes, samt att ett
# bidrag (Föreningsbidrag, omsorgen) i själva verket rymmer TVÅ distinkta
# sökbara delar under samma URL, och att flera specialkategorier (väg,
# stiftelser, byalag) och en bidragsform utanför Rbok-sfären (Marknadsförings-
# stöd/Evenemangsbidrag, administrerat av Kommunikation och tillväxt) helt
# saknades. Föregående körningsrapport för Kristianstad gick förlorad i en
# tidigare krasch (nämnt i uppdraget) — kunde inte jämföras mot denna omgång.
#
# Metod denna omgång:
# 1. REGELVERK: Sökte "kristianstad regler föreningsbidrag pdf" — hittade
#    Kultur- och fritidsnämndens "Bidragsbestämmelser inom kultur- och
#    fritidsnämndens verksamhetsområde" (antagen 2018-12-06, reviderad
#    2020-09-17, 340 kB) samt Omsorgsnämndens motsvarighet (antagen
#    2023-09-06, Dnr 2023/208, 175 kB). Båda lästes i sin helhet (24 resp. 5
#    sidor). Ingen regelverks-PDF hittades för Arbete och välfärdsnämnden
#    eller för Kommunstyrelsens bidrag (Marknadsföringsstöd, Landsbygdsfonden)
#    — dessa täcks via förvaltningarnas egna sidor (steg 2) i stället.
#    Kultur/fritid-regelverket räknar upp 9 bidrag; jämfört mot webbplatsens
#    faktiska bidragsutbud (14 poster under samma nämnd) är Elitbidrag och
#    Bidrag till studieförbund SKRIVET_EJ_I_REGELVERK — de finns på
#    webbplatsen men inte i det formella regelverksdokumentet.
# 2. FÖRVALTNINGARNAS SIDOR: Läste huvudsidan upplevaochgora/bidrag.5404.html
#    i sin helhet (inte bara ingressen) — den listar 14 kommunala bidrag,
#    mot 6 som lästes föregående körning. Varje enskild bidragssida lästes
#    fullständigt (inte bara rubrik/ingress), vilket avslöjade att
#    "Föreningsbidrag, omsorgen" (5415.html) länkar till ett regelverk som
#    delar bidraget i Grund- och medlemsbidrag (automatisk formel: 3 000 kr +
#    20 kr/medlem, max 22 000 kr) och Särskilt bidrag (diskretionär,
#    projektbaserad ansökan) — två distinkta sökbara delar, SPLIT till två
#    poster nedan (jämför Karlstads mönster: flera bidrag under samma URL).
# 3. SJÄLVSERVICE/E-TJÄNST: Genomsökte e-tjanster.kristianstad.se — avslöjade
#    "Evenemangsbidrag: Ansökan" som INTE finns länkat från den redaktionella
#    bidragssidan. Levande sidan för samma ansökningsflöde heter numera
#    "Marknadsföringsstöd" (marknadsforingsstod.6944.html, administreras av
#    Kommunikation och tillväxt under Kommunstyrelsens förvaltning, inte
#    Kultur- och fritidsnämnden) — samma ansökningsblankett/mottagare som
#    "Ansökan om evenemangsbidrag"-PDF:en. Skrivet som en post med båda
#    namnen noterade.
# 4. PORTALEN (Rbok, kristianstad.rbok.se): JS-renderad, ej enumererbar för
#    fetch — som väntat enligt v2.1. EJ_EXTRAHERBAR, gå vidare (metoden är
#    källkonvergens, inte undantag).
# 5. SPECIALKATEGORIER (§2.1.5):
#    - Väg/vägsamfälligheter: HITTADES. Kommunalt bidrag till enskild väg
#      (3 kr/meter, 2018 års nivå, indexreglerat), administreras separat från
#      Rbok. Saknades helt föregående körning.
#    - Bygdegårdar/samlingslokaler: Ingen egen dedikerad post hittad utöver
#      Landsbygdsfonden, som i praktiken finansierar bygdegårds-/byalags-
#      projekt (exempel: fönsterrenovering Oppmanna Vånga Bygdegårdsförening).
#      Ingen separat drift-/hyresbidragsform för bygdegårdar hittad (till
#      skillnad från Karlstad) — söktes riktat, ingen träff utöver
#      Landsbygdsfonden.
#    - Stiftelser/fonder: HITTADES. Kommunen förvaltar 18 stiftelser/fonder
#      (stiftelserochfonder.1387.html). Skrivet som ETT samlat bidrag per
#      §2.7, med Landsbygdsfonden undantagen och skriven separat p.g.a. sin
#      tydligt organisationsriktade karaktär (se resp. anteckning). Endast
#      Stiftelsen sociala samfonden verifierades explicit öppen för
#      "föreningar och organisationer" under denna körning — övriga 16
#      icke-Landsbygdsfonden-poster bör verifieras individuellt vid nästa
#      uppdatering.
#    - Byalag/samhällsföreningar: HITTADES. Landsbygdsfonden (max 40 000
#      kr/förening/år, ansökan via Rbok, rapportering till Landsbygdsrådet).
#      Saknades helt föregående körning.
#    - Studieförbund: HITTADES redan på huvudsidan (Bidrag till
#      studieförbund) men lästes inte föregående körning trots att den fanns
#      med i länklistan.
#
# Uteslutna (kategoriskt/metodiskt skäl, §2.3–§2.4):
# - "Ansök om svensk flagga" — fysisk gåva (flagga) till Sveriges nationaldag,
#   inte ett ekonomiskt föreningsbidrag. Öppen på samma villkor för
#   privatpersoner OCH föreningar (kräver bara flaggstång) — inte specifikt
#   föreningsriktad. Jämför Karlstads uteslutning av det icke-monetära
#   "Lokalt klimatkontrakt för föreningar".
#   https://www.kristianstad.se/upplevaochgora/bidrag/ansokomsvenskflagga.5407.html
# - "Byggnadsvårdsbidrag" och "Bidrag för bullerskyddsåtgärder" — generella
#   fastighetsbidrag (kulturmiljövård respektive bullerskydd) administrerade
#   av Miljö- och samhällsbyggnadsförvaltningen, öppna för alla ägartyper
#   (privatpersoner, företag, kommuner, föreningar) utan att vara riktade mot
#   föreningsverksamhet. Inte länkade från kommunens förenings-bidragsöversikt
#   (upplevaochgora/bidrag.5404.html) utan från Bygga/bo/miljö-sfären. Gränsfall
#   — en förening som äger en kulturhistoriskt värdefull byggnad skulle
#   teoretiskt kunna söka, men bidraget är inte konstruerat som ett
#   föreningsstöd. Loggat här för Jacob/Fable-granskning, inte tyst struket.
#   https://www.kristianstad.se/byggaboochmiljo/arkitekturochkulturmiljoer/byggnadsvardsbidrag.5620.html
# - 29 externa bidrag listade på huvudsidan (Allmänna arvsfonden, Kulturrådet,
#   Riksidrottsförbundet, Vinnova, Naturvårdsverket m.fl.) — administreras av
#   annan huvudman än kommunen, §2.4.
#
# Varningssignal (§2.6) undersökt: Kultur- och fritidsnämndens nio bidrag i
# regelverket har fem olika deadline-kluster (25 feb, 30 sep, 31 okt, löpande,
# blandat) — verifierat individuellt mot regelverkets egen "Ansökningstider"-
# sektion (sid 4–5 i PDF:en), inte ärvt. Bedöms som genuina, olika
# förvaltningscykler per bidragstyp, inte en extraktionsbugg.
#
# Konflikt löst (§2.5): Föregående version satte "Föreningsbidrag, omsorgen"
# till löpande med anteckning om osäker årlig återkommelse (källan visade bara
# "28 februari 2026" utan att bekräfta årsvis upprepning). Omsorgsnämndens
# regelverk (antaget 2023-09-06, nyare och mer auktoritativt än den
# redaktionella sidans formulering) bekräftar explicit "Söks senast den 28
# februari" som stående regel — satt till fasta datum denna omgång.
#
# Dubbelhämtat i två oberoende läsningar av varje källa under denna session
# (regelverks-PDF:erna lästes fullständigt två gånger; bidragssidorna
# hämtades och tvärkontrollerades mot regelverket där sådant fanns). Inga
# fältkonflikter mellan de två läsningarna denna omgång utöver den ovan.
# Spot-checkas av Jacob/Fable före publik deploy.
