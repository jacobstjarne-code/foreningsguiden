# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1, källkonvergens).
# Föregående version (verifierad 2026-07-19) byggde huvudsakligen på kommunens
# redaktionella sidträd + tre riktlinje-PDF:er och missade två specialkategorier
# (§2.1.5): kommunens vägbidrag till samfällighetsföreningar samt bygdepengen
# för Dalfors och Orebygden. Den olösta källdiskrepansen om vindkraftspengens
# 2026-deadline (31 mars vs 31 juli) är nu löst definitivt, se anteckning på
# rattvik-vindkraftspeng.
#
# Källor konsulterade denna omgång:
# 1. REGELVERK: "Rättviks kommuns stöd till föreningslivet" / "Normer
#    föreningsbidrag fr o m 20170101" (PDF, 12 sidor). Textextraktion är
#    ofullständig (komprimerad PDF-textström) men rubrikstrukturen kunde
#    bekräftas: Föreningsbidrag, Lönebidrag, Studieförbund, Socialt stöd,
#    Bystugebidrag, Vindkraftspeng. Detaljvärden för lönebidrag/studieförbund/
#    socialt stöd är oförändrade från föregående verifiering (samma URL, ingen
#    nyare version hittad vid sökning på revidering 2024/2025/2026).
#    "Riktlinjer bystugebidrag" och "Riktlinje vindkraftspeng" (separata,
#    nyare styrdokument) verifierade via kommunens live e-tjänstsidor och
#    kommunstyrelsens referat, se nedan.
# 2. FÖRVALTNINGARNAS EGNA SIDOR: bidrag-stod-och-stipendier.html (huvudsida,
#    Trafik-, ungdoms- och fritidsenheten), trafik-och-gator/gator/bidrag-
#    vagar-belysning.html (Samhällsutvecklingsförvaltningen — NY källa denna
#    omgång), stiftelser-fonder-och-bygdepeng.html + tre undersidor
#    (Kommunstyrelsens kansli — NY källa denna omgång).
# 3. SJÄLVSERVICE/E-TJÄNST: hela etjanster.rattvik.se-katalogen (53 e-tjänster
#    totalt) genomsökt kategori för kategori. Under "Kultur och fritid" (11
#    e-tjänster) hittades 6 bidrags-/stipendierelevanta: Föreningsstöd (147),
#    Extra föreningsstöd (211), Kulturstöd för föreningar (141), Bystugebidrag
#    (173), Vindkraftspeng (317), samt Danielsgårdens vistelsestipendium (142
#    — individuellt, uteslutet, se nedan). Ingen bidragsrelevant e-tjänst
#    hittades under "Omsorg och stöd" (8 e-tjänster, samtliga individuella
#    social-/biståndsärenden).
# 4. PORTAL: etjanster.rattvik.se är byggd på Open ePlatform och gick att
#    enumerera direkt via kategoriträdet (/oversikt) — inte JS-renderad på
#    samma sätt som Rbok/FRI. Användes som primär täckningskälla för
#    kultur/fritid-kategorin, se punkt 3.
# 5. SPECIALKATEGORIER: väg/samfälligheter — bidrag-vagar-belysning.html,
#    samfällighetsföreningar kan söka driftbidrag, belopp/deadline ej
#    publicerat. Bygdegårdar — täcks av bystugebidrag (samma kategori i
#    Rättvik). Stiftelser/fonder — kommunen förvaltar ett tiotal, samtliga
#    identifierade är antingen individuella (Stiftelsen Anders Lidén och
#    Ing-Britt Svedlunds samfond; Stiftelsen Rättviks kommuns sociala samfond)
#    eller internkommunala (Fonder för kommunal verksamhet: tre skol-/
#    fastighetsstiftelser) — ingen är sökbar för föreningar, uteslutna med
#    kategoriskt skäl (§2.4), se tackning nedan. Samhälls-/byalag — täcks i
#    Rättvik av bygdepengen för Dalfors och Orebygden (geografiskt avgränsad,
#    finansierad av Hedbodbergets vindkraftsöverskott — NY, se nedan).
#    Studieförbund — täcks av regelverkets studieförbundsbidrag (ovan).
#
# Dubbelhämtning (§3): Föreningsstöd (147), Extra föreningsstöd (211),
# Kulturstöd för föreningar (141) och Bystugebidrag (173) hämtades och lästes
# i två oberoende pass denna omgång — identiska värden i båda, inga fält
# nollställda.
#
# KONFLIKT LÖST (§2.5, nyare vinner): rattvik-vindkraftspeng. Se anteckning
# på bidraget för fullständig källkedja och datum.
#
# UTESLUTNA (kategoriskt skäl, §2.3/§2.4):
# - "Danielsgårdens vistelsestipendium" — individuellt stipendium till
#   konstnärlig yrkesutövare (bildkonstnär, författare, tonsättare m.fl.),
#   inte en förening. https://etjanster.rattvik.se/oversikt/overview/142
# - "Stiftelsen Anders Lidén och Ing-Britt Svedlunds samfond" — stöd enbart
#   till sjuka/funktionshindrade barn och ungdomar under 21 år, privatperson
#   ansöker. https://www.rattvik.se/kommun-och-politik/kommunens-organisation/
#   stiftelser-fonder-och-bygdepeng/pengar-ur-stiftelser-for-allmanheten-att-soka.html
# - "Stiftelsen Rättviks kommuns sociala samfond" — stöd enbart till äldre,
#   funktionsnedsatta och övriga behövande privatpersoner, samma källa som
#   ovan.
# - "Fonder för kommunal verksamhet" (Stiftelsen samfond för grundskolan,
#   Stiftelsen Korsnäs AB:s stipendiefond, Stiftelsen Fräs Kerstin Hanssons
#   donationsfond) — interna skol-/fastighetsstiftelser, utdelning beslutas
#   av Kommunstyrelsens allmänna utskott, ingen extern ansökan för föreningar.
#   https://www.rattvik.se/kommun-och-politik/kommunens-organisation/
#   stiftelser-fonder-och-bygdepeng/fonder-for-kommunal-verksamhet.html
# - "Stiftelsen Mörksuggefonden" — konstsamling/utbildnings- och
#   forskningsändamål kopplat till Rättviks kulturhus konsthall, inte en
#   sökbar bidragskälla för föreningar. https://www.rattvik.se/uppleva-och-gora/
#   kultur/rattviks-kulturhus/konsthallen/stiftelsen-morksuggefonden.html
# - "Marknadsparkering – Föreningar" — är en intäktsmöjlighet (föreningar kan
#   sköta parkering mot betalning vid marknader), inte ett bidrag/stöd.
#   https://www.rattvik.se/uppleva-och-gora/foreningar-och-bidrag/
#   marknadsparkering---foreningar.html
#
# Täckningsavstämning: 10 bidrag skrivna (8 tidigare + 2 nya: vägbidrag,
# bygdepeng). 6 kandidater identifierade och uteslutna med kategoriskt skäl.
# 0 I_KALLA_EJ_SKRIVET. Spot-checkas av Jacob före publik deploy.
