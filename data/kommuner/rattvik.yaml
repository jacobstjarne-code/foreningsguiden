    sen_ansokan: "Sista ansökningsdag är 31 mars varje år; infaller datumet på en helgdag flyttas fristen till nästa vardag."
    kalla_url: "https://www.rattvik.se/kommun-och-politik/kommunens-organisation/stiftelser-fonder-och-bygdepeng/bygdepeng-for-dalfors-och-orebygden.html"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-21 (specialkategori §2.1.5/samhälls- och byalag, källa hittad under 'Stiftelser, fonder och bygdepeng' snarare än föreningsbidrags-sidträdet). Administreras av Kanslienheten (Kommunstyrelsens förvaltning). Geografiskt avgränsat till Dalfors och Orebygden — gäller alltså inte föreningar i övriga Rättviks kommun. Sidan specificerar inte explicit att enbart föreningar (till skillnad från privatpersoner) får söka, men exemplen på användning (gemensamma anläggningar, offentliga kulturarrangemang) tyder på att föreningar/organisationer är en central målgrupp tillsammans med privatpersoner/byalag. Bekräftat aktuellt för 2026 via nyhetsartikel 'Sök bygdepeng för Dalfors och Orebygden' (publicerad 2026-03-02, angav samma 31 mars 2026-deadline). Ej att förväxla med rattvik-vindkraftspeng ovan, som är kommunens nya, kommunövergripande statliga vindkraftsstöd — bygdepengen är ett äldre, geografiskt avgränsat program finansierat av Hedbodbergets vindkraftsöverskott."
forutsattningar:
  - id: "rattvik-bidragsberattigad-forening"
    vad: "Registrera förening i Rättviks kommuns föreningsregister"
    beskrivning: "Föreningen ska ha stadgar beslutade på medlemsmöte som bland annat beskriver föreningens allmännyttiga ändamål, ha öppen medlemsantagning, och inte arbeta för att tillgodose medlemmarnas ekonomiska intressen. Ansökan om registrering görs via det digitala systemet friweb.rattvik.se. Sidan specificerar inte uttryckligen om registrering är ett formellt krav innan bidrag kan sökas, men föreningsregistret är den gemensamma källan för föreningsuppgifter som används vid samtliga bidragsansökningar (bl.a. anges registrering som krav i föreningsstödets egna villkor)."
