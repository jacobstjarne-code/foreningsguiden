    anteckning: "KÄLLKONFLIKT LÖST (§2.5, nyare vinner): föregående version noterade en olöst diskrepans mellan en tidigare daterad riktlinje (2026-05-06, '31 mars' utan undantag) och nyare källor. Denna omgång bekräftar entydigt, via tre oberoende och samstämmiga källor nyare än 2026-05-06 — kommunens nyhetsartikel 'Rättviks kommun satsar på föreningslivet med nya vindkraftspengar' (publicerad 2026-06-03), kommunstyrelsens referat från sammanträdet 2026-06-16 (beslut att anta riktlinjer för vindkraftspeng, med uppmaning att prioritera föreningarna i Ore socken vid fördelningen) samt den löpande e-tjänstsidan för ansökan (etjanster.rattvik.se/vindkraftspeng, hämtad 2026-07-21) — att sista ansökningsdag för 2026 är 31 juli 2026, som ett engångsundantag för det första verksamhetsåret. Från och med 2027 återgår ansökningsdatumet till 31 mars årligen, i linje med den äldre riktlinjens återkommande regel. Fältet ovan (07-31) är alltså den faktiskt gällande deadlinen vid denna verifiering (2026-07-21, tio dagar innan fristen går ut) — kommande års YAML-uppdatering ska ändra datumet till 03-31 när 2027 börjar gälla. Utbetalning sker med 75 % direkt, resterande 25 % efter godkänd slutredovisning. Ej att förväxla med rattvik-bygdepeng-dalfors-orebygden nedan, som är ett äldre och geografiskt avgränsat program finansierat av ett annat vindkraftsöverskott (Hedbodberget)."
