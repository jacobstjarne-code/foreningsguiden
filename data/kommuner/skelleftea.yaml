# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 — källkonvergens,
# inte redaktionell sida i isolering). Föregående version (verifierad 2026-07-19)
# fångade bara 9 bidrag genom att läsa Fritidsnämndens, Kulturnämndens och
# Socialnämndens bidragssidor ytligt (i praktiken bara ingress/exempel) och genom
# att MEDVETET välja bort cirka 30 nischade anläggnings-/underhållsbidrag
# (ishockeyplaner, skoterleder m.m.) som "utanför scope" i en YAML-kommentar —
# vilket RESEARCH_SPEC_v2.md §2.4 uttryckligen underkänner ("nischat" är inte ett
# giltigt uteslutningsskäl). Denna omgång läser samtliga fyra nämnders
# bidragsnormer-sidor i sin helhet, samt Bidragskalendern (den kommunövergripande
# sammanställningen) som facit för täckning.
#
# Metod: (1) Sökte regelverk-PDF — hittade ingen enda antagen "Regler för
# föreningsbidrag"-PDF som täcker alla nämnder; varje nämnd har i stället en egen
# bidragsnormer-sida (se nedan), vilka fungerar som regelverk-motsvarighet.
# EJ_EXTRAHERBAR för ett samlat regelverksdokument. (2) Läste Bidragskalendern
# (skelleftea.se/foreningsportalen/.../sok-bidrag/bidragskalendern) i sin helhet —
# denna listar 37 namngivna bidrag med exakta ansökningsperioder och fungerade som
# den avgörande täckningskällan; den saknades helt i föregående körning. (3) Läste
# samtliga fyra nämnders bidragsnormer-sidor i sin helhet (Fritidsnämnden 33
# numrerade bidragsformer, Kulturnämnden 6 bidrag + 3 stipendier, Socialnämnden 2
# bidrag, Samhällsbyggnadsnämnden 3 bidrag — den sistnämnda nämnden saknades HELT
# i föregående version). (4) Läste de sex kategorisidorna under "Sök bidrag"
# (aktiviteter-och-verksamhet, drift-och-skotsel, investeringar-och-renoveringar,
# utbildningsbidrag, utveckling-och-inkludering, arrangemang-och-produktion) samt
# den fristående stipendiesidan, som gav kompletterande detaljer och avslöjade
# källkonflikter (se konflikter.log-sektionen nedan). (5) Sökte riktat efter
# specialkategorier (§2.1.5): vägföreningar/vägsamfälligheter (kommunalt
# underhållsbidrag till enskild väg HITTADES och saknades helt tidigare),
# bygdegårdar/samlingslokaler (fem distinkta bidrag under Fritidsnämnden,
# saknades tidigare), stiftelser/fonder (sökt brett — Skellefteå kommun förvaltar
# stiftelser som Lövångers kyrkstad-stiftelse och Skellefteå Träfestival-stiftelse,
# men dessa är OPERATIVA stiftelser kommunen själv driver verksamhet genom, inte
# bidragsgivande fonder föreningar kan söka ur; den enda hittade utdelande fonden,
# Viktor och Celina Nyströms testamente, är uteslutande för privatpersoner inför
# jul — ingen förenings-sökbar stiftelse hittad, till skillnad från Karlstad/
# Halmstad), byalag/samhällsföreningar (Lokala utvecklingsinsatser för landsbygd
# HITTADES, saknades tidigare), studieförbund (Riktat arrangemangsstöd till
# studieförbund HITTADES, saknades tidigare). Ansökningsportalen Interbook Go
# (ibgo.skelleftea.se) är, liksom Växjös/Halmstads/Karlstads motsvarigheter,
# JS-renderad utan synligt innehåll vid fetch — EJ_EXTRAHERBAR, täckning byggd
# genom sidkonvergens (Bidragskalendern + fyra nämndsidor + sex kategorisidor),
# inte portalräkning.
#
# Uteslutna (kategoriskt/metodiskt skäl, §2.3-§2.4):
# - "Bygdemedel" (bygdeavgiftsmedel) — administreras och beslutas av Länsstyrelsen
#   Västerbotten (statlig myndighet), inte av Skellefteå kommun. Bidragskalendern
#   anger uttryckligen "Ansvarig: Länsstyrelsen" och ansökan sker via
#   Länsstyrelsens/Tillväxtverkets e-tjänst "Min ansökan", inte Interbook Go.
#   Kommunens egna sidor som tidigare beskrev bidraget (två olika URL:er
#   kontrollerade) gav båda 404 vid denna körning. Uteslutet enligt §2.4:
#   "administreras av annan huvudman än kommunen."
#   https://www.lansstyrelsen.se/vasterbotten/natur-och-landsbygd/stod-till-jordbruk-och-landsbygd/bygdemedel.html
# - "Arbetsstipendium" (Kulturnämnden, 50 000 kr/år, två tillfällen) — individuellt
#   pris till "lovande förmågor (oavsett ålder)" inom en konstform; målgruppen
#   nämner uteslutande enskild person, ingen förening/organisation som möjlig
#   mottagare (jämför Kulturstipendium/Ungdomskulturstipendium nedan, som
#   uttryckligen listar förening/organisation som sökandekategori och därför
#   INKLUDERADE). Samma uteslutningslogik som Halmstads Kulturstipendium.
#   https://skelleftea.se/foreningsportalen/foreningsportalen/ekonomi-och-bidrag/stipendier
# - "Externa bidrag" (ca 20 externa stiftelser/fonder: Allmänna Arvsfonden,
#   Konung Gustaf V:s 90-årsfond, MUCF m.fl.) — en informationslista över
#   bidragsgivare som INTE är Skellefteå kommun; kommunen administrerar och
#   beslutar inte om dessa. Utanför scope enligt §4 ("endast kommunens egen
#   domän är källa"), inte en MEDVETET_UTESLUTET-post i egentlig mening eftersom
#   det aldrig var kommunens bidrag.
#   https://skelleftea.se/foreningsportalen/foreningsportalen/ekonomi-och-bidrag/relaterade-sidor/externa-bidrag
# - "Viktor och Celina Nyströms testamente" — fond förvaltad av socialnämnden,
#   men uteslutande för enskilda personer/familjer inför jul, inte föreningar.
#   https://skelleftea.se/invanare/startsida/omsorg-och-stod/ekonomi-och-forsorjningsstod/ansoka-om-fondmedel
# - "Ärendehanteringsmodell bidrag" — processdokument för hur kommunen utreder
#   misstänkta brott mot bidragsregler, inte ett sökbart bidrag.
#
# Källkonflikter (§2.5) — ingen av källorna nedan hade synligt revisionsdatum,
# så samtliga fyra nollställdes med båda värdena i anteckning, i enlighet med
# regeln "saknar källa datum: nollställ fältet":
# 1. Extern kommunikation och marknadsföring — Fritidsnämndens bidragsnormer
#    anger "1 mars-1 juni (2026)"; kategorisidan utveckling-och-inkludering OCH
#    Bidragskalendern anger båda "2 januari-1 oktober".
# 2. Riktat arrangemangsstöd till studieförbund — Kulturnämndens bidragsnormer
#    OCH stipendiesidan anger "1 mars (vår) / 1 oktober (höst)"; Bidragskalendern
#    anger "15 februari-1 april".
# 3. Kulturstipendium — Kulturnämndens bidragsnormer anger "senast 1 oktober";
#    stipendiesidan OCH Bidragskalendern anger båda "1 augusti-1 september".
# 4. Ungdomskulturstipendium — samma konflikt som (3), samma källor.
#
# Varningssignal (§2.6) undersökt: Fritidsnämndens och Kulturnämndens bidrag har
# båda en generell sen-ansökan-regel (25 procent avdrag vid ansökan upp till två
# veckor sen, helt avslag därefter) som återkommer på flera bidrag inom samma
# nämnd. Verifierat som en genuin nämndsgemensam regel angiven i löptexten på
# båda nämndernas bidragsnormer-sidor (inte ett ärvt/gissat värde), och de två
# nämnderna har olika ordalydelse — bedöms som en äkta gemensam policy per
# nämnd, inte en extraktionsbugg.
#
# Dubbelhämtat i två oberoende pass (§3). Fyra fältkonflikter identifierade och
# nollställda (se ovan). Spot-checkas av Jacob/Fable före publik deploy.
