    beskrivning: "Föreningen ansöker om att registreras i kommunens föreningsregister via Rbok. Kräver minst 10 medlemmar, årlig medlemsavgift om minst 50 kronor per medlem, skriftliga stadgar antagna på årsmöte, vald styrelse, medlemsförteckning, organisationsnummer från Skatteverket, bank- eller plusgirokonto, säte och huvudsaklig verksamhet i Kalmar kommun, demokratisk uppbyggnad öppen för alla samt anslutning till en riksorganisation inom sitt område. Barn- och ungdomsverksamhet ska vara alkohol- och drogfri. Detta steg krävs för bidrag administrerade av kultur- och fritidsnämnden (samtliga bidrag i denna fil utom landsbygds-/vägbidragen kalmar-bygdepeng, kalmar-miljopeng, kalmar-hjartsakrare-landsbygd och kalmar-enskilda-vagar, som i stället kräver enbart giltigt organisationsnummer respektive väghållarstatus — se respektive bidrags krav)."
