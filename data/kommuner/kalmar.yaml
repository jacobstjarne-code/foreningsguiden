    sen_ansokan: "Ansökningar kan skjutas till nästa år om årets budget är förbrukad"
    kalla_url: "https://kalmar.se/bygga-bo-och-miljo/samhallsutveckling/landsbygd/hjartsakrare-landsbygd.html"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20. Omfattar nya hjärtstartare med värmeskåp, uppgradering av befintlig utrustning samt HLR-utbildning. Avslag ges för ansökningar inom Kalmar tätort eller vid begränsad nytta för bygden. Beslutas av landsbygdsutvecklare, söks via Rbok."

