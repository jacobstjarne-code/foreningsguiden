  # --- SAMHÄLLSBYGGNADSKONTORET / LANDSBYGDSUTVECKLING (specialkategori §2.1.5) ---
  - id: "kalmar-bygdepeng"
    namn: "Bygdepeng"
    kategori: ["ovrig"]
    malgrupp: "Bidragsberättigade föreningar registrerade i Rbok som verkar inom en by eller tätort på landsbygden i Kalmar kommun (ej centralorten)"
    deadlines:
      typ: "fasta"
      datum: ["02-22", "04-19", "08-23", "11-29"]
    krav:
      - "Projektet ska vara förankrat i bygden och spegla ett brett samarbete om vad orten vill utveckla"
      - "Om flera föreningar finns i området krävs samverkan mellan dem"
      - "Får inte användas till driftskostnader, löner, vägarbete eller återkommande årliga evenemang"
      - "Projektet får inte påbörjas innan beslut fattats"
    belopp: "Max 150 000 kronor per projekt (inkl. moms) av totalt 1 miljon kronor som fördelas årligen. Konsultkostnader max 25 procent av taket (37 500 kronor). Renoveringsstöd: 100 procent för tidigare finansierade projekt, annars 50 procent (max 75 000 kronor)"
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://kalmar.se/bygga-bo-och-miljo/samhallsutveckling/landsbygd/bygdepeng.html"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION, dokumenterad som medvetet bortvald — tillagd vid korrigerande omkörning 2026-07-20 (specialkategori §2.1.5, byalag/samhällsföreningar). Administreras av landsbygdsnämnden, inte kultur- och fritidsnämnden — annan förvaltning men samma huvudman (Kalmar kommun), alltså inte uteslutet enligt §2.4. De fyra 2026-datumen (22/2, 19/4, 23/8, 29/11) är årets fyra ansökningsomgångar; exakta datum kan variera nästa år men den kvartalsvisa cykeln är återkommande. Söks via Rbok."
