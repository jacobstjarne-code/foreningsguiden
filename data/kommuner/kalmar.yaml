# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) fångade 13 bidrag men triagerade uttryckligen bort "Folkets
# hus/bygdegårdar, Övrig kulturaktör, Bygdepeng, donationsstiftelser" med
# motiveringen "för att hålla filen hanterbar" — exakt det skäl §2.4 inte
# tillåter. Denna omgång läste varje förvaltningssidas undersidor i sin
# helhet i stället för bara ingressen (Karlstad-mönstret: en kategorisida
# rymmer ofta fler distinkta bidrag än ingressen visar).
#
# Metod: (1) Sökte Kalmars antagna bidragsregelverk-PDF — hittade inget
# sådant, bara en icke-bindande "Kultur- och fritidspolitisk vision
# 2024-2027" samt en webbsida "Allmänna bestämmelser" (senast uppdaterad
# 2025-10-13, inget nämnd-/KF-beslutsdatum angivet). Regelverket är alltså
# EJ_EXTRAHERBAR/ej funnet, likt Karlstad — täckning fastställd via
# konvergens mellan förvaltningssidor. (2) Läste huvudsidan
# "Föreningsstöd" och kartlade samtliga 12 kategorisidor (barn- och
# ungdomsföreningar, elitidrottstöd, externa bidragsgivare, Folkets hus
# och bygdegårdar, föreningar för funktionsnedsatta, hembygdsföreningar,
# kulturföreningar, projekstöd flick- och damidrott, seniorföreningar,
# studieförbund, TKT, övrig kulturaktör) och läste varje undersida i sin
# helhet — barn- och ungdomsföreningar visade sig rymma 9 distinkta bidrag
# (mot 2 fångade förra körningen: aktivitets-ledarstöd, driftstöd).
# (3) Sökte riktat efter specialkategorier (§2.1.5): väg-/samfällighets-
# föreningar (HITTAT: driftbidrag + förbättringsbidrag för enskilda vägar,
# administreras av teknik- och fastighetsnämnden/servicenämnden, inte
# kultur- och fritidsnämnden), bygdegårdar (HITTAT: "Stöd till bygdegårdar,
# Folkets hus och parkföreningar"), byalag/samhällsföreningar (HITTAT:
# Bygdepeng, administreras av landsbygdsnämnden), stiftelser/fonder
# (HITTAT sex donationsstiftelser samt elev-/studentstiftelser — samtliga
# uteslutna enligt §2.4, riktar sig uteslutande till privatpersoner med
# dokumenterat ekonomiskt bistånd, inte föreningar). Utöver dessa hittades
# två ytterligare landsbygdsbidrag som inte efterfrågats i sökmönstret men
# som kräver organisationsnummer (miljöpeng, hjärtsäkrare landsbygd — båda
# administrerade av landsbygdsutveckling/vatten- och miljönämnden).
# Ansökningsportalen kalmar.rbok.se är, liksom Växjös/Halmstads/Karlstads
# motsvarigheter, inte enumererbar för fetch (JS-renderad) — täckning
# byggd genom sidkonvergens, inte portalräkning.
#
# Uteslutna (kategoriskt skäl, §2.4):
# - Externa bidragsgivare (Boverket, Jämställdhetsmyndigheten, Allmänna
#   arvsfonden, Sparbanksstiftelsen, Stiftelsen Dingåva, Svenska
#   Postkodlotteriets Stiftelse, Region Kalmar län, MUCF, RF-SISU Småland,
#   Sydostleader, Lions Club Kalmar) — administreras av annan huvudman,
#   kommunen är endast informationsnav.
#   https://kalmar.se/uppleva-och-gora/foreningar-och-foreningsliv/foreningsstod/externa-bidragsgivare.html
# - SydostLeader (även länkad från landsbygdssidan) — administreras av
#   Leaderkontoret i Emmaboda, en egen ideell LAG-förening, inte Kalmar
#   kommun. https://kalmar.se/bygga-bo-och-miljo/samhallsutveckling/landsbygd/sydostleader.html
# - Samtliga donationsstiftelser (Samfond II, Frimanska fonden, Petter A
#   Jonssons fond, Karl Jonssons understödsfond, Syskonen Karlbergs
#   donationsfond, Dahmska stiftelsen) samt donationsstiftelser för elever
#   och studenter — uteslutna enligt §2.4, riktar sig uteslutande till
#   privatpersoner med behovsprövning (inkomst-/förmögenhetsgräns), ingen
#   förening kan söka. https://kalmar.se/kommun-och-politik/kommunfakta/ekonomi/stiftelser-donationsfonder/ovriga-donationsstiftelser.html
# - Hemsändning — leveransservice till enskilda hushåll på landsbygden,
#   inte ett bidrag en förening kan söka.
#   https://kalmar.se/bygga-bo-och-miljo/samhallsutveckling/landsbygd/hemsandning.html
# - Medborgarbudget — medborgarförslag och omröstning i två pilotorter
#   (Halltorp, Trekanten), inte ett sökbart ekonomiskt bidrag med
#   ansökningsförfarande. https://kalmar.se/bygga-bo-och-miljo/samhallsutveckling/landsbygd/medborgarbudget.html
#
# Varningssignal (§2.6) undersökt: tre kluster av delade deadlines — 1
# september ×3 (driftstöd, investeringsstöd, stöd till bygdegårdar/Folkets
# hus — samtliga anläggningsrelaterade stöd inom kultur- och
# fritidsnämnden), 15 oktober ×3 (verksamhetsstöd kultur, lokalstöd
# kultur, verksamhetsstöd hembygd) och 15 mars ×2 (funktionsnedsättning,
# senior). Varje datum är individuellt verifierat mot sin egen sidas
# löptext (inte ett ärvt värde) — bedöms som genuina, gemensamma
# förvaltningscykler inom kultur- och fritidsnämndens budgetår, inte en
# extraktionsbugg.
#
# Dubbelhämtat i två oberoende pass (§3): de 13 bidrag som fanns i
# föregående version verifierades med en fräsch hämtning denna omgång
# (ingen avvikelse mot 2026-07-19-versionen). De 10 nyfunna bidragen
# hämtades och strukturerades i två helt separata, oberoende anrop var —
# inga fältkonflikter identifierade i något fall. Inga fältkonflikter
# denna omgång totalt.
#
# Täckningsavstämning: 23 bidrag skrivna. Inget antaget regelverk hittat
# (EJ_EXTRAHERBAR) — samtliga 23 är därför SKRIVET_EJ_I_REGELVERK i strikt
# mening, eftersom inget regelverk fanns att stämma av mot; källan är i
# stället förvaltningssidornas konvergens. Portalen kalmar.rbok.se
# EJ_EXTRAHERBAR (JS-renderad). Inga I_KALLA_EJ_SKRIVET identifierade.
# Spot-checkas av Jacob/Fable före publik deploy.
