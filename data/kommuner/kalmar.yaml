    namn: "Miljöpeng"
    kategori: ["ovrig"]
    malgrupp: "Alla föreningar med organisationsnummer som har eller planerar verksamhet i Kalmar kommun (företag och privatpersoner kan inte söka)"
    deadlines:
      typ: "fasta"
      datum: ["03-01", "08-01", "11-01"]
    krav:
