      - "Får inte användas till löpande kostnader (hyra, löner, avgifter), solceller eller vassklippning"
      - "Ej vinstsyftande verksamhet"
      - "Synlig redovisning/erkännande av kommunens stöd vid genomförande"
      - "Kostnader ska styrkas med kvitton"
    belopp: "Max 75 000 kronor. Vid belopp över 25 000 kronor krävs 25 procents medfinansiering (undantag möjliga)"
    sen_ansokan: "Ej angivet i källan"
    kalla_url: "https://kalmar.se/bygga-bo-och-miljo/samhallsutveckling/landsbygd/miljopeng---bidragsstod-till-foreningar.html"
    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20. Administreras av vatten- och miljönämnden (annan nämnd, samma huvudman). Söks via eget ansökningsformulär, inte Rbok. Besked inom två månader efter respektive ansökningsdatum."
  - id: "kalmar-hjartsakrare-landsbygd"
    namn: "Hjärtsäkrare landsbygd"
    kategori: ["ovrig"]
    malgrupp: "Föreningar, organisationer och samfälligheter med giltigt organisationsnummer verksamma på landsbygden i Kalmar kommun"
    deadlines:
