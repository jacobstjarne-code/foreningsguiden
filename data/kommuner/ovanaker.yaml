# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2 / v2.1 källkonvergens).
# Föregående version (verifierad 2026-07-19) byggde på kommunens redaktionella
# sidträd + minasidor.ovanaker.se och rapporterade 8 bidrag. Denna omkörning
# genomsökte samma sidträd på nytt (det har omstrukturerats sedan dess — se
# nedan) samt e-tjänsteportalens egen "Tjänster"-lista (minasidor.ovanaker.se/
# oversikt/overview/34) som en andra, oberoende källa för täckning (§2.1 punkt 3).
# Portalen är INTE JS-renderad för Ovanåker (till skillnad från Växjös Rbok och
# Halmstads FRI) — sidinnehållet gick att extrahera direkt.
#
# Fynd: sidträdet har bytt struktur sedan 2026-07-19. Gamla URL:er under
# /kulturochfritid/kultur/kulturbidrag/ (t.ex. bidragtillforeningarforkultur-
# ellaaktiviteterarrangemang.2210.html samt kulturbidrag.353.html) ger nu 404.
# Bidragen ligger numera under /kulturochfritid/foreningarforeningsbidrag/
# bidragtillforeningarochstudieforbund/kulturforeningsbidrag/ (fyra bidrag) samt
# direkt under bidragtillforeningarochstudieforbund/ (resten). Detta gav två nya
# bidrag som inte fanns i förra versionen: "Snabba pengar" för ung kultur och
# Tillfälligt övrigt arrangemangsbidrag.
#
# VARNINGSSIGNAL (§2.6), OLÖST: e-tjänsteportalens tjänstelista listar "Bidrag
# till föreningar för kulturella aktiviteter/arrangemang" (nås nu bara via
# minasidor.ovanaker.se/oversikt/overview/155, gammal redaktionell URL 404:ar)
# OCH "Kulturarrangemangsbidrag" (ny redaktionell sida, daterad 2026-04-17) som
# två SEPARATA, samtidigt aktiva tjänster — trots snarlika namn, snarlikt syfte
# och delvis identisk text (loggakrav, ej-kommersiellt). Ansökningsstrukturen
# skiljer dem tydligt åt (rullande med 4 veckors varsel mot tre fasta
# ansökningsperioder/år) och målgruppen är inte identisk (den nya inkluderar
# uttryckligen stiftelser och yrkesverksamma kulturarbetare). Det gick inte att
# med tillgängliga källor avgöra om detta är två parallella bidragsformer eller
# en administrativ kvarleva efter sidomstruktureringen. Skrivna som TVÅ separata
# poster nedan (konvergensregeln väger mot att utesluta vid osäkerhet — se
# grundregeln i RESEARCH_SPEC_v2.md §1: saknat bidrag är värre än tomt fält).
# Se konflikter.log. BÖR VERIFIERAS DIREKT MED KOMMUNEN före publik deploy.
#
# Regelverk (§2.1 punkt 1): sökt (webbsök + insynsverige.se) — Ovanåkers kommun
# publicerar inget konsoliderat bidrags-PDF-regelverk. Villkoren finns enbart
# som "krav"-sektioner på respektive bidrags egen sida. Ingen "Allmänna villkor
# för föreningsbidrag"-samlingssida hittades heller.
#
# Specialkategorier (§2.1 punkt 5) — sökt via webbsök, kommunens sidträd och
# e-tjänsteportalens samtliga sju huvudkategorier: väg-/samfällighetsbidrag,
# separat bygdegårds-/samlingslokalbidrag, kommunalt förvaltade stiftelser/
# fonder för föreningar, samt separat byalags-/samhällsföreningsbidrag —
# INGET av detta hittades för Ovanåkers kommun. Bygdegårdar/klubblokaler täcks
# generiskt av Anläggningsbidragets rader för klubblokal/stuga och övrig
# lokal/byggnad. Se tackning.log.
#
# Uteslutna (kategoriskt skäl, §2.3/§2.4):
# - "Utveckling för idrottsföreningar" (6144.html) — administreras av RF-SISU
#   Gävleborg, inte kommunen (annan huvudman); är en hänvisningssida, inget
#   sökbart kommunalt bidrag.
# - "Ansökan om stipendium till körkort" (minasidor, listad i portalens
#   tjänstelista) — individuellt stipendium till privatperson (gymnasieelev),
#   inte ett föreningsbidrag.
#
# Befolkningssiffra: kommunens egen statistiksida (omkommunen/ovanakerskommun-
# isiffror/invanarantalochstatistik.62.html) gav fortsatt 404 vid hämtning,
# precis som i förra körningen. Siffran är därför hämtad från SCB:s kvartals-
# statistik (via Newsworthys sammanställning): 11 295 invånare per 2025-09-30
# (senaste publicerade kvartalssiffra vid research-tillfället; uppdaterad från
# förra körningens 11 248). Ej en ovanaker.se-källa — flaggas som avsteg.
#
# Dubbelhämtning (§3): varje bidragssida hämtad och läst i två separata anrop.
# Inga fältkonflikter mellan de två passen för samma sida. Den enda konflikten
# är källkonflikten ovan (två olika sidor/tjänster för vad som kan vara samma
# eller olika bidrag).
#
# Täckningsavstämning: se tackning.log. 11 bidragsformer identifierade, 11 skrivna (upp från 8),
# 2 uteslutna med kategoriskt skäl, 0 EJ_EXTRAHERBAR (portalen gick att läsa).
# Spot-checkas av Jacob/Fable före publik deploy (leveransordning steg 4).
