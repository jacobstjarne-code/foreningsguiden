# Källa verifierad 2026-07-23 mot kommun.falkenberg.se. Källkonvergens (§2):
# huvudkälla "Söka bidrag inom kultur, fritid och idrott" (redaktionell
# sammanställning av kultur-, fritids- och tekniknämndens (KFT) tolv bidrag)
# konvergerar med "Viktiga datum för föreningslivet" (samma nämnd, delvis
# överlappande — se tackning.log för avvikelser) samt egna undersidor för
# kulturstöd (Interbook FRI). Regelverket "Bidragsbestämmelser inom idrotts-,
# kultur- och fritidsområdet" (nämnt vid namn i landsbygdsbidragets riktlinje,
# fastställt av KFT) kunde INTE hämtas — den tidigare kända media/evolution-
# URL:en 404:ar (CMS-bytt hash efter dokumentrevidering, jfr KFT-nämndens
# protokoll 2025-12-18 där flera bidragsdokument reviderades). Loggat som
# EJ_EXTRAHERBAR i tackning.log; täckningen vilar istället på den redaktionella
# hubbsidan, som är konkret nog (namn, målgrupp, deadline per bidrag) för att
# uppfylla källkonvergenskravet i §2.2. Utöver KFT: egna regelverks-PDF:er
# hittades och hämtades för landsbygdsbidraget och socialnämndens
# föreningsbidrag. Spot-checkas av Jacob före publik deploy.
