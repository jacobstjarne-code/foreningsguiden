# Källa verifierad 2026-07-23 mot ystad.se (huvuddomän, CMS bytt sommaren 2026 —
# äldre www.ystad.se/fritid/... och www.ystad.se/kommun--politik/... URL:er ger 404,
# nya strukturen ligger under ystad.se/uppleva-och-gora/..., /omsorg-och-stod/...,
# /samhallsutveckling-och-trafik/... och /kommun-och-politik/...).
#
# Täckning fastställd genom källkonvergens (RESEARCH_SPEC_v2 §2): regelverket
# "Bidragsbestämmelser för föreningar och studieförbund" (Kultur- och fritidsnämnden,
# 1 januari 2025) och ansökningsportalen FRI (ystad.fri-go.se/bidrag/, server-
# renderad och fullt extraherbar — INTE JS-sköld som i Växjö/Halmstad) konvergerar
# fullständigt: regelverkets innehållsförteckning listar exakt samma 14 bidrag som
# portalens 15:e post ("Aktivitetsstöd", type=37) är en dubblett av "Lokalt
# aktivitetsstöd" (type=8) — ordagrant identisk Ändamål/Villkor/Utformning-text,
# saknas i regelverkets innehållsförteckning. Skriven en gång, se tackning.log.
# Ytterligare "Riktlinjer för priser, stipendier och utmärkelser" (Kultur- och
# fritidsnämnden, 21 maj 2025) konvergerar fullständigt med webbsidorna för
# kulturpris/idrottspris/kulturstipendium/idrottsstipendium (belopp, datum).
# Utöver Kultur- och fritidsnämndens bidrag: separata bidragsspår hos Socialnämnden
# (föreningsbidrag), Samhällsbyggnadsnämnden (samhällsbyggnadsbidrag) och
# Samhällsutveckling och trafik (bidrag till enskilda vägar) — se tackning.log.
# Spot-checkas av Jacob före publik deploy (leveransordning steg 4).
