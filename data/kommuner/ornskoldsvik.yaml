# Källa verifierad 2026-07-23 mot ornskoldsvik.se (källkonvergens enligt
# RESEARCH_SPEC v2 §2 — ingen samlad regelverks-PDF hittad på domänen, äldre
# PDF "Bidragsregler för ideella föreningar" (reviderad jan 2013) finns bara
# som docplayer.se-kopia och är därför INTE använd som källa). Kommunens
# redaktionella sida "Föreningsbidrag som går att söka" fungerar som
# kommunens egen kategoriserade förteckning över bidragsformer (organiserad
# per föreningstyp: idrott, barn/ungdom, funktionsrätt, pensionär, kultur,
# samlingslokal, friluft/fiske, studieförbund) men saknar belopp och exakta
# deadlines för de flesta bidrag — dessa uppges endast finnas i
# ansökningsportalen Interbook GO (ornskoldsvik.ibgo.se), som är
# JS-renderad och EJ_EXTRAHERBAR (se tackning.log). Specialkategorier
# (väg, landsbygd, vindbonus, evenemang, brottsförebyggande, stipendier)
# hittades utanför kultur- och fritidsnämndens sidträd, hos
# samhällsbyggnad, näringsliv och omsorg — se tackning.log för fullständig
# källista. Spot-checkas av Jacob före publik deploy.
