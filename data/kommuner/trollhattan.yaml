    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20 (specialkategori §2.1.5). Administreras av Samhällsbyggnadsnämnden, till skillnad från kultur- och fritidsförvaltningens övriga bidrag i denna fil. Omfattar dels ordinarie driftbidrag (barmarksunderhåll, vinterväghållning, dikesrensning m.m.), dels särskilt driftbidrag för åtgärder utanför ordinarie underhåll (förstärkning av bärlager, byte av skyltar, ombyggnad/renovering av vägtrumma eller räcke, dikningsarbeten). Ingen ansökningsdeadline eller belopp/kr-per-meter-nivå publicerad i den textextraherbara källan, till skillnad från t.ex. Halmstads motsvarande bidrag — därför satt till löpande. E-legitimation krävs för ansökan."
