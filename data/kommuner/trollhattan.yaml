    anteckning: "SAKNADES HELT I FÖREGÅENDE VERSION, utan dokumenterad uteslutning — tillagd vid korrigerande omkörning 2026-07-20 (specialkategori §2.1.5). Kommunen förvaltar åtta stiftelser/fonder; enligt §2.7 skrivet som ETT samlat bidrag i stället för en post per stiftelse. Minst fyra är uttryckligen öppna för föreningar/organisationer, inte bara enskilda: Nydqvistska stiftelsen ('utdelning kan ske till såväl organisationer som enskilda', deadline 30 april), Nydqvistska stiftelsen för idrottens främjande (idrottsföreningar, administreras av Kultur- och fritidsförvaltningen), Prims stiftelse för handikappade barn ('utdelning kan ske till såväl organisationer som enskilda', deadline 30 april OCH 31 oktober), samt Ulla och Hilding Johanssons forskningsfond (föreningar kan få bidrag, deadline 31 oktober). Övriga stiftelser på samma sida (Forsbergs stiftelse, Gudmundsson & Holmgrens stiftelse, Social samstiftelse 1, Birger Johansson & Berta Fredrikssons stiftelse) riktar sig enligt sidan i huvudsak till privatpersoner. Ansökan görs per stiftelse till ekonomikontoret@trollhattan.se (märkt 'Stiftelser') eller kulturfritid@trollhattan.se (Nydqvistska för idrott). Sidan senast granskad 2025-09-17."
