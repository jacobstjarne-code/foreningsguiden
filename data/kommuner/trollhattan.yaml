    anteckning: "SAKNADES I FÖREGÅENDE VERSION — tillagd vid korrigerande omkörning 2026-07-20. Finns som egen rubrik i kommunens gällande regelverk (Kommunfullmäktige 2017-02-06 §1, Kfn 2016/00450) men listas INTE på den redaktionella bidragssidan — ett konkret exempel på precis den täckningslucka RESEARCH_SPEC v2 §2 är skriven för att fånga (regelverket, inte webbredaktörens sidträd, avgör täckning). Enligt offentliga uppgifter om kultur- och fritidsnämndens budget drivs verksamheten i dagsläget av två kända föreningar (Velanda och Upphärad), som får driftbidrag för brukardriven fritidsgårdsverksamhet — bidraget ser alltså ut att vara aktivt även om det inte marknadsförs brett. Inget kronbelopp publicerat; 'beroende av det belopp som årligen anvisas för ändamålet' enligt regelverket."
