# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2, v2.1 — källkonvergens
# ersätter portal-först). Föregående version (verifierad 2026-07-19) rapporterades
# komplett men saknade fem bidrag som aldrig fångades av att bara följa kommunens
# redaktionella sidträd: Investeringsbidrag, Driftbidrag till organisationer,
# Vägföreningsbidrag, Bidrag för brukardriven fritidsgårdsverksamhet, samt
# kommunens stiftelser/fonder (8 st, skrivna som ETT samlat bidrag per §2.7).
#
# Metod: (1) Regelverket "Riktlinjer/beräkningsgrunder för föreningsbidrag" hämtades
# i två antagna versioner — 2015-01-19 (Kfn 2014/88-641, Kommunfullmäktige) och den
# gällande, nyare 2017-02-06 §1 (Kfn 2016/00450, Kommunfullmäktige) — och
# extraherades med pdftotext. Föregående körning rapporterade dessa PDF:er som
# "binärt/bildbaserat format" och otextextraherbara; det visade sig vara en
# verktygsbegränsning i föregående körnings hämtningsmetod, inte en egenskap hos
# PDF:erna själva — de är vanliga textbaserade PDF:er. Detta löste upp föregående
# körnings antagande att beräkningsgrunderna var otillgängliga. (2) Förvaltningens
# huvudöversikt samt tre källor utanför kultur- och fritidsförvaltningens ordinarie
# spår genomsöktes specifikt: Samhällsbyggnadsnämndens sida om enskilda vägar,
# Ekonomikontorets stiftelse-/fondsida, samt Trollhättan Stadshus AB:s
# elitsponsringssida. (3) Specialkategorier enligt §2.1.5 genomsöktes riktat: väg/
# samfälligheter (träff — Vägföreningsbidrag), bygdegårdar (redan i filen),
# stiftelser/fonder (träff — 8 stiftelser), samhälls-/byalagsföreningar (sökt
# aktivt, ingen distinkt bidragsform funnen utöver de befintliga bidragen till
# hållbar utveckling och driftbidrag till organisationer), studieförbund (redan i
# filen). Samtliga minasidor.trollhattan.se-undersidor som konsulterades visade sig
# vara textextraherbara som statisk text (till skillnad från Växjös Rbok och
# Halmstads FRI, som är JS-renderade) — ingen EJ_EXTRAHERBAR-flagga behövdes för
# minasidor denna gång.
#
# Uteslutna (kategoriskt skäl, §2.4):
# - "Ungdomspengen" — kommunens egna sidor (trollhattan.se/n3/ungdomspengen samt
#   minasidor/473) beskriver stödet som riktat "endast [till] privatpersoner"
#   12–25 år. 2015 års regelverk nämnde det som sökbart även för föreningar, men
#   det är borttaget ur både 2017 års gällande regelverk och den nuvarande
#   redaktionella bidragssidan. Individuellt stöd till privatperson, inte ett
#   föreningsbidrag. https://www.trollhattan.se/n3/ungdomspengen/
# - "Elitsponsring" — administreras och beslutas av Trollhättan Stadshus AB (TSAB),
#   ett kommunägt bolag med egen styrelse — annan huvudman än kommunen.
#   https://www.trollhattan.se/startsida/uppleva-och-gora/foreningar-foreningsliv/bidrag-stod-och-elitsponsring/elitsponsring/
#
# Källkonflikt (§2.5, ej nollställningsbar eftersom fältet är fritext): det gällande
# regelverket (2017-02-06 §1) anger lägst 10 medlemmar för föreningar för personer
# med funktionsnedsättning. Den tidigare verifierade e-tjänsten (minasidor/140) gav
# vid direkt läsning 25 och saknar synligt publiceringsdatum på sidan, så ingen
# källa kan avgöras som nyare. Det senast direkt verifierade webbvärdet (25)
# behålls i malgrupp-fältet och avvikelsen dokumenteras i bidragets anteckning
# istället för att nollställas — se trollhattan-funktionsnedsattning-bidrag.
#
# Kultur- och fritidsförvaltningen hanterar merparten av bidragen. Bidraget till
# hållbar utveckling beslutas av Kommunstyrelsens Agenda 2030-utskott och
# Trygghetsutskott. Vägföreningsbidraget administreras av Samhällsbyggnadsnämnden.
# Stiftelser/fonder administreras huvudsakligen av Ekonomikontoret (Nydqvistska
# stiftelsen för idrottens främjande av Kultur- och fritidsförvaltningen).
# Spot-checkas av Jacob/Fable före publik deploy.
