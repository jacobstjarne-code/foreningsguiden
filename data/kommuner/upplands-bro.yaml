# Källa verifierad 2026-07-10 mot upplands-bro.se. Deadlines för lokal-/drifts-
# bidrag (31 mars) och kulturbidrag (31 juli) samt startbidrag (löpande) från
# kommunens sidor. Socialt föreningsbidrag 2026 var stängt vid verifiering.
