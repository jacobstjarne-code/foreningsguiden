# Källa verifierad 2026-07-21 mot vallentuna.se (källkonvergens enligt RESEARCH_SPEC_v2 §2/v2.1).
# Huvudkälla: "Bidragsnormer för föreningsverksamhet i Vallentuna" (4.4.1, FN 2018.020,
# fastställd av kommunfullmäktige 1997-10-06, reviderad 2003-03-10 och 2021-06-07, granskad
# av fritidsnämnden 2026-04-16) — kommunens antagna regelverk, hämtat som PDF och extraherat
# med pdftotext eftersom WebFetchs inbyggda PDF-läsning misslyckades på binärdatan. Räknar
# upp åtta bidragsformer under fritidsnämnden (§1.1.1), inklusive två lokalsubventioner (§8,
# §11) som saknar egen sida på vallentuna.se och bara finns i regelverket.
# Andra regelverkskälla: "Riktlinje för bidrag till föreningar inom socialnämndens
# verksamhetsområde" (6.8.20, SN 2025.202, fastställd av socialnämnden 2025-11-18) — nytt
# dokument, ersätter en äldre version. Ger två bidragskategorier: ideella föreningar och
# pensionärsföreningar, båda med ansökan senast 10 april.
# Tredje regelverkskälla: "Riktlinjer för bidrag speciella ändamål" (fastställda av
# fritidsnämnden 2025-06-12) — egen PDF med fem delformer under paraplyet "Bidrag för
# speciella ändamål" och en hård deadline (31 oktober) som den äldre AI-sammanfattade
# webbsidan inte gav lika tydligt.
# Kryssat mot kulturnämndens sidor (garantibidrag, övriga kulturstödjande åtgärder, snabb
# peng, studieförbund, gemensamhetslokaler) — samtliga bekräftade med egna URL:er, ingen av
# dem täcks av fritidsnämndens eller socialnämndens regelverk (olika nämnder/förvaltningar).
# Ansökningsportalen (vallentuna.rbok.se) är JS-renderad — EJ_EXTRAHERBAR, gick inte att
# räkna upp separat, men används som ansökningssystem för i princip alla bidrag ovan
# (bekräftat via respektive sidas ansökningslänk).
# Specialkategorier (§2.1.5): väg-/samfällighetsbidrag — sökt, EJ FUNNET på vallentuna.se
# (kommunen hänvisar generellt till Trafikverkets statsbidrag för enskilda vägar, inget eget
# kommunalt bidrag identifierat). Bygdegårdar/byalag — täcks sannolikt av "Gemensamhetslokaler
# drivna av föreningar och stiftelser" (Lindholmens och Kårsta-Ekskogens bygdegårdar nämns i
# landsbygdskontext), ingen separat kategori funnen. Stiftelser/fonder som föreningar kan söka
# ur — Vallentuna kommuns miljöstipendium är öppet för föreningar/organisationer utöver
# privatpersoner och tas med; övriga stipendier/fonder (Josef Anderssons fond, Skolsamfonden,
# Össeby-Garns Magasinkassas stipendiefond, Frösunda sädesmagasinsfond, Anna Ramsten-Hedéns
# minnesfond, Greta Perssons stiftelse, K G Zetterlunds pensionärsfond, Mariana Logrens
# Donationsfond) riktar sig uteslutande till enskilda elever/studerande/pensionärer eller till
# kommunens egna äldreboenden — uteslutna enligt §2.4(a). Studieförbund — täcks (kulturnämnden,
# egen bidragsform baserad på studietimmar).
# Fritidskortet (statligt stöd, 550 kr/barn 7-16 år) uteslutet: individuell förmån till
# privatperson, administrerad av staten, inte ett kommunalt föreningsbidrag.
# "Vallentunas landsbygder"/Leader-metoden nämns som utvecklingsmöjlighet men administreras av
# en extern Leader-organisation (LAG), inte av kommunen direkt — inget eget kommunalt bidrag
# identifierat, ej medtaget.
# Spot-checkas av Jacob före publik deploy.
