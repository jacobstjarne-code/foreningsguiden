# Källa verifierad 2026-07-23 mot engelholm.se (kommunens officiella domän —
# angelholm.se är INTE kommunens webbplats). Huvudkälla är den samlade
# föreningsbidragssidan (foreningsbidrag.html), som ovanligt nog innehåller
# fullständig syfte/målgrupp/riktlinjer/ansökan-text för varje bidrag direkt
# på sidan (inte bara länkar till underliggande PDF/regelverk — inget
# fristående regelverks-PDF hittades trots aktiv sökning, se tackning.log).
# Sju av bidragen har dessutom egna "villkor vid ansökan"-undersidor med
# identiskt innehåll (använda som kalla_url där de finns, konvergenskontroll
# i tackning.log). Utöver föreningsbidrag.html är källorna: vägbidrag
# (trafik-och-stadsplanering), stiftelser (stod-och-omsorg, CMS-migrerad
# 2026 — gammal /omsorg-och-hjalp/-URL 301:ar till ny /stod-och-omsorg/-URL),
# visionsfonden (kommun-och-politik), sponsring och priser (uppleva-och-gora).
# Föreningar som INTE kan söka föreningsstöd enligt kommunens allmänna
# riktlinjer: ekonomiska föreningar, politiska föreningar, föreningar knutna
# till religiösa samfund eller svenska försvaret, elevföreningar,
# stödföreningar (supporterklubbar m.fl.), föreningar knutna till
# Kulturskolans verksamhet.
