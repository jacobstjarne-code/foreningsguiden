    kategori: ["ovrig"]
    malgrupp: "Väghållare som redan får årligt driftbidrag, med behov av ett större underhållsarbete på vägen."
    deadlines:
      typ: "fasta"
      datum: ["08-30"]
    krav:
      - "Endast väghållare som redan får årligt driftbidrag kan söka"
      - "Kostnaden för arbetet bör inte understiga 5 000 kronor exklusive moms"
      - "Ansökan måste inkomma innan kommunen kan lämna beslut om bidrag"
      - "För vägar utan statligt bidrag samt gång- och cykelvägar/lekplatser krävs tre offerter från olika företag, och företaget med lägst offert ska utföra arbetet"
    belopp: "Vägar med statligt bidrag: kommunen ger bidrag på mellanskillnaden så att föreningen själv betalar 15 procent av godkänd kostnad, efter att Trafikverket godkänt arbetet. Vägar utan statligt bidrag samt gång- och cykelvägar/lekplatser: kommunen ger bidrag på 85 procent av godkänd kostnad."
    sen_ansokan: "För vägar utan statligt bidrag samt gång- och cykelvägar/lekplatser: ansökan senast 30 augusti året innan åtgärden ska utföras. Kommunen kan besluta att bevilja bidrag i upp till två år efter att ansökan inkommit. Lämnas inte för kostnader som uppkommit innan bidraget beviljats, om inte kommunen medger undantag i särskilda fall."
    kalla_url: "https://www.engelholm.se/trafik-och-stadsplanering/trafik-och-gator/enskilda-vagar/riktlinjer-for-kommunalt-bidrag-till-enskild-vaghallning.html"
    anteckning: "'Särskilt bidrag' är Trafikverkets benämning, som Ängelholms kommun också använder. Exempel på bidragsberättigade arbeten: byte av vägtrummor (minst 500 mm diameter), förstärkning/omläggning av vägsträcka, ombyggnad av vägskäl, vägräcken/trafiksäkerhetsåtgärder, ombyggnad/reparation av broar, beläggningsåtgärder i trafikklass hög, upprustning av ny bidragsväg. Bidrag betalas ut när arbetet är utfört, godkänt och avstämt mot fakturakopia — normalt året efter arbetets utförande. Prioritetsordning vid begränsade medel: 1) vägar med statligt bidrag, 2) lekplatser med allvarliga brister samt vägar med skolskjuts, 3) cykelvägar, 4) övriga enskilda vägar. 08-30-deadline gäller uttryckligen vägar utan statligt bidrag samt gång-/cykelvägar/lekplatser — för vägar MED statligt bidrag anges inget eget fast datum i källan (processen följer i stället Trafikverkets granskning)."

