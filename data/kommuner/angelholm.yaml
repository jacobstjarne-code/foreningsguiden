forutsattningar:
  - id: "angelholm-registrering-rbok"
    vad: "Registrera föreningen i Rbok"
    beskrivning: "Föreningen måste registreras i kommunens föreningsregister Rbok innan bidrag kan sökas. Kräver organisationsnummer från Skatteverket, säte och huvudsaklig verksamhet i Ängelholms kommun, antagna stadgar, demokratiskt vald styrelse, hållet årsmöte, verksamhet som huvudsakligen gynnar boende i Ängelholm, anslutning till riksorganisation om sådan finns, uttag av medlemsavgift (eller annan aktiv bekräftelse av medlemskap), minst 10 aktiva medlemmar, och registrerat plus- eller bankgiro. Föreningen ska varje år uppdatera kontaktuppgifter, medlemsinformation, senaste årsmötesprotokoll, verksamhetsberättelse, resultatrapport och stadgar i Rbok. Ekonomiska föreningar, politiska föreningar, föreningar knutna till religiösa samfund eller svenska försvaret, elevföreningar, stödföreningar (supporterklubbar m.fl.) och föreningar knutna till Kulturskolans verksamhet kan inte söka föreningsstöd."
    system: "Rbok (engelholm.rbok.se)"
    ledtid: null
    ledtid_text: "Kommunen anger ingen handläggningstid för registrering i Rbok."
    giltighet: null
    ordning: 1
    kalla_url: "https://www.engelholm.se/uppleva-och-gora/bidrag-sponsring-och-priser/bra-att-veta-nar-du-soker-foreningsbidrag.html"

