# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) var bättre än typfallet — den hade redan läst
# barn-/ungdomssidan djupt nog att hitta flera distinkta bidrag under
# samma URL (till skillnad från t.ex. Karlstads/Halmstads ursprungliga
# ytliga läsning) — men missade ändå två hela bidrag som låg UTANFÖR
# kultur- och fritidsnämndens sidträd, och uteslöt två bidrag den
# faktiskt hittade med skäl som inte är godkända enligt §2.4.
#
# Metod denna omgång: (1) Regelverks-PDF:en "Riktlinjer för stöd och
# stipendier till kultur- och fritidsverksamhet" (Kultur- och
# fritidsnämnden 2023-12-12 § 73, dnr 00128/2023, gäller fr.o.m.
# 2024-01-01, senast reviderad 2024-01-25) omhämtad och läst i fulltext,
# 18 sidor — samma innehåll som tidigare men på ny URL. De två äldre
# PDF-filnamnen som den förra körningens filhuvud refererade till
# ("riktlinjer_stod_och_stipendier_ideella_foreningar_studieforbund.pdf"
# och "riktlinjer_stod_och_stipendier_kultur_fritid.pdf") gav båda 404
# vid denna körning — konsoliderade till den enda nuvarande PDF:en.
# (2) Samtliga förvaltningssidor lästa i sin helhet: barn- och
# ungdomsverksamhet, kulturstöd, föreningsbidrag sociala frågor,
# föreningsbidrag för äldre och funktionsnedsättning, stöd till
# studieförbund, ränte- och amorteringsfritt lån, föreningscertifikat,
# stipendier. (3) Självservice: etjanst.molndal.se genomsökt — RoA-lånets
# e-tjänst (overview/205) bekräftade det fasta ansökningsfönstret genom
# att visa "Ansökningstiden för ränte- och amorteringsfritt lån har gått
# ut", vilket oberoende styrker regelverkets/webbsidans datum. (4)
# Ansökningsportalen Rbok (molndal.rbok.se) bekräftat EJ_EXTRAHERBAR —
# ren inloggningssida utan uppräkningsbar bidragslista, samma mönster som
# Karlstad/Halmstad/Växjö. (5) Specialkategorier (§2.1.5) sökta riktat:
# vägföreningar/vägsamfälligheter — TRÄFF (driftsbidrag till enskilda
# vägar, Tekniska nämnden, helt utanför kultur-/fritidsnämndens
# sidträd — detta var den systematiska blinda fläcken); bygdegårdar/
# samlingslokaler — inget separat bidrag utöver det redan skrivna
# lokalbidraget; stiftelser/fonder — sökt brett, inget kommunalt
# förvaltat stiftelseprogram öppet för föreningar hittat (till skillnad
# från Karlstad/Halmstad/Bollnäs — Mölndal saknar en motsvarande
# stiftelseportfölj så vitt sökningen kunde visa); byalag/
# samhällsföreningar/landsbygdsråd — sökt, inget hittat (Mölndal är en
# tätortsdominerad kommun utan synligt landsbygdsutvecklingsspår,
# till skillnad från Karlstads landsbygdsmedel).
#
# NYA/KORRIGERADE BIDRAG (4 st):
# 1. Ränte- och amorteringsfritt lån (RoA-lån) — HELT SAKNAT i föregående
#    version trots egen rubrik i huvudnavigeringen och eget avsnitt i
#    regelverks-PDF:en (sid 15).
# 2. Driftsbidrag till enskilda vägar — HELT SAKNAT, specialkategori
#    §2.1.5, ligger under Tekniska nämnden och syns aldrig i kultur-/
#    fritidsnämndens sidträd eller regelverk.
# 3. Kulturstrategiskt uppdrag — hittades av föregående körning men
#    MEDVETET UTESLUTEN med motiveringen "saknar publicerat belopp och är
#    en löpande dialogprocess" — inte ett giltigt §2.4-skäl (belopp: null
#    är explicit tillåtet, RESEARCH_SPEC_v2.md §4). Korrigerad och
#    tillagd.
# 4. Arrangemangs- och projektstöd fritid — hittades av föregående
#    körning (i PDF:en, sid 16) men MEDVETET UTESLUTEN med motiveringen
#    "överlappar delvis med projektstöd kultur" — "liknar ett annat
#    bidrag" är uttryckligen förbjudet som uteslutningsskäl (§2.4).
#    Distinkt målgrupp (fritidsföreningar generellt, inte kulturprojekt)
#    och egen publicering på barn-/ungdomssidan. Korrigerad och tillagd.
#
# MEDVETET_UTESLUTET denna omgång (§2.4, giltiga skäl):
# - Ledarstipendium, Idrottsstipendium, Arbetsstipendium konst och
#   kultur, Kulturstipendium — individuella pris/stipendier till
#   privatperson (nomineras av eller via förening, men mottagaren är en
#   enskild person). Konsekvent med hur Karlstad/Halmstad/Bollnäs
#   hanterar motsvarande poster.
#   https://www.molndal.se/uppleva-och-gora/foreningar-och-foreningsliv/foreningsbidrag-och-stipendier/stipendier
#
# GRÄNSFALL, flaggat för Fables §6-grind: Föreningscertifikat behålls som
# en post i "forutsattningar" (inte som ett eget bidrag i "bidrag") även
# denna omgång. Sidan säger uttryckligen att "Certifieringen är en del av
# stödet till idrottsföreningar" och att stödet grundas på antal
# medlemmar 7–20 år — men certifikatet har ingen egen fristående
# ansökningsprocess, eget belopp eller eget ansökningsdatum utanför
# medlemsbidraget det förstärker. Bedömt som en kvalificeringströskel för
# högre medlemsbidrag, inte ett självständigt sökbart bidrag — men
# gränsdragningen är inte solklar och bör spot-checkas.
#   https://www.molndal.se/uppleva-och-gora/foreningar-och-foreningsliv/foreningsbidrag-och-stipendier/foreningscertifikat
#
# Varningssignal (§2.6): inga nya kluster av identiska deadlines denna
# omgång. Kultur- och fritidsnämndens återkommande ansökningsfönster
# (10 feb–29 maj / 18 aug–16 okt för flera kulturbidrag) är redan
# individuellt verifierat per bidrag mot respektive sidas löptext, inte
# ett ärvt värde.
#
# Dubbelhämtning (§3): samtliga nya/korrigerade fält (RoA-lånets
# ansökningsperiod och maxbelopp, enskilda vägars deadline/minimilängd/
# beslutsnämnd, snabba kulturstödets och arrangemangs-/projektstöd
# fritids datum/belopp, kulturstrategiskt uppdrags avsaknad av fast
# deadline) bekräftade konsekvent över två oberoende WebFetch-hämtningar
# av respektive källa. Inga nya fältkonflikter denna omgång. Den redan
# dokumenterade konflikten om ansokningssystem.namn (regelverks-PDF:en
# nämner aldrig "Rbok", två oberoende webbhämtningar gör det konsekvent —
# löst till förmån för webben eftersom PDF:en föregår ett systembyte)
# kvarstår oförändrad, se konflikter.log.
#
# Spot-checkas av Jacob/Fable före publik deploy (leveransordning steg 4).
