# KORRIGERANDE OMKÖRNING 2026-07-21 mot RESEARCH_SPEC_v2.md (källkonvergens,
# §2) — ersätter körningen från 2026-07-19 som byggde uteslutande på
# kultur- och fritidsförvaltningens redaktionella bidragssida. Metod denna
# omgång:
# (1) Regelverket: "Regler för föreningsbidrag", fastställt av kultur- och
#     fritidsnämnden 2025-05-23 § 44, senast ändrat 2026-04-22 — publicerat
#     som kommunens egen §-numrerade sida (§§ 4, 6–18), inte som fristående
#     PDF. Dubbelläst, konsekvent mellan de två läsningarna.
# (2) Förvaltningarnas egna sidor genomsökta specifikt UTANFÖR kultur-
#     och fritidsspåret: samhällsplanering och trafik (vägbidrag — TRÄFF,
#     se nedan), kommun-och-politik/kommunfakta (stiftelser/fonder — TRÄFF),
#     evenemang-och-medfinansiering (kultur- och idrottspotten, egen
#     URL-gren utanför bidrag-stod-och-stipendier-trädet — TRÄFF), social-
#     och omsorgsnämnd (sökt riktat, ingen separat föreningsbidragslinje
#     hittad utöver kultur- och fritidsnämndens funktionshinders-/
#     pensionärsspår).
# (3) Självservice: e-tjänster.sundsvall.se genomsökt för föreningsbidrag,
#     vägbidrag (flowoverview/2410) och den generella ansökningstjänsten
#     (flowoverview/1603).
# (4) Portalen Actor Smartbook (sundsvall.actorsmartbook.se) bekräftat
#     EJ_EXTRAHERBAR — ren inloggnings-/bokningsportal, bidragslistan visas
#     först efter inloggning.
# (5) Specialkategorier: vägföreningar/vägsamfälligheter (TRÄFF, se nedan),
#     bygdegårdar/samlingslokaler (täcks av befintligt driftbidrag),
#     stiftelser/fonder (TRÄFF, se nedan — ca 20 stiftelser öppna för
#     föreningar av kommunens totalt ca 60+, skrivna som ETT samlat bidrag
#     enligt §2.7), byalag/samhällsföreningar (sökt riktat, inget separat
#     kommunalt bidrag hittat utöver Leader Mittland Plus/Bygdemedel som
#     är länsstyrelse-/EU-administrerade och därför utanför kommunens
#     domän), studieförbund (täcks av befintligt verksamhetsbidrag).
#
# Fyra bidrag tillagda vid denna omkörning (se konflikter.log för fullständig
# rotorsak per post):
#   1-2. Vindkraftstöd (generellt) och Vindkraftstöd (investeringsbidrag) —
#        KORRIGERAT. Uteslöts felaktigt 2026-07-19 med motiveringen
#        "engångsutbetalning ... inte ett återkommande föreningsbidrag".
#        Detta är inte ett giltigt uteslutningsskäl enligt §2.4 (varken
#        tidsbegränsning eller geografisk avgränsning finns med i den
#        uttömmande listan). Bidraget riktar sig uttryckligen till
#        föreningar och administreras av Sundsvalls kommun via samma
#        bidragstyper-sida och samma Smartbook-system som övriga bidrag.
#   3. Bidrag till enskilda vägar — HELT SAKNAT 2026-07-19 (specialkategori
#      §2.1.5). Stadsbyggnadsnämnden, inte kultur- och fritidsnämnden/
#      Föreningsbyrån — låg helt utanför förra körningens sökområde.
#   4. Stiftelser och fonder öppna för föreningar — HELT SAKNAT 2026-07-19.
#      Kommunen förvaltar ca 20 stiftelser öppna för föreningar (av
#      totalt ca 60, resten uteslutna enligt §2.4 som renodlat
#      privatpersons- eller elevriktade). Skrivet som ETT samlat bidrag.
#
# Två bidrag ("Bidrag för nationella minoriteter" och "Kultur- och
# idrottspotten") bekräftade finnas på webben men INTE i det §-numrerade
# regelverket — SKRIVET_EJ_I_REGELVERK, se tackning.log. Båda handläggs
# av andra funktioner än Föreningsbyrån/kultur- och fritidsnämnden.
#
# Dubbelhämtning (§3): samtliga huvudkällor (bidragstyper-sidan,
# regelverket, fonder-sidan, kultur- och idrottspotten-sidan,
# vägbidragssidan) hämtade i två oberoende pass. En tidigare olöst
# konflikt från 2026-07-19 (Verksamhetsbidrag för studieförbund,
# 30 vs 31 maj) löstes denna omgång: båda nya oberoende hämtningarna
# gav samstämmigt 30 maj — deadline satt till 05-30, se konflikter.log.
#
# Uteslutna (kategoriskt skäl, §2.4):
# - Stiftelsen B J Wesslers Donationsfond — administreras externt av S&P
#   Wealth Management Services AB, inte av kommunen. Annan huvudman.
#   Utesluten ur stiftelseaggregatet nedan (övriga ca 20 stiftelser i
#   aggregatet är kommunalt förvaltade).
# - Ca 40 stiftelser/skolstipendier riktade uteslutande till privatpersoner
#   eller elever (t.ex. Fröken Nanna Platzmans stiftelse, Kulturstipendiets
#   huvudpris, samtliga skolstipendier via barn- och utbildnings-
#   förvaltningen) — stöd som endast riktas till privatpersoner.
# - "LOK-stöd" (nämnt i Smartbook-manualen för RF-anslutna föreningar) —
#   statligt bidrag administrerat via Riksidrottsförbundet, annan huvudman.
#
# Spot-checkas av Jacob/Fable före publik deploy.
