# KORRIGERANDE OMKÖRNING 2026-07-20 mot RESEARCH_SPEC_v2.md §2 (reviderad
# v2.1, RESEARCH_SPEC_v2_1_paragraf2.md — källkonvergens, inte portalen, är
# facit). Föregående version (verifierad 2026-07-19) följde i praktiken bara
# kommunens redaktionella sidträd "Uppleva och göra > Föreningar > Stöd för
# föreningar" (8 bidrag) och missade tre hela bidragsspår som ligger utanför
# det trädet, administrerade av HELT ANDRA förvaltningar:
#
#   1. Service, Fastigheter — anläggningsstöd till samlingslokaler och
#      hembygdsgårdar, reglerat i ett Kommunfullmäktige-beslut (§ 142,
#      2015-10-15) som inte länkas från "Stöd för föreningar" alls.
#   2. Förvaltningen för Teknik — tre väg-/lekplatsrelaterade bidrag
#      (vägbidrag, särskilt vägbidrag, lekplatsbidrag) som ligger under
#      "Trafik, resor och utemiljö", inte under "Föreningar".
#
# Metod denna omgång: (1) sökte efter antaget regelverk — hittade inget
# enskilt konsoliderat "regelverk för föreningsbidrag"-PDF för den nya
# stödmodellen (2025/2026), bara den äldre KF-beslutade anläggningsstöds-PDF:n
# och nämndprotokoll. (2) Genomsökte självservice.kungsbacka.se separat från
# den redaktionella bidragssidan — detta var nyckelsteget, samma mekanism som
# avslöjade Halmstads vägbidrag: sjalvservice.kungsbacka.se listar tre
# väg-/lekplatsbidrag som aldrig länkas från föreningssidorna. (3) Sökte
# riktat efter förvaltningarnas egna sidor utanför Kultur & Fritid (Teknik,
# Service/Fastigheter). (4) Rbok (rbok.kungsbacka.se) kontrollerades separat
# — enligt kommunens egen sida "Nytt system för bokningar och stöd" hanterar
# Rbok idag bara LOK och föreningsregistrering, bidragsfunktionalitet är
# under utbyggnad ("efter lansering bygger vi ut med fler funktioner som
# möjlighet att söka stöd"). Loggat som EJ_EXTRAHERBAR/ej fullständig källa
# i tackning.log, inte fel — matchar v2.1:s förväntan. (5) Stiftelser (16
# st) kontrollerades: till skillnad från Halmstads 52 stiftelser (uttryckligen
# öppna för föreningar) verifierades tre av Kungsbackas stiftelser
# individuellt (Erik Hjälmlövs stiftelse, Hallgrens och Gagnells fond,
# Stiftelsen socialfonden) — samtliga uteslutande riktade till privatpersoner
# (studerande, funktionsnedsatta, barnfamiljer, äldre). Övriga 13 av 16 är
# INTE individuellt granskade — se tackning.log för reservation.
#
# Täckningsavstämning: 6 nya bidrag hittade och tillagda (0 fanns i
# föregående version). 3 tjänster utanför "Stöd för föreningar" utredda och
# uteslutna med kategoriskt skäl (Föreningsuppdrag, Ansöka om evenemang,
# Hyra mobil utrustning). Fritidskortet och Kungsbackagalans "Årets förening"
# utredda och uteslutna med kategoriskt skäl. Se tackning.log för fullständig
# avstämning.
#
# Kungsbacka har FYRA förvaltningar med egna föreningsbidragsspår: Kultur &
# Fritid (idrott/kultur/ungdom, 8 bidrag), Individ & Familjeomsorg (socialt
# arbete, 1 bidrag), Service/Fastigheter (samlingslokaler/hembygdsgårdar,
# 3 bidrag) och Teknik (väg-/lekplatsbidrag, 3 bidrag). Ansökan sker
# huvudsakligen via Rbok (LOK, föreningsregistrering) eller separata
# e-tjänster på sjalvservice.kungsbacka.se (övriga bidrag) — se anteckning
# per bidrag. Spot-checkas av Jacob/Fable före publik deploy.
