forutsattningar:
  - id: "kungsbacka-stodberattigad-forening"
    vad: "Bli och förbli godkänd som stödberättigad förening"
    beskrivning: "Föreningen bekräftar att den följer kommunens regler kopplade till de fyra grundprinciperna (likvärdighet, samhällsengagemang, livskraftiga föreningar, breddaktiviteter) och är demokratiskt uppbyggd med tydlig värdegrund, styrelse om minst tre ledamöter (ordförande, sekreterare, kassör), stadgar och årsmöte. Minst 75 procent av medlemmarna ska vara folkbokförda i Kungsbacka kommun och huvudverksamheten bedrivas i kommunen. Föreningar med verksamhet för barn, unga eller personer med funktionsnedsättning ska visa efterlevnad av relevanta konventioner (bland annat barnkonventionen) samt ha ANDTS-fri verksamhet. Inom en månad efter årsmötet ska signerade årsmöteshandlingar (protokoll, verksamhetsberättelse, ekonomisk redovisning, revisionsberättelse) och uppdaterade föreningsuppgifter laddas upp och bekräftas i Rbok."
