forutsattningar:
  - id: "landskrona-bidragsberattigad-forening"
    vad: "Bli bidragsberättigad förening"
    beskrivning: "Föreningen ska ha säte i Landskrona kommun (eller beviljas undantag av bidragsgivande nämnd), vara ansluten till godkänd riksorganisation eller godkännas separat, ha organisationsnummer, vara öppen för alla, ha stadgar och en demokratiskt vald styrelse, föra medlemsmatrikel med namn/adress/födelsedata, ta ut medlemsavgift, och ha minst tio bidragsberättigade (mantalsskrivna) medlemmar. Föreningen ska registrera och årligen uppdatera/godkänna sina uppgifter i Landskrona stads föreningsregister. All bidragsberättigad verksamhet ska vara helt rök-, alkohol- och drogfri, icke-konfessionell och partipolitiskt obunden (undantag för ungdomsförbund med riksdagsrepresentation)."
    system: "Landskrona stads föreningsregister (via landskrona.rbok.se) samt kommunens e-tjänsteportal"
