# Källa verifierad 2026-07-23 mot landskrona.se. Täckning fastställd via
# källkonvergens (RESEARCH_SPEC v2.1 §2): regelverket (fyra nämnd-PDF:er,
# beslutade 2024-03 till 2024-11, samtliga grundade på "Värdegrund och
# allmänna bestämmelser för föreningsbidrag i Landskrona stad", antagen av
# kommunfullmäktige 2023-10-26 § 142) + förvaltningarnas egna sidor
# (kulturförvaltningens dedikerade bidragssidor gav mer specifika deadlines
# än PDF-regelverket) + e-tjänstkatalogen på etjanster.landskrona.se (235
# tjänster, statiskt renderad katalogsida — användes som tredje oberoende
# konvergenskälla, se tackning.log) + stipendiesidan under
# omsorg-och-hjalp/. Fyra nämnder delar ut föreningsbidrag: kulturnämnden,
# individ- och familjenämnden, omsorgsnämnden samt teknik- och
# fritidsnämnden (förvaltningen döptes om/delades under 2024, se
# tackning.log för detaljer — regelverks-PDF:en från 2024-11-21 anger
# fortfarande "Teknik- och fritidsnämnden" som beslutande nämnd).
# Ansökningsportalen landskrona.rbok.se är JS-renderad och gick inte att
# räkna upp direkt (EJ_EXTRAHERBAR) — täckningen är i stället fastställd
# via regelverket + förvaltningssidorna + e-tjänstkatalogen, i linje med
# v2.1:s reviderade metod. Spot-checkas av Jacob före publik deploy.
