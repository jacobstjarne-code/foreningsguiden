    vad: "Bli godkänd som bidragsberättigad förening"
    beskrivning: "Föreningen ansöker om att bli bidragsberättigad förening hos fritidsnämnden. Kräver minst 15 registrerade medlemmar i åldern 7-20 år, varav minst 51 procent folkbokförda i Nacka kommun. En bidragsberättigad förening kan ingå i fördelningen av tider i Nacka kommuns idrottsanläggningar och söka aktivitetsbidrag, investeringsbidrag och projektbidrag. Status bibehålls genom att löpande ansöka om aktivitetsbidrag för varje period verksamhet genomförts — upphör om föreningen inte ansökt om eller beviljats aktivitetsbidrag för två på varandra följande perioder."
