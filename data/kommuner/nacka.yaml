# Källa verifierad 2026-07-20 mot nacka.se enligt RESEARCH_SPEC_v2.1 (källkonvergens).
# Täckning fastställd via regelverk (fritidsnämndens riktlinje FRN 2024-00074,
# fastställd/senast uppdaterad 2025-12-03, läst sida för sida ur PDF) +
# socialnämndens/äldrenämndens riktlinje (SOCN 2024-00225/ÄLN 2024-00092,
# fastställd 2024-06-10, läst ur PDF) + kommunens redaktionella sidor för
# kulturstöd och väg-/gatubelysningsbidrag. Ingen extraherbar ansökningsportal-
# uppräkning hittades (Rbok är JS-renderad) — täckning byggd på källkonvergens
# mellan regelverk och förvaltningssidor, se rapport. Specialkategorier
# (bygdegårdar, stiftelser för föreningar, byalag, studieförbund) undersökta
# men ingen träff hittad i Nacka — se ANMARKNING i rapporten.
kommun: "Nacka"
kommun_slug: "nacka"
lan: "Stockholms län"
befolkning: 113730
forvaltning: "Fritidsnämnden, kulturnämnden, socialnämnden och äldrenämnden (föreningsbidrag) samt stadsutvecklings- och trafikenheten (väg- och gatubelysningsbidrag)"
ansokningssystem:
  namn: "Rbok (boknings- och bidragssystem)"
  url: "https://nacka.rbok.se/"
kalla_url: "https://www.nacka.se/uppleva--gora/foreningar/foreningsbidrag/"
verifierad: 2026-07-20
bidrag:
  - id: "nacka-aktivitetsbidrag"
    namn: "Aktivitetsbidrag"
    kategori: ["idrott", "funktionsratt"]
    malgrupp: "Bidragsberättigade föreningar som på ideell grund bedriver idrotts- eller fritidsverksamhet för barn och unga 7-20 år eller för personer med funktionsnedsättning, med minst 15 godkända aktiviteter per år"
