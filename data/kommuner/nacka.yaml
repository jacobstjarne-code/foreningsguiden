      typ: "fasta"
      datum: ["02-25", "08-25"]
    krav:
      - "Föreningen ska uppfylla kommunens allmänna villkor och särskilda villkor för bidragsberättigad förening (minst 15 registrerade medlemmar 7-20 år, varav minst 51 procent folkbokförda i Nacka kommun)"
