    anteckning: "Beslut och utbetalning inom tre månader efter sista ansökningsdag per period. Källa: Riktlinjer för bidrag inom idrotts- och fritidsområdet (FRN 2024-00074, fastställd/senast uppdaterad 2025-12-03)."
  - id: "nacka-investeringsbidrag"
