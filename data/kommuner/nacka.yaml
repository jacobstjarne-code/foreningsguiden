      - "Beviljas inte till redan påbörjade projekt, lös egendom (inventarier, möbler, vitvaror, individuell tävlings-/träningsutrustning), avgift för bygglov, administrations- eller projekteringskostnader, eller projekt finansierade av annan nämnd/myndighet"
    belopp: "Högst 50 000 kronor per investeringsprojekt, en ansökan per ansökningstillfälle"
