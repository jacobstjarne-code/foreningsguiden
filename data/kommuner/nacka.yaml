      - "Max 30 deltagare per ledare och aktivitetstillfälle genererar bidrag"
      - "Beviljas inte till fester, läxläsning, firande av högtid, biobesök, restaurangbesök eller liknande, verksamhet inom skolans regi, öppen verksamhet eller studiecirklar"
    belopp: "Värde per närvaromarkering: 7-11 år 7 kr, 12-16 år 10 kr, 17-20 år 12 kr, deltagare med funktionsnedsättning oavsett ålder 12 kr, ledare 12 kr. Deltagare 7-11 år ersätts max 2 ggr/vecka/idrott (40 ggr/halvår), 12-16 år max 3 ggr/vecka (60 ggr/halvår), 17-20 år max 4 ggr/vecka (80 ggr/halvår)."
    sen_ansokan: "Ej komplett, sent inkommen eller felaktig ansökan kan avslutas utan handläggning"
