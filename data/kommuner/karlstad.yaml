# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-18) fångade bara 6 bidrag genom att läsa varje förvaltningssidas
# ingress ytligt — den missade att flera av dessa sidor (barn- och
# ungdomsverksamhet, kulturverksamhet, särskild social inriktning) i sig
# rymmer FLERA distinkta bidragsformer under samma URL, samt att en hel
# målgrupp (pensionärsföreningar) och flera specialkategorier saknades helt.
#
# Metod denna omgång: (1) Sökte efter Karlstads antagna bidragsregelverk-PDF
# — hittade ingen sådan (endast en Tyresö-PDF med falskt Karlstad-relaterat
# sökträffnamn, förkastad som irrelevant). Regelverket är alltså
# EJ_EXTRAHERBAR/ej hittat — täckning fastställd i stället via konvergens
# mellan kommunens egna förvaltningssidor. (2) Läste
# "Föreningsliv, stöd och stipendier"-huvudsidan och "Bidrag och stöd till
# föreningar"-sidan fullständigt för att kartlägga ALLA undersidor (12
# huvudkategorier hittades, mot 4 i föregående körning). (3) Läste varje
# undersida i sin helhet — barn- och ungdomsverksamhet visade sig rymma 10
# distinkta bidrag (mot 3 tidigare fångade), kulturverksamhet 7 (mot 1),
# särskild social inriktning 2 (mot 1 sammanslaget). (4) Sökte riktat efter
# specialkategorier (§2.1.5): vägföreningar/vägsamfälligheter (sökt,
# INGET kommunalt bidrag hittat — Karlstads kommun agerar endast utförare
# för statsbidragsvägar via Trafikverket, se
# karlstad.se/trafik-och-gator/gator/ansvar-for-gator-och-vagar), byalag/
# samhällsföreningar (hittade Landsbygdsrådets landsbygdsmedel, 1 mkr/år),
# stiftelser/fonder (kommunen förvaltar ca 130 stiftelser — endast två,
# Ingeborg och Henric Bäckströms fond samt Ejnar Lindhs fond, är öppna för
# föreningar; övriga är renodlat privatpersonsriktade och uteslutna enligt
# §2.4). Ansökningsportalen Rbok (karlstad.rbok.se) är, liksom Växjös och
# Halmstads motsvarigheter, inte enumererbar för fetch — täckning byggd
# genom sidkonvergens, inte portalräkning.
#
# Uteslutna (kategoriskt/metodiskt skäl, §2.3–§2.4):
# - "Stöd till näringsliv och politiska verksamheter" — inget
#   ansökningsförfarande dokumenterat på källan; fasta verksamhetsbidrag
#   direkt från kommunstyrelsen till på förhand namngivna mottagare
#   (näringslivsorganisationer, politiska partier representerade i
#   kommunfullmäktige, samt utvalda föreningar som Brottsofferjouren och
#   Karlstads Lottakår). Inte ett sökbart bidrag i den mening övriga poster
#   i denna fil är — jämför Halmstads uteslutning av "Stöd till unga
#   arrangörer" (kontaktnav utan ansökan).
#   https://karlstad.se/uppleva-och-gora/foreningsliv-stod-och-stipendier/bidrag-och-stod-till-foreningar/stod-till-naringsliv-och-politiska-verksamheter
# - "Lokalt klimatkontrakt för föreningar" — inte ekonomiskt bidrag, ett
#   icke-monetärt partnerskapsavtal mellan förening och kommun.
#   https://karlstad.se/uppleva-och-gora/foreningsliv-stod-och-stipendier/lokalt-klimatkontrakt-for-foreningar
# - IOP (idéburet offentligt partnerskap) under särskild social inriktning
#   — käll-URL:en (.../stod-till-foreningar-med-sarskild-social-inriktning/
#   iop---ideburet-offentligt-partnerskap) gav 404 vid två separata
#   hämtningsförsök, och länken hittades inte heller i parentsidans
#   fullständiga länklista. EJ_EXTRAHERBAR — existensen är bekräftad via
#   externa pressreleaser (mynewsdesk.com, "rekordmånga partnerskap") men
#   innehållet gick inte att verifiera mot en levande, 200-svarande sida.
# - Samfond för trotjänarinnor, Brödernas Johanssons fond, Social samfond i
#   Karlstad (under omsorg och stöd) — uteslutna enligt §2.4, riktar sig
#   uteslutande till privatpersoner, inte föreningar.
#   https://karlstad.se/omsorg-och-stod/ekonomi-och-pengar/stipendier-och-fonder
#
# Varningssignal (§2.6) undersökt: tre kluster av delade deadlines (1
# november ×3 — årligt kulturstöd, hembygd/bygdegård, studieförbund; 1
# december ×2 — medlemsstöd och lokalstöd barn/ungdom; 25 maj ×2 —
# verksamhets- och utvecklingsstöd särskild social inriktning). Varje datum
# är individuellt verifierat mot sin egen sidas löptext (inte ett ärvt
# värde) — bedöms som genuina, sammanfallande förvaltningscykler, inte en
# extraktionsbugg.
#
# Dubbelhämtat i två oberoende pass (§3). Inga fältkonflikter identifierade
# denna omgång. Spot-checkas av Jacob/Fable före publik deploy.
