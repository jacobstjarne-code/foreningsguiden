# Källa verifierad 2026-07-23 mot lerum.se. Täckning fastställd via
# källkonvergens (RESEARCH_SPEC_v2 §2): fem antagna regelverks-PDF:er
# (fritid KFN23.62, kultur KFN23.61, stöd och omsorg SON23.4,
# centrumföreningar KS24.180, nattvandring KS25.146) plus en sjätte
# nyligen antagen riktlinje (våldsutsatta KS25.414, beslutad 2026-02-26,
# publicerad som HTML-sida i författningssamlingen, inte PDF) korsverifierade
# mot kommunens levande bidragssidor under kultur-och-fritid samt
# omsorg-och-stod. Ansökningssystemet har bytt namn: regelverken (2024-2025)
# anger genomgående "Rbok"; den äldre portalen fri.lerum.se (Webbidrag/FRI,
# senast synlig i sökindex med årtal 2023) svarar inte längre
# (connect ECONNREFUSED vid hämtning 2026-07-23) och är ersatt av
# lerum.rbok.se, som är BankID-inloggad och JS-renderad
# (EJ_EXTRAHERBAR för bidragsuppräkning). Se tackning.log och
# konflikter.log, avsnitt LERUM, för fullständig avstämning. Belopp
# angivna i "prisbasbelopp" är omräknade med 2026 års prisbasbelopp
# (59 200 kr, Regeringen.se/SCB, oberoende verifierat). Spot-checkas av
# Jacob före publik deploy.
