# KORRIGERANDE OMKÖRNING 2026-07-21 (RESEARCH_SPEC_v2.md §2/§2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19, 21 bidrag) var redan ett av de mer grundliga v1-resultaten —
# samtliga elva undersidor under "Stöd och bidrag i Luleå kommun" hade
# lästs och dubbelhämtats. Denna körning läste om samtliga elva sidor RÅTT
# (rå HTML-textextraktion via python/BeautifulSoup, inte bara AI-
# sammanfattning via WebFetch) för att undvika att flera bidrag under
# samma URL missas (mönstret som gav Karlstad 6→27, Skellefteå 9→50,
# Karlskrona 6→26). Samtliga elva sidor bekräftades innehålla exakt de
# bidrag som redan fanns i filen — INGA bidrag missades på de redan kända
# sidorna. De 21 ursprungliga bidragen kvarstår oförändrade i sak (två
# mindre detaljkompletteringar, se nedan).
#
# NYTT (v2.1 §2.1.5, specialkategorier): sökning utanför kultur- och
# fritidsförvaltningens sidträd gav ETT nytt bidrag och bekräftade att
# tre andra specialkategorier saknas av kategoriska skäl (ej av misstag):
#
# TILLAGT:
# - Utfartsbidrag enskilda vägar (specialkategori väg/samfällighet).
#   Administreras av en HELT ANNAN förvaltning (gator och trafik, kontakt
#   Annica Brännmark) än kultur- och fritid, under /boende--gator/ i
#   kommunens sidträd — helt utanför "Stöd och bidrag i Luleå kommun"-
#   trädet och därför osynligt för en sökning som bara följer den
#   redaktionella bidragssidan. Öppet för både privatpersoner OCH
#   vägföreningar/vägsamfälligheter (bildade via Lantmäteriförrättning) —
#   skrivs in eftersom gemensamhetsanläggningar är en förening i
#   RESEARCH_SPEC:s mening. Bestämmelserna är antagna av kommunfullmäktige
#   (gäller "för 2015 och framåt"), inbäddade direkt på sidan snarare än
#   som separat PDF.
# - Sommarskola. Fanns även i föregående körning men UTESLÖTS då ("för
#   tunt för att skriva in utan att gissa"). v2.1 väger om detta: sidan
#   listar bidraget explicit under rubriken "Dessa fritidsbidrag finns att
#   söka" med eget namn och egen ansökningsperiod (1 mars–1 april) — det är
#   inte avsaknad av bidrag, det är avsaknad av DETALJER om ett bekräftat
#   bidrag. Saknat bidrag är värre än tomt fält (§1): bidraget skrivs nu
#   in med de fält som går att fylla ärligt (malgrupp/krav/belopp satta
#   till "ej specificerat" snarare än gissade) i stället för att uteslutas.
#
# UNDERSÖKT OCH MEDVETET UTESLUTET (§2.4, kategoriska skäl):
# - Nio stiftelser som Luleå kommun är kopplad till (Stiftelsen Barnens
#   väl, Luleå Sociala Samfond, Luleå Studentlokaler, Norrbottensteatern,
#   Samfond för allmän undervisning på gymnasienivå, Teknikens Hus,
#   Sunderby Folkhögskola, Bolivar Sundströms minne, Ulanderska fonden) —
#   https://www.lulea.se/kommun--politik/organisation/lulea-kommuns-bolag-och-stiftelser.html.
#   De två som gick att verifiera i detalj (Bolivar Sundströms minne:
#   hjälp åt änkor/döttrar efter köpmän/hantverkare samt gamla orkeslösa
#   personer; Ulanderska fonden: stipendium till enskilda gymnasieelever
#   som läser till lärare) är individstöd till PRIVATPERSONER, inte
#   föreningsbidrag. Övriga sju är antingen drifts-/förvaltningsstiftelser
#   (Teknikens Hus, Norrbottensteatern, Sunderby Folkhögskola, Luleå
#   Studentlokaler — stiftelsen driver verksamheten själv, delar inte ut
#   bidrag till andra) eller gick inte att verifiera som öppna för
#   föreningar trots sökning. Till skillnad från Karlstad/Växjö saknar
#   Luleå en stiftelse öppen för föreningar som sökande (§2.7 — utelämning
#   loggad).
# - Studieförbund. En "Fördelningsmodell gällande studieförbund i Luleå
#   kommun" finns (fastställd 2016-12-15, styrande dokument) men är en
#   FÖRDELNINGSFORMEL mellan studieförbundens samverkansorgan för en
#   kommunal pott — inte en bidragsform en enskild lokalavdelning/förening
#   ansöker om via Rbok. Ingen aktiv, sökbar bidragssida för studieförbund
#   hittades (samma slutsats som Karlskronas omkörning 2026-07-21).
# - Sponsring (idrotts-/evenemangssponsring). "Riktlinjer för sponsring"
#   (fastställd av kommundirektören 2017-09-01) beskriver ett
#   FALL-TILL-FALL-BESLUT där kommunen själv initierar/väljer motpart
#   ("Idrottssponsring... Avtalsnivån avgörs av värdet på avtalade
#   marknadsytor") — inget öppet ansökningsförfarande med kriterier lika
#   för alla föreningar, ingen deadline, ingen ansökningsblankett.
#   Strukturellt inte ett föreningsbidrag (skiljer sig från t.ex.
#   Karlskronas nya "Riktlinjer för elitidrottsstöd" 2025, som uttryckligen
#   ERSATTE sponsringsmedel med ett formaliserat, sökbart stöd — Luleås
#   sponsring har inte genomgått en sådan formalisering och förblir
#   diskretionär).
# - "Bidrag vid fritidsstudier" och "Hemsändningsbidrag" (båda styrande
#   dokument) är INTE föreningsbidrag: förstnämnda är en
#   personalförmån till kommunens egna anställda, sistnämnda riktar sig
#   uttryckligen till livsmedelsbutiker/aktörer ("Bidraget riktar sig till
#   livsmedelsbutiken eller aktören som utför tjänsten, inte till det
#   enskilda hushållet") — företagsstöd, inte föreningsstöd.
# - "Projektinriktat stöd för landsbygdsutveckling" (riktlinje fastställd
#   2017-03-30 av Landsbygdskommittén) är INTE ett fristående bidrag utan
#   den historiska regelverkskällan för det som idag publiceras som
#   "Landsbygdsstöd" på bidrag-till-landsbygden.html — samma fem
#   utvecklingsområden återges ordagrant i båda källorna. Används här som
#   stödjande källa till lulea-landsbygdsstod, inte som eget bidrag.
#
# EJ_EXTRAHERBAR: Rbok (lulea.rbok.se) är JS-renderad (React-app,
# kroppstext ca 1500 tecken vid rå hämtning, inga bidragsnamn extraherbara
# via fetch). Täckning byggd genom sidkonvergens (elva redaktionella
# undersidor + specialkategorisökning), inte portaluppräkning, i enlighet
# med v2.1.
#
# Regelverk (§2.1 steg 1): Luleå kommun saknar — till skillnad från
# Karlskrona/Växjö/Halmstad — en enda konsoliderad "Riktlinjer för
# föreningsbidrag"-PDF antagen av nämnd/fullmäktige. I stället fungerar
# själva huvudsidan "Stöd och bidrag i Luleå kommun" som regelverk: den
# innehåller "Luleå kommuns grundläggande riktlinjer för föreningsstöd" i
# fulltext (demokratikriterier, medlemskrav, styrelsekrav) som gäller för
# ALLA bidragsformer, och varje enskild bidragssida innehåller sina egna
# fastställda kriterier/belopp direkt inbäddade (bygdemedel-sidan har t ex
# en fullständig niopunkts-riktlinje inbäddad). Sökningar efter en separat
# PDF (insynsverige.se, site:lulea.se filetype:pdf) gav inga träffar utöver
# denna sidstruktur och ett par ej relaterade styrande dokument (se ovan).
# Detta är dokumenterat som strukturell skillnad, inte en lucka.
#
# Detaljkompletteringar (samma bidrag, mer exakt text, INTE nya bidrag):
# - Driftsbidrag anläggningar: beloppsfältet utökat med samtliga rader ur
#   kommunens tabell (bl a isrink med/utan sarg vid/utan seriespel,
#   skidspår utan belysning) som föregående körnings sammanfattning hade
#   förenklat bort.
# - Ansökningsperiodernas startdatum (inte bara stoppdatum) tillagda i
#   anteckning för verksamhetsbidrag fritid (15 aug), driftsbidrag
#   anläggningar (1 mar), landsbygdsstöd (1 mar) och stora evenemangs-
#   stödet (1 feb / 1 aug) — fanns redan rätt som stoppdatum i
#   deadlines.datum, men startdatumet saknades i anteckning.
#
# Befolkning: 80 304 — Luleå kommuns egen statistiksida anger detta som
# senaste kvartalssiffra (2025-12-31, "senaste"), ingen nyare kommunalt
# publicerad kvartalssiffra hittades (en sökmotorsammanfattning påstod
# 80 455 per 2026-03-31 men källhänvisningen den byggde på visade sig vid
# kontroll gälla 79 650 per 2025-03-31 — sammanfattningen var felaktig,
# inte kommunens data. Behåller 80 304, samma som föregående körning).
#
# Dubbelhämtning: samtliga elva ursprungliga undersidor + de nya källorna
# (utfartsbidrag, stiftelselistan, sponsring, fördelningsmodell
# studieförbund, projektinriktat stöd) hämtades RÅTT via egen HTTP-
# hämtning och parsades som text (inte bara AI-sammanfattning), vilket är
# en starkare form av oberoende läsning än ren dubbel WebFetch-
# sammanfattning. Inga fältkonflikter uppstod mellan de två läsningarna.
