# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2 — Halmstad var
# fallstudien som motiverade v2). Föregående version (verifierad 2026-07-19)
# rapporterades komplett men saknade fem bidrag som aldrig fångades av att
# bara följa kommunens redaktionella sidträd: Stöd till konstnärlig
# utveckling, Administrationsbidrag till vägföreningar, Generellt bidrag till
# vägsamfälligheter, Särskilt bidrag till vägsamfälligheter, samt kommunens
# stiftelser/fonder (52 st, skrivna som ETT samlat bidrag per §2.4).
#
# Metod denna omgång: (1) fri.halmstad.se/bidrag/ hämtades som facit för
# täckning — portalen är JS-renderad och gick inte att extrahera direkt via
# fetch (§5 "JS-renderade portaler"), så täckning fastställdes i stället via
# indexerade fri.halmstad.se/ansokaninfo.aspx?type=-sidor (typ 55, 63, 69, 75,
# 80 hittade) kombinerat med kommunens egna icke-JS-renderade sammanställningar
# (självservice "alla ansökningar", "ansök i föreningsregistret",
# "bidragochstodtillforeningar", "bidragochstodinomkulturochfolkbildning").
# (2) Självservice-/e-tjänstsidor genomsöktes separat från den redaktionella
# bidragssidan. (3) Förvaltningarnas egna sidor utanför kultur/fritid
# genomsöktes specifikt: trafik och infrastruktur (vägföreningar/
# vägsamfälligheter) samt omsorg och stöd (stiftelser/fonder).
#
# Täckningsavstämning: 23 kandidatbidrag identifierade via portal + special-
# sidor, 21 skrivna till denna fil. Två uteslutna med kategoriskt skäl (se
# nedan) — ingen olöst avvikelse.
#
# Uteslutna (kategoriskt skäl, RESEARCH_SPEC_v2.md §2.3):
# - "Kulturstipendium" (60 000 kr, kulturutövare max 25 år) — individuellt
#   pris/stipendium till privatperson, inte ett föreningsbidrag.
#   https://www.halmstad.se/upplevaochgora/kultur/kulturstipendierochpriser/kulturstipendium.n1963.html
# - "Stöd till unga arrangörer" — sidan beskriver konkreta uppträdande-/
#   arrangörsmöjligheter för unga (Kulturkrock, PLAY kortfilmsfestival,
#   Dansens dag, UKM) utan belopp, ansökningsformulär eller villkor. Är ett
#   kontaktnav via kulturhuset Nolltrefem, inte ett sökbart bidrag.
#   https://www.halmstad.se/upplevaochgora/kultur/bidragochstodinomkulturochfolkbildning/stodtillungaarrangorer.n3701.html
#
# Halmstad har fyra förvaltningar med egna föreningsbidragsspår: Teknik- och
# fastighetsförvaltningen (idrott/fritid/anläggning OCH vägföreningar/
# vägsamfälligheter — samma förvaltning ansvarar för båda), Kulturförvaltningen
# (kultur/studieförbund/konstnärlig utveckling), Socialförvaltningen (sociala
# hjälp- och funktionsrättsorganisationer samt stiftelser/fonder under omsorg
# och stöd) samt Hemvårdsförvaltningen (seniorföreningar). Ansökan sker
# huvudsakligen via FRI (föreningsregistret, fri.halmstad.se) men vägbidragen
# söks via en separat e-tjänst (tjanster.halmstad.se/BVAG) och
# stiftelser/fonder via en tredje e-tjänst med BankID-inloggning — se
# anteckning per bidrag. Spot-checkas av Jacob/Fable före publik deploy.
