    anteckning: "LÖST KONFLIKT (v2.1, §2.5): Regelverket 'Riktlinje för föreningsbidrag' (diarienummer KFN25/28, beslutat av Kultur- och fritidsnämnden 2025-06-04, giltigt fr.o.m. 2026-01-01 tills vidare) anger uttryckligen 'Föreningen kan söka max 5 000 kronor' för Startbidrag — vilket överensstämmer med kommunens nuvarande bidragssida (nykoping.se/foreningsbidrag). Den äldre e-tjänstsidan nykoping.se/arkiv/etjanster/startbidrag-for-foreningar/ (sidmetadata anger 'senast uppdaterad 8 april 2026') anger istället 1 500 kronor och krav på ansökan inom sex månader efter bildande. Den sidan ligger under en /arkiv/-sökväg och refererar sannolikt till ett tidigare regelverk (diarienummer KFN19/30, omnämnt i ett kommunalt ärende från 2023) som ersattes av KFN25/28. Två oberoende, aktuella källor (regelverk + levande bidragssida) konvergerar på 5 000 kronor mot en arkiverad sida på 1 500 kronor — belopp satt till 5 000 kronor. Sexmånadersregeln från arkivsidan är INTE bekräftad i det nya regelverket eller på den aktuella bidragssidan och har därför utelämnats. Konflikten kvarstår som en avvikelse mellan kommunens egna sidor och bör flaggas för kommunen."
