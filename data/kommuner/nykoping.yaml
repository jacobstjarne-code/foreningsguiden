forutsattningar:
  - id: "nykoping-bidragsberattigad-forening"
    vad: "Bli godkänd som bidragsberättigad förening"
    beskrivning: "Föreningen ansöker om att bli godkänd som bidragsberättigad genom att skicka in stadgar och senaste årsmöteshandlingar (protokoll, verksamhetsberättelse, balans- och resultatrapport, revisionsberättelse, verksamhetsplan och budget). Enligt regelverket (KFN25/28) ska föreningen vara ideell och aktiv, ha organisationsnummer, vara registrerad i kommunens föreningsregister, vara öppen för medlemskap för alla kommunens invånare med huvuddelen av medlemmarna bosatta i kommunen, ha huvuddelen av sin verksamhet inom kommunen, aktivt informera om sin verksamhet, vara medlemsstyrd med löpande årsmöten, stadgar och vald styrelse, ha minst 20 betalande medlemmar med en årsavgift på minst 50 kronor, årligen uppdatera föreningskontot, ta avstånd från våldsbejakande uttryck och åsikter, arbeta med kvalitetssäkring enligt kommunens instruktioner, jobba för hållbarhet, social inkludering och jämställdhet samt motverka diskriminering, och respektera enskildas grundläggande fri- och rättigheter. Idrottsföreningar ska vara vaccinerade mot doping via Antidoping Sverige och ha en aktiv antidopingplan. Ekonomiska föreningar, partipolitiska föreningar, stödföreningar/supporterklubbar och trossamfund kan inte söka bidrag."
