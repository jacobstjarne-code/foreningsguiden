# Omkörd 2026-07-21 mot RESEARCH_SPEC v2.1 (källkonvergens, §2). Ersätter
# tidigare version (2026-07-19, v1-metod), som lämnade startbidragets belopp
# olöst (5 000 kr vs 1 500 kr) och inte sökte regelverket.
#
# KÄLLOR KONSULTERADE (i v2.1-ordning):
# 1. Regelverk: "Riktlinje för föreningsbidrag" (KFN25/28, Kultur- och
#    fritidsnämnden, beslutad 2025-06-04, giltig fr.o.m. 2026-01-01 tills
#    vidare) — hittad via sökning, INTE på den plats den länkades från i
#    författningssamlingens sökträff (fel path gav 404 två gånger; rätt path
#    under /dokument/styrande-dokument/normerande/). Löser startbidrags-
#    konflikten: regelverket anger uttryckligen 5 000 kr och räknar upp
#    exakt de sju bidragstyper som redan fanns i filen. Ett äldre regelverk
#    (diarienummer KFN19/30, omnämnt i en tjänsteskrivelse från 2023) har
#    ersatts av KFN25/28 — det förklarar sannolikt varför en arkiverad
#    e-tjänstsida fortfarande visar den gamla 1 500 kr-nivån.
#    "Riktlinjer för kommunala bidrag till tätortsvägsamfälligheter"
#    (MSN25/75, Miljö- och samhällsbyggnadsnämnden, beslutad 2026-02-10,
#    giltig fr.o.m. 2026-03-01) — ny specialkategori-källa, väg.
# 2. Förvaltningarnas egna sidor: nykoping.se/foreningsbidrag (huvudhubb,
#    Division Näringsliv, kultur och fritid), Levande centrum/evenemangsbidrag
#    (samhällsbyggnad/gator och torg), stipendier och priser (Nyköpings
#    Arenor Fritid), stiftelser och fonder (division Social omsorg).
# 3. Självservice/e-tjänst: nykoping.se/arkiv/etjanster/* — flera bidrag
#    (startbidrag, vägbidrag, stiftelseansökan) ligger under /arkiv/-sökväg
#    trots att de är i drift; se anteckning på startbidrag om varför den
#    arkiverade sidans belopp inte vann.
# 4. Ansökningsportal: fri.nykoping.se/bidrag/ gav HTTP 503 vid samtliga
#    fyra försök under körningen — EJ_EXTRAHERBAR, JS-renderad/otillgänglig,
#    i linje med v2.1:s förväntan.
# 5. Specialkategorier: väg (två bidrag hittade, se nedan), stiftelser
#    (endast individstipendier hittade, se MEDVETET_UTESLUTET i rapporten),
#    studieförbund (uttryckligen exkluderat ur KFN:s regelverk; kommunbidraget
#    fördelas av LBF Sörmland, annan huvudman — uteslutet), bygdegårdar
#    (ingen kommunspecifik bidragsform hittad utöver nationella Boverket-stöd
#    på annan domän), byalag (Leader Sörmlandskusten är regional/extern
#    domän, inte kommunens egen — uteslutet enligt §4).
#
# NYTT I DENNA OMKÖRNING (utöver löst startbidrags-konflikt): Subventionerad
# lokalhyra, Driftbidrag till tätortsvägsamfälligheter, Grönytebidrag,
# Idrottsstipendium (betalas till föreningen, inte individen — se anteckning
# på det bidraget för avgränsning mot uteslutna individstipendier).
#
# Dubbelhämtning: de sju ursprungliga bidragens belopp bekräftas nu av TVÅ
# helt oberoende källtyper (regelverk + levande webbsida), vilket är starkare
# än två fetchningar av samma sida. Nya fält (idrottsstipendium-belopp,
# väg-bidragets kr/meter) kontrollerade mot en andra, oberoende sökning.
#
# Spot-checkas av Jacob före publik deploy.
