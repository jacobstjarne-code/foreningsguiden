    beskrivning: "Föreningen ansöker digitalt via Rbok om att bli bidragsberättigad. Krav: ideell förening registrerad hos Skatteverket med organisationsnummer, av årsmötet beslutade stadgar, demokratiskt vald styrelse, utsedd firmatecknare och revisorer, plusgiro/bankgiro i föreningens namn, minst tio betalande medlemmar, inga skulder till kommunen, allmännyttigt syfte, partipolitiskt och religiöst obunden, ej vinstdrivande verksamhet, och en betydande del av verksamheten genomförd i Enköpings kommun. Riks-, distrikts- och paraplyorganisationer, partipolitiska/religiösa organisationer samt intresseorganisationer för medlemmarnas egna ekonomiska intressen (t.ex. bostadsrätts- och samfällighetsföreningar) kan inte bli bidragsberättigade. Föreningar med barn- och ungdomsverksamhet ska även kunna visa alkohol- och drogpolicy med handlingsplan samt redogöra för hur barnets bästa beaktas."
