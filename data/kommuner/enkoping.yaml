# Källa verifierad 2026-07-23 mot enkoping.se. Täckning fastställd genom
# källkonvergens (RESEARCH_SPEC v2.1 §2): (1) regelverket "Stöd till
# civilsamhället i Enköpings kommun" (UPN2025/183, beslutat av Upplevelse-
# nämnden 2025-09-25, gäller fr.o.m. 2026-01-01) — 45 sidor, hämtat som PDF
# och läst i sin helhet med pdftotext -layout (WebFetch kunde inte extrahera
# textlagret direkt); (2) den löpande sidan "Bidrag att söka" (bidrag-att-
# soka.html), hämtad två oberoende gånger (WebFetch + curl/regex-extraktion)
# — samstämmig med regelverket för samtliga sju huvudföreningsbidrag och
# deras ansökningsfönster 2026. Specialkategorier genomsökta aktivt utanför
# Upplevelseförvaltningens sidträd: vägbidrag (Trafik och gator), stiftelser
# (Omsorg och stöd), aktivitetsstöd på finska (Kommunledningsförvaltningen,
# finskt förvaltningsområde) och socialnämndens verksamhetsbidrag (Social-
# nämnden) — samtliga fyra låg utanför "Förening i Enköping"-sidträdet, i
# linje med RESEARCH_SPEC:s varning om att kommunens sidträd inte är en
# fullständig förteckning. Ansökningsportalen (enkoping.rbok.se, Blazor/JS-
# renderad) gick inte att räkna upp — EJ_EXTRAHERBAR, se tackning.log.
# Flera gamla enkoping.se-URL:er (studieförbund, civilsamhällesstipendium,
# idrottsstipendium) 301-omdirigerar till nya sidor efter en CMS-omstruktu-
# rering av "Omsorg och stöd"-trädet — nya, fungerande URL:er använda och
# 200-verifierade under körningen. Spot-checkas av Jacob före publik deploy.
