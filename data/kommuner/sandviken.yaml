# KORRIGERANDE OMKÖRNING 2026-07-20 (RESEARCH_SPEC_v2.md §2/§2.1 v2.1 —
# källkonvergens, inte portal-först). Föregående version (verifierad
# 2026-07-19) fångade bara 4 bidrag genom att läsa kultur- och
# fritidsförvaltningens huvudsida och de fyra ActorSmartBook-länkade
# e-tjänsterna den direkt refererade till (kontant-, investerings-,
# evenemangsstöd, utvecklingsbidrag hälsa). Den missade: (a) att
# studieförbunden har TVÅ egna, distinkta bidrag (verksamhetsstöd 21 april,
# stimulansmedel löpande) som föregående version uttryckligen hittade men
# felaktigt uteslöt — researcharen blandade ihop studieförbundens 21
# april-deadline med kontantstödets 1 september-deadline och trodde det var
# en olöst källkonflikt inom SAMMA bidrag, när det i själva verket är två
# olika bidrag med var sin egen, korrekta deadline; (b) kultursponsring,
# ett fristående ekonomiskt stöd (350 000 kr fördelat 2026) som inte länkas
# från förening.-och-studieförbundssidan utan bara nås via kultur- och
# fritidsnämndens egen sida; (c) specialkategorierna väg (kommunalt
# vägföreningsbidrag, Tekniska kontoret) och stiftelser (Fonden för
# partiellt arbetsföra samt Lars Bucans och Gunvor Göranssons
# kulturstiftelser, samtliga kommun-administrerade), som ligger helt
# utanför kultur- och fritidsförvaltningens sidträd.
#
# Metod denna omgång (§2.1): (1) Sökte efter Sandvikens antagna
# bidragsregelverk-PDF ("regler föreningsbidrag pdf", "riktlinjer stöd
# föreningar antagna"). EN träff såg ut att matcha
# (insynsverige.se, "Kultur- och fritidsnämndens riktlinjer för stöd till
# föreningar och studieförbund") men vid nedladdning visade PDF:ens
# försättsblad att dokumentet tillhör TYRESÖ KOMMUN, inte Sandviken — exakt
# samma typ av falsklarm som Karlstadskörningen stötte på (en Tyresö-PDF
# med missvisande sökträffnamn). Förkastad. Inget Sandviken-specifikt
# regelverk hittades — täckning fastställd via sidkonvergens i stället
# (kategori 1 = EJ_EXTRAHERBAR/ej hittat, se tackning.log-sammanfattning
# nedan). (2) Läste kultur- och fritidsförvaltningens huvudsida
# (foreningsstodochstodtillstudieforbund.2990.html) och dess systersida
# (fordigsomvillsokaforeningsstod...) i sin helhet, samt kultur- och
# fritidsnämndens egen sida — det senare gav länken till kultursponsring,
# som INTE länkas från föreningsstödssidan. (3) Läste var och en av de nio
# minasidor.sandviken.se-sidorna (overview/650, 651, 652, 653, 654, 655,
# 24, 526, 775) i sin helhet, inte bara ingressen — detta gav exakta
# belopp, deadlines och krav som inte fanns på de redaktionella sidorna.
# (4) Ansökningsportalen ActorSmartBook (sandviken.actorsmartbook.se) är,
# liksom Rbok/FRI i tidigare omkörda kommuner, inte enumererbar för fetch
# (kräver Bank-ID-inloggning, JS-renderad) — EJ_EXTRAHERBAR, konsekvent med
# tidigare fynd. (5) Sökte riktat efter specialkategorier (§2.1.5):
# vägföreningar/vägsamfälligheter (TRÄFF — Kommunalt vägföreningsbidrag,
# Tekniska kontoret), bygdegårdar/samlingslokaler (sökt, inget separat
# kommunalt driftbidrag hittat utöver de generella kontant-/
# investeringsstöd som redan är bidragsberättigade för alla föreningstyper
# inklusive bygdegårdsföreningar), byalag/samhällsföreningar (sökt, ingen
# separat bidragsform hittad), stiftelser/fonder (TRÄFF — se nedan),
# trossamfund (sökt, inget kommunalt bidrag hittat; endast den fristående
# Göranssonska Stiftelsen nämner trossamfund som möjlig mottagare, se
# uteslutning nedan).
#
# Stiftelser (§2.4/§2.7): Sandvikens kommunsida "Stipendier, fonder och
# utmärkelser" listar nio fonder/stiftelser. Av dessa är TVÅ öppna för
# föreningar/institutioner OCH kommun-administrerade: Lars Bucans
# kulturstiftelse (administreras av kultur- och fritidskontoret, kontakt
# Anette Dunker) och Gunvor Göranssons kulturstiftelse (administreras av
# Kommunledningskontoret). Dessa slås samman till EN post enligt §2.7.
# Övriga sju uteslutna enligt §2.4:
# - Göranssonska Stiftelserna / Stiftelsen den Göranssonska Fonden —
#   fristående stiftelse med egen styrelse, förvaltar och delar ut 70–100
#   mkr/år men är INTE kommun-administrerad (annan huvudman).
#   https://www.goranssonska.com/ , https://goranssonskafonden.se/
# - Kultur- och fritidsnämndens stipendier — individuellt kulturstipendium
#   till privatpersoner.
# - Viktor Magnussons stipendiefond — individstipendium till f.d.
#   Bessemerskolan-elever som läser civilingenjör, ej föreningsbidrag.
#   https://sandviken.se/kommunochpolitik/kommunensorganisation/forvaltningar/kunskapsforvaltningen/viktormagnussonsstipendiefond.15450.html
# - Sparbanksstiftelsen Nya, Allmänna Arvsfonden, ChangeX — samtliga
#   administrerade av annan huvudman (bankstiftelse, statlig myndighet,
#   internationellt program), ej kommunala.
# Fonden för partiellt arbetsföra (FAK) är också en kommun-administrerad
# fond (Omsorgsförvaltningen) öppen ENDAST för organisationer, men hålls
# som EGEN post nedan i stället för att slås samman med kulturstiftelserna
# — annan målgrupp (funktionsrättsorganisationer, ej "allmänna" föreningar),
# annan förvaltning, egen dedikerad e-tjänst och egna deadlines. Bedömning:
# en sammanslagning hade dolt en fullt utbyggd, fristående bidragsform
# bakom en diffus "stiftelser"-rad.
#
# Varningssignal (§2.6) undersökt: inga kluster av delade deadlines
# observerade mellan de tio bidragen — varje bidrag har sin egen
# datumlogik, vilket är väntat eftersom bidragen sprids över fyra olika
# förvaltningar/enheter (kultur- och fritid, omsorg, teknik,
# kommunledning) med separata beslutscykler.
#
# Dubbelhämtat i två oberoende pass (§3) för samtliga NYA bidrag
# (kultursponsring, FAK, vägföreningsbidrag, studieförbundens
# verksamhetsstöd) — identiska värden i båda passen, inga konflikter.
# De fyra bidrag som fanns redan i föregående version är oförändrade i
# sak (samma belopp/krav/deadlines som verifierades 2026-07-19) men har nu
# fått käll-URL:erna omverifierade (samtliga 200-svar denna körning).
# Spot-checkas av Jacob/Fable före publik deploy.
