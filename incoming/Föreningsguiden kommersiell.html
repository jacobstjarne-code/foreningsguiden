  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

#7A8085;\">Designuppdrag 3 · progressionen · §6 · prioritet ett<\u002Fdiv>\n    <h1 style=\"margin: 8px 0 12px; font-family: 'Archivo', sans-serif; font-size: 32px; line-height: 1.12; font-weight: 800; letter-spacing: -.02em; color: #1B1E20;\">Kommunsidan som väg, inte katalog<\u002Fh1>\n    <p style=\"margin: 0 0 10px; font-size: 17px; line-height: 1.55; color: #4A5054; max-width: 70ch;\">Samma data som de tjugo korten — omordnad efter kassörens beslutsföljd i stället för kommunens kategoriindelning. En kontinuerlig ryggrad med fem stationer; den bara linjen mellan dem är vilan. <strong>Rörelsen kommer ur informationens ordning, inte ur CSS.<\u002Fstrong> Station 1 är samma sak som formulärets första fält — vägen och det ungated-flödet är samma tratt. Brödtexten är avsiktligt kort: Fable skriver texten som <em>är<\u002Fem> strukturen.<\u002Fp>\n    <p style=\"margin: 0; font-size: 15px; line-height: 1.5; color: #7A8085; max-width: 70ch;\"><strong style=\"color:#4A5054;\">Not (eget förslag, ej PL-beslut):<\u002Fstrong> station 3 \"Vad måste göras först?\" ger jag egen tyngd — förutsättningarna (bli bidragsberättigad, InterbookGo/Rbok) syns inte alls idag och är ofta viktigare än deadlinen.<\u002Fp>\n  <\u002Fheader>\n\n  <div id=\"5a\" style=\"--surface:#ffffff; --sunken:#f4f2ec; --page:#E7E8EA; --ink:#17140f; --muted:#4a463f; --line:#17140f; --accent:#256b3b; --accent-soft:#e6efe7; --attention:#8a5300; --attention-soft:#f5ecd9; --urgent:#a62a22; --mono:'Space Mono',monospace; --sans:'Atkinson Hyperlegible',system-ui,sans-serif; --display:'Archivo',sans-serif; width: 760px; max-width: 100%; display: flex; flex-direction: column; gap: 14px; font-family: var(--sans);\">\n\n    <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n      <span style=\"font-family: var(--mono); font-size: 13px; font-weight: 700; color: #fff; background: var(--accent); padding: 3px 9px;\">5a<\u002Fspan>\n      <div style=\"font-size: 18px; font-weight: 700; color: var(--ink);\">Kommunsida · Gislaved · vägen<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background: var(--surface); border: 2.5px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.10);\">\n\n      <!-- page header -->\n      <div style=\"display: flex; align-items: center; gap: 11px; padding: 13px 26px; border-bottom: 2.5px solid var(--line);\">\n        <img src=\"ed90474e-06d5-452f-9e87-40e94cc39e0a\" alt=\"Föreningsguiden\" style=\"width: 32px; height: 32px; object-fit: contain; flex: none;\">\n        <span style=\"font-family: var(--display); font-weight: 800; font-size: 18px; letter-spacing: -.01em; color: var(--ink);\">Förenings<span style=\"color: var(--accent);\">guiden<\u002Fspan><\u002Fspan>\n        <span style=\"margin-left: auto; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--ink);\"><svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>Gislaved<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- svar-först (GEO §3.1) -->\n      <div style=\"padding: 22px 26px 6px;\">\n        <h2 style=\"margin: 0 0 10px; font-family: var(--display); font-weight: 800; font-size: 26px; line-height: 1.16; color: var(--ink);\">Föreningsbidrag i Gislaved<\u002Fh2>\n        <p style=\"margin: 0; font-size: 18px; line-height: 1.6; color: var(--ink); max-width: 60ch;\">I Gislaved kan föreningar söka fem kommunala bidrag. Sista ansökningsdag varierar mellan 12 juli och 31 augusti 2026. Ansökan görs via kommunens e-tjänst — men för flera bidrag måste föreningen först vara registrerad som bidragsberättigad.<\u002Fp>\n        <div style=\"display: flex; align-items: center; gap: 8px; margin-top: 12px; font-family: var(--mono); font-size: 13px; font-weight: 700; letter-spacing: .03em; color: var(--muted);\"><span style=\"width: 9px; height: 9px; border-radius: 50%; background: var(--accent);\"><\u002Fspan>UPPDATERAD 3 JULI 2026 · KÄLLA: GISLAVEDS KOMMUN<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ============ THE PATH — continuous rail, 5 stations ============ -->\n      <div style=\"position: relative; margin: 8px 0 0; padding: 12px 26px 8px;\">\n        <div style=\"position: relative; border-left: 3px solid var(--line); margin-left: 21px; padding-left: 34px; display: flex; flex-direction: column;\">\n\n          <!-- STATION 1 — big: the fork -->\n          <div style=\"position: relative; padding: 20px 0 44px;\">\n            <span style=\"position: absolute; left: -55px; top: 16px; width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: 3px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 19px; color: #fff;\">1<\u002Fspan>\n            <div style=\"font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent);\">Steg 1 · börjar er ansökan<\u002Fdiv>\n            <h3 style=\"margin: 4px 0 4px; font-family: var(--display); font-weight: 800; font-size: 26px; line-height: 1.14; color: var(--ink);\">Vad gäller er?<\u002Fh3>\n            <p style=\"margin: 0 0 16px; font-size: 17px; line-height: 1.55; color: var(--muted); max-width: 54ch;\">Välj er föreningstyp. Vi visar bara det som gäller er — och börjar samtidigt fylla i ert ansökningsunderlag.<\u002Fp>\n            <div style=\"display: flex; flex-wrap: wrap; gap: 10px;\">\n              <span style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; border: 2.5px solid var(--line); border-radius: 10px; padding: 10px 16px;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 3a9 9 0 0 0 0 18M3 12h18\"><\u002Fpath><\u002Fsvg>Idrott<\u002Fspan>\n              <span style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--surface); color: var(--muted); font-size: 16px; font-weight: 700; border: 2px solid var(--line); border-radius: 10px; padding: 10px 16px;\">Kultur<\u002Fspan>\n              <span style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--surface); color: var(--muted); font-size: 16px; font-weight: 700; border: 2px solid var(--line); border-radius: 10px; padding: 10px 16px;\">Ungdom<\u002Fspan>\n              <span style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--surface); color: var(--muted); font-size: 16px; font-weight: 700; border: 2px solid var(--line); border-radius: 10px; padding: 10px 16px;\">Studieförbund<\u002Fspan>\n              <span style=\"display: inline-flex; align-items: center; gap: 8px; background: var(--surface); color: var(--muted); font-size: 16px; font-weight: 700; border: 2px solid var(--line); border-radius: 10px; padding: 10px 16px;\">Övrig<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display: inline-flex; align-items: center; gap: 7px; margin-top: 14px; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--muted);\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg>Sparat till ert utkast: föreningstyp — idrott<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- STATION 2 — small & sharp: urgent -->\n          <div style=\"position: relative; padding: 20px 0 44px;\">\n            <span style=\"position: absolute; left: -55px; top: 16px; width: 42px; height: 42px; border-radius: 50%; background: var(--surface); border: 3px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 19px; color: var(--ink);\">2<\u002Fspan>\n            <div style=\"font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted);\">Steg 2<\u002Fdiv>\n            <h3 style=\"margin: 4px 0 12px; font-family: var(--display); font-weight: 800; font-size: 22px; line-height: 1.18; color: var(--ink);\">Vad är brådskande?<\u002Fh3>\n            <div style=\"display: flex; align-items: center; gap: 14px; background: var(--surface); border: 2.5px solid var(--line); border-left: 7px solid var(--urgent); border-radius: 10px; padding: 14px 18px;\">\n              <span style=\"flex: none; display: inline-flex; align-items: center; gap: 6px; background: var(--urgent); color: #fff; font-size: 14px; font-weight: 700; border-radius: 999px; padding: 5px 11px 5px 9px; text-transform: uppercase;\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><polyline points=\"12 7 12 12 15 14\"><\u002Fpolyline><\u002Fsvg>Bråttom<\u002Fspan>\n              <div style=\"flex: 1;\"><div style=\"font-size: 17px; font-weight: 700; color: var(--ink);\">Ledarutbildningsbidrag<\u002Fdiv><div style=\"font-family: var(--mono); font-size: 13px; color: var(--muted);\">söndag 12 juli · om 2 dagar<\u002Fdiv><\u002Fdiv>\n              <a href=\"#5a\" style=\"flex: none; font-size: 15px; font-weight: 700; color: var(--accent);\">Öppna →<\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- STATION 3 — medium, distinct tone: prerequisites (the revelation) -->\n          <div style=\"position: relative; padding: 20px 0 44px;\">\n            <span style=\"position: absolute; left: -55px; top: 16px; width: 42px; height: 42px; border-radius: 50%; background: var(--attention); border: 3px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 19px; color: #fff;\">3<\u002Fspan>\n            <div style=\"font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--attention);\">Steg 3 · gör detta först<\u002Fdiv>\n            <h3 style=\"margin: 4px 0 4px; font-family: var(--display); font-weight: 800; font-size: 22px; line-height: 1.18; color: var(--ink);\">Vad måste göras först?<\u002Fh3>\n            <p style=\"margin: 0 0 14px; font-size: 17px; line-height: 1.55; color: var(--muted); max-width: 54ch;\">Två saker tar tid och måste vara på plats innan ni kan söka — oavsett deadline. Börja med dem idag.<\u002Fp>\n            <div style=\"background: var(--attention-soft); border: 2px solid var(--line); border-radius: 10px; overflow: hidden;\">\n              <div style=\"display: flex; align-items: flex-start; gap: 13px; padding: 15px 18px; border-bottom: 2px dashed var(--line);\">\n                <span style=\"flex: none; width: 30px; height: 30px; border-radius: 8px; background: var(--surface); border: 2px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--ink);\">A<\u002Fspan>\n                <div style=\"flex: 1;\"><div style=\"font-size: 17px; font-weight: 700; color: var(--ink);\">Bli registrerad som bidragsberättigad förening<\u002Fdiv><div style=\"font-size: 15px; line-height: 1.5; color: var(--muted);\">Kommunens godkännande tar upp till fyra veckor. Utan det avslås ansökan oavsett innehåll.<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex: none; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--attention); white-space: nowrap;\">~4 v<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display: flex; align-items: flex-start; gap: 13px; padding: 15px 18px;\">\n                <span style=\"flex: none; width: 30px; height: 30px; border-radius: 8px; background: var(--surface); border: 2px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-family: var(--mono); font-weight: 700; font-size: 14px; color: var(--ink);\">B<\u002Fspan>\n                <div style=\"flex: 1;\"><div style=\"font-size: 17px; font-weight: 700; color: var(--ink);\">Registrera anläggning i InterbookGo<\u002Fdiv><div style=\"font-size: 15px; line-height: 1.5; color: var(--muted);\">Krävs för drift- och anläggningsbidrag. Görs en gång, gäller sedan alla framtida ansökningar.<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex: none; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--muted); white-space: nowrap;\">engång<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- STATION 4 — the navigable list (tallest content) -->\n          <div style=\"position: relative; padding: 20px 0 44px;\">\n            <span style=\"position: absolute; left: -55px; top: 16px; width: 42px; height: 42px; border-radius: 50%; background: var(--surface); border: 3px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 19px; color: var(--ink);\">4<\u002Fspan>\n            <div style=\"font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--muted);\">Steg 4<\u002Fdiv>\n            <h3 style=\"margin: 4px 0 4px; font-family: var(--display); font-weight: 800; font-size: 22px; line-height: 1.18; color: var(--ink);\">Vad kan ni söka nu?<\u002Fh3>\n            <p style=\"margin: 0 0 14px; font-size: 17px; line-height: 1.55; color: var(--muted); max-width: 54ch;\">Fyra bidrag passar en idrottsförening i Gislaved. Ordnade efter vad som är mest angeläget för er — inte alfabetiskt.<\u002Fp>\n            <div style=\"display: flex; flex-direction: column; gap: 10px;\">\n              <a href=\"#5a\" style=\"display: flex; align-items: center; gap: 14px; background: var(--surface); border: 2px solid var(--line); border-radius: 10px; padding: 14px 18px; text-decoration: none;\">\n                <div style=\"flex: 1;\"><div style=\"font-size: 17px; font-weight: 700; color: var(--ink);\">Driftbidrag<\u002Fdiv><div style=\"font-family: var(--mono); font-size: 13px; color: var(--muted);\">upp till 40 000 kr · sista dag 31 augusti<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex: none; display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); color: var(--accent); font-size: 13px; font-weight: 700; border-radius: 999px; padding: 4px 11px; text-transform: uppercase;\">God tid<\u002Fspan>\n                <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fa>\n              <a href=\"#5a\" style=\"display: flex; align-items: center; gap: 14px; background: var(--surface); border: 2px solid var(--line); border-radius: 10px; padding: 14px 18px; text-decoration: none;\">\n                <div style=\"flex: 1;\"><div style=\"font-size: 17px; font-weight: 700; color: var(--ink);\">Anläggningsbidrag<\u002Fdiv><div style=\"font-family: var(--mono); font-size: 13px; color: var(--muted);\">upp till 75 000 kr · sista dag 15 juli<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex: none; display: inline-flex; align-items: center; gap: 6px; background: #fff; color: var(--attention); font-size: 13px; font-weight: 700; border: 2px solid var(--attention); border-radius: 999px; padding: 3px 10px; text-transform: uppercase;\">Snart<\u002Fspan>\n                <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fa>\n              <a href=\"#5a\" style=\"display: flex; align-items: center; gap: 14px; background: var(--surface); border: 2px solid var(--line); border-radius: 10px; padding: 14px 18px; text-decoration: none;\">\n                <div style=\"flex: 1;\"><div style=\"font-size: 17px; font-weight: 700; color: var(--ink);\">Lokalt aktivitetsstöd (LOK)<\u002Fdiv><div style=\"font-family: var(--mono); font-size: 13px; color: var(--muted);\">per aktivitetstillfälle · sista dag 25 augusti<\u002Fdiv><\u002Fdiv>\n                <span style=\"flex: none; display: inline-flex; align-items: center; gap: 6px; background: var(--accent-soft); color: var(--accent); font-size: 13px; font-weight: 700; border-radius: 999px; padding: 4px 11px; text-transform: uppercase;\">God tid<\u002Fspan>\n                <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><polyline points=\"9 18 15 12 9 6\"><\u002Fpolyline><\u002Fsvg>\n              <\u002Fa>\n              <div style=\"display: flex; align-items: center; gap: 10px; padding: 4px 4px 0;\">\n                <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--muted)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8 12h8\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size: 15px; color: var(--muted);\">Ett bidrag gäller inte er föreningstyp och har dolts. <a href=\"#5a\" style=\"font-weight: 700; color: var(--accent);\">Visa ändå<\u002Fa><\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- STATION 5 — destination: accent-filled goal -->\n          <div style=\"position: relative; padding: 20px 0 20px;\">\n            <span style=\"position: absolute; left: -57px; top: 16px; width: 46px; height: 46px; border-radius: 50%; background: var(--ink); border: 3px solid var(--line); display: inline-flex; align-items: center; justify-content: center;\"><svg width=\"22\" height=\"22\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n            <div style=\"background: var(--accent); border: 2.5px solid var(--line); border-radius: 12px; padding: 22px 24px; color: #fff;\">\n              <div style=\"font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: rgba(255,255,255,.85);\">Steg 5 · vägens slut<\u002Fdiv>\n              <h3 style=\"margin: 4px 0 6px; font-family: var(--display); font-weight: 800; font-size: 24px; line-height: 1.16;\">Vad ska ni skriva?<\u002Fh3>\n              <p style=\"margin: 0 0 16px; font-size: 17px; line-height: 1.55; color: rgba(255,255,255,.92); max-width: 52ch;\">Underlaget är redan påbörjat — föreningstyp, kommun och valt bidrag är ifyllda från vägen hit. Vi skriver utkastet mot Gislaveds kriterier. Ni läser igenom och skickar in.<\u002Fp>\n              <div style=\"display: flex; align-items: center; flex-wrap: wrap; gap: 14px;\">\n                <a href=\"#3a\" style=\"display: inline-flex; align-items: center; gap: 9px; background: #fff; color: var(--accent); font-size: 17px; font-weight: 700; padding: 13px 20px; border-radius: 8px; text-decoration: none;\">Skapa ansökan för Driftbidrag<svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M12 5l7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fa>\n                <span style=\"font-family: var(--mono); font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85);\">3 av 5 fält redan ifyllda<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"font-size: 14px; line-height: 1.55; color: #17140f; background: #efefec; border-radius: 8px; padding: 13px 15px;\"><strong>Läsordningen är strukturen.<\u002Fstrong> Gaffel (stor) → brådskande (liten, skarp) → förutsättningar (egen ton, uppenbarelsen) → sökbara bidrag (navigerbar lista, ej likvärdiga kort) → utkastet (målet). Ryggraden är kontinuerlig; mellanrummen är vilan. Station 1 = formulärets första fält, så vägen och ungated-flödet är samma tratt — \"Skapa ansökan\" bor i slutet (§8-fråga 2 besvarad). Ingen scroll-animation: rörelsen ligger i ordningen.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"turn-4\" style=\"padding: 56px 48px 40px; display: flex; flex-direction: column; gap: 26px; font-family: 'Atkinson Hyperlegible', system-ui, sans-serif;\">\n\n  <header style=\"max-width: 880px;\">\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #7A8085;\">Designuppdrag 2 · exempelutkast · \"vad får jag för 149 kr?\"<\u002Fdiv>\n    <h1 style=\"margin: 8px 0 12px; font-family: 'Archivo', sans-serif; font-size: 32px; line-height: 1.12; font-weight: 800; letter-spacing: -.02em; color: #1B1E20;\">Ett färdigt exempel att läsa före köp<\u002Fh1>\n    <p style=\"margin: 0 0 10px; font-size: 17px; line-height: 1.55; color: #4A5054;\">Väggen visar en tonad version av <em>hennes egen<\u002Fem> text — men den svarar inte på <em>\"är det bra nog?\"<\u002Fem>. Det gör detta: ett <strong>komplett, läsbart utkast från en annan förening<\u002Fstrong> i samma kategori, tydligt märkt som exempel. Hon ser format, längd, ton och att varje krav besvaras — innan hon betalar. Ärligt (det ger inte bort hennes gratisarbete) och helt inom §5. Nås via länken <em>\"Se ett exempel på ett färdigt utkast\"<\u002Fem> på väggen (<a href=\"#3a\">3a<\u002Fa>).<\u002Fp>\n  <\u002Fheader>\n\n  <div id=\"4a\" style=\"--surface:#ffffff; --sunken:#f4f2ec; --page:#E7E8EA; --ink:#17140f; --muted:#4a463f; --line:#17140f; --accent:#256b3b; --mono:'Space Mono',monospace; width: 640px; max-width: 100%; display: flex; flex-direction: column; gap: 14px;\">\n    <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n      <span style=\"font-family: var(--mono); font-size: 13px; font-weight: 700; color: #fff; background: var(--accent); padding: 3px 9px;\">4a<\u002Fspan>\n      <div style=\"font-size: 18px; font-weight: 700; color: var(--ink);\">Exempelutkast · Driftbidrag (idrott)<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"background: var(--surface); border: 2.5px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.10);\">\n      <!-- header -->\n      <div style=\"display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-bottom: 2px solid var(--line);\">\n        <img src=\"ed90474e-06d5-452f-9e87-40e94cc39e0a\" alt=\"Föreningsguiden\" style=\"width: 30px; height: 30px; object-fit: contain; flex: none;\">\n        <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -.01em; color: var(--ink);\">Förenings<span style=\"color: var(--accent);\">guiden<\u002Fspan><\u002Fspan>\n        <span style=\"margin-left: auto; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--muted);\">EXEMPEL<\u002Fspan>\n      <\u002Fdiv>\n      <!-- exempel-banner (neutral ink, INTE oxblod — får ej förväxlas med granskad-stämpeln) -->\n      <div style=\"display: flex; align-items: center; gap: 9px; padding: 10px 20px; background: var(--ink); color: #fff;\">\n        <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8h.01\"><\u002Fpath><path d=\"M11 12h1v4h1\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size: 14px; line-height: 1.4;\"><strong>Exempel.<\u002Fstrong> En annan förenings färdiga utkast — visas i sin helhet så ni ser vad ni får. Ert skrivs mot er egen förening.<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- document -->\n      <div style=\"padding: 22px 26px 8px;\">\n        <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: var(--muted);\">Gislaved kommun · Driftbidrag · exempelförening<\u002Fdiv>\n        <h2 style=\"margin: 6px 0 2px; font-family: 'Archivo', sans-serif; font-size: 27px; line-height: 1.14; font-weight: 800; color: var(--ink);\">Utkast till ansökan om driftbidrag 2026<\u002Fh2>\n        <div style=\"font-size: 15px; color: var(--muted);\">Smålandsstenars GoIF<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"padding: 8px 26px 4px;\">\n        <h3 style=\"margin: 16px 0 6px; font-family: 'Archivo', sans-serif; font-size: 18px; font-weight: 800; color: var(--ink);\">1. Om föreningen<\u002Fh3>\n        <p style=\"margin: 0; font-size: 17px; line-height: 1.62; color: var(--ink);\">Smålandsstenars GoIF bildades 1932 och bedriver idag fotboll och friidrott för 186 medlemmar, varav 121 är under 20 år. Föreningen har sitt säte i Gislaveds kommun och är sedan lång tid godkänd som bidragsberättigad förening. Verksamheten bärs av ideella ledare och drivs på föreningens egen anläggning vid Nissastigen.<\u002Fp>\n\n        <h3 style=\"margin: 18px 0 6px; font-family: 'Archivo', sans-serif; font-size: 18px; font-weight: 800; color: var(--ink);\">2. Verksamheten under året<\u002Fh3>\n        <p style=\"margin: 0; font-size: 17px; line-height: 1.62; color: var(--ink);\">Under 2026 driver föreningen tolv aktiva lag samt en öppen friidrottsskola på sommarlovet. Två nya lag startas i åldersgruppen 8–10 år för att möta ökad efterfrågan, och verksamheten hålls avgiftsfri under introduktionsterminen för att sänka trösklarna för nya familjer.<\u002Fp>\n\n        <h3 style=\"margin: 18px 0 6px; font-family: 'Archivo', sans-serif; font-size: 18px; font-weight: 800; color: var(--ink);\">3. Vad bidraget söks för<\u002Fh3>\n        <p style=\"margin: 0; font-size: 17px; line-height: 1.62; color: var(--ink);\">Driftbidraget söks för att täcka löpande kostnader för anläggningen: el, uppvärmning, planunderhåll, belysning och försäkringar. Dessa kostnader är en förutsättning för att kunna hålla verksamheten igång året runt och för att anläggningen ska kunna nyttjas även av skolan och andra föreningar i orten.<\u002Fp>\n\n        <h3 style=\"margin: 18px 0 6px; font-family: 'Archivo', sans-serif; font-size: 18px; font-weight: 800; color: var(--ink);\">4. Hur föreningen uppfyller kommunens krav<\u002Fh3>\n        <ul style=\"margin: 0; padding-left: 20px; font-size: 17px; line-height: 1.6; color: var(--ink);\">\n          <li>Vald styrelse och av årsmötet antagna stadgar finns och bifogas.<\u002Fli>\n          <li>Föreningen är ansluten till Svenska Fotbollförbundet och Svenska Friidrottsförbundet.<\u002Fli>\n          <li>Organisationsnummer och bankgiro i föreningens namn redovisas nedan.<\u002Fli>\n          <li>Barn- och ungdomsverksamheten utgör merparten av föreningens aktiviteter.<\u002Fli>\n        <\u002Ful>\n\n        <h3 style=\"margin: 18px 0 6px; font-family: 'Archivo', sans-serif; font-size: 18px; font-weight: 800; color: var(--ink);\">5. Budget och sökt belopp<\u002Fh3>\n        <div style=\"border: 2px solid var(--line); border-radius: 8px; overflow: hidden; font-size: 16px;\">\n          <div style=\"display: flex; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid var(--line);\"><span style=\"color: var(--muted);\">El &amp; uppvärmning<\u002Fspan><span style=\"font-family: var(--mono); font-weight: 700;\">21 000 kr<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid var(--line);\"><span style=\"color: var(--muted);\">Planunderhåll &amp; belysning<\u002Fspan><span style=\"font-family: var(--mono); font-weight: 700;\">12 500 kr<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; padding: 9px 14px; border-bottom: 2px solid var(--line);\"><span style=\"color: var(--muted);\">Försäkringar<\u002Fspan><span style=\"font-family: var(--mono); font-weight: 700;\">6 500 kr<\u002Fspan><\u002Fdiv>\n          <div style=\"display: flex; justify-content: space-between; padding: 11px 14px; background: var(--sunken);\"><span style=\"font-weight: 700; color: var(--ink);\">Sökt belopp<\u002Fspan><span style=\"font-family: var(--mono); font-weight: 700; color: var(--ink);\">40 000 kr<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin: 16px 0 0; font-size: 17px; line-height: 1.62; color: var(--ink);\">Föreningen ansöker om driftbidrag med 40 000 kronor för verksamhetsåret 2026 och intygar att uppgifterna i ansökan är korrekta.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- footer note -->\n      <div style=\"margin: 18px 26px 0; border-top: 2px dashed var(--line);\"><\u002Fdiv>\n      <div style=\"padding: 16px 26px 22px; display: flex; flex-direction: column; gap: 12px;\">\n        <p style=\"margin: 0; font-size: 16px; line-height: 1.55; color: var(--muted);\"><strong style=\"color: var(--ink);\">Så här ser ett färdigt utkast ut.<\u002Fstrong> Ert skrivs mot er egen förenings uppgifter och Gislaveds kriterier — inte den här exempelföreningens. Vi skriver utkastet; ni skickar in det själva, och beslutet fattar kommunen.<\u002Fp>\n        <div style=\"display: flex; align-items: center; gap: 14px; flex-wrap: wrap;\">\n          <a href=\"#3a\" style=\"display: inline-flex; align-items: center; justify-content: center; gap: 10px; background: var(--accent); color: #fff; font-size: 17px; font-weight: 700; padding: 13px 20px; border-radius: 8px; text-decoration: none;\">Skapa ert eget utkast — 149 kr<\u002Fa>\n          <a href=\"#3a\" style=\"font-size: 15px; font-weight: 700; color: var(--accent);\">← Tillbaka till bidraget<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size: 14px; line-height: 1.5; color: #17140f; background: #efefec; border-radius: 8px; padding: 12px 14px;\"><strong>Not:<\u002Fstrong> exemplet märks neutralt (mörk banner, ordet EXEMPEL) — aldrig med oxblod eller granskad-stämpeln, som är reserverade för verifieringsmekaniken. Det får inte kunna förväxlas med en verifierad källa.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section id=\"turn-3\" style=\"padding: 56px 48px 40px; display: flex; flex-direction: column; gap: 26px; font-family: 'Atkinson Hyperlegible', system-ui, sans-serif;\">\n\n  <header style=\"max-width: 880px;\">\n    <div style=\"font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #7A8085;\">Designuppdrag 2 · tre intensiteter · hela skärmen<\u002Fdiv>\n    <h1 style=\"margin: 8px 0 12px; font-family: 'Archivo', sans-serif; font-size: 32px; line-height: 1.12; font-weight: 800; letter-spacing: -.02em; color: #1B1E20;\">Enligt brief — och två grader av acceleration<\u002Fh1>\n    <p style=\"margin: 0 0 12px; font-size: 17px; line-height: 1.55; color: #4A5054;\">Samma utkastvy tre gånger. Först <strong>enligt brief<\u002Fstrong> (golvet), sedan säljtrycket uppskruvat ett steg och två steg. <strong>Enda variabeln är väggens kommersiella intensitet<\u002Fstrong> — dokumentet, det skarpa första stycket och den tonade fortsättningen hålls identiska, så att jämförelsen isolerar exakt det vi kalibrerar. Referera med <a href=\"#3a\">3a<\u002Fa> / <a href=\"#3b\">3b<\u002Fa> / <a href=\"#3c\">3c<\u002Fa>.<\u002Fp>\n    <div style=\"display: flex; gap: 18px; flex-wrap: wrap; font-size: 14px; line-height: 1.5; color: #4A5054;\">\n      <div style=\"flex: 1; min-width: 210px; border-left: 4px solid #17140f; padding-left: 12px;\"><strong style=\"color:#17140f;\">3a · Enligt brief.<\u002Fstrong> Priset står, vad man får står, vad man inte får står. Ingen intensifierare.<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 210px; border-left: 4px solid #256b3b; padding-left: 12px;\"><strong style=\"color:#256b3b;\">3b · Måttlig (inom §5).<\u002Fstrong> Ärliga intensifierare — kostnadsram, månadsankring, lokal social proof.<\u002Fdiv>\n      <div style=\"flex: 1; min-width: 210px; border-left: 4px solid #a62a22; padding-left: 12px;\"><strong style=\"color:#a62a22;\">3c · Kraftig (bryter §5).<\u002Fstrong> Nedräkning, falsk knapphet, förvald uppsäljning. Medvetet över linjen.<\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin: 12px 0 0; font-size: 15px; line-height: 1.5; color: #7A8085;\">Rekommendation: <strong>golvet (3a) med de ärliga bitarna ur 3b<\u002Fstrong>. Säljton sänker AI-citering ~26 % (§5) och dark patterns bränner förtroendet — tonen ÄR strategin.<\u002Fp>\n  <\u002Fheader>\n\n  <div style=\"display: flex; flex-wrap: wrap; gap: 40px; align-items: flex-start;\">\n\n    <!-- ============================ 3a — ENLIGT BRIEF ============================ -->\n    <div id=\"3a\" style=\"width: 430px; display: flex; flex-direction: column; gap: 12px;\">\n      <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n        <span style=\"font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #fff; background: #17140f; padding: 3px 9px;\">3a<\u002Fspan>\n        <div>\n          <div style=\"font-size: 18px; font-weight: 700; color: #17140f;\">Enligt brief · golvet<\u002Fdiv>\n          <div style=\"font-size: 14px; color: #4a463f;\">Nyktert. Ingen intensifierare.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"--surface:#ffffff; --sunken:#f4f2ec; --page:#E7E8EA; --ink:#17140f; --muted:#4a463f; --line:#17140f; --accent:#256b3b; --mono:'Space Mono',monospace; width: 430px; background: var(--surface); border: 2.5px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.10);\">\n        <div style=\"display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 2px solid var(--line);\">\n          <img src=\"ed90474e-06d5-452f-9e87-40e94cc39e0a\" alt=\"Föreningsguiden\" style=\"width: 30px; height: 30px; object-fit: contain; flex: none;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -.01em; color: var(--ink);\">Förenings<span style=\"color: var(--accent);\">guiden<\u002Fspan><\u002Fspan>\n          <span style=\"margin-left: auto; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--muted);\">UTKAST<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 20px 0;\">\n          <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: var(--muted);\">Gislaved kommun · Driftbidrag<\u002Fdiv>\n          <h2 style=\"margin: 6px 0 2px; font-family: 'Archivo', sans-serif; font-size: 25px; line-height: 1.15; font-weight: 800; color: var(--ink);\">Utkast till ansökan<\u002Fh2>\n          <div style=\"font-size: 15px; color: var(--muted);\">för Reftele IF<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 20px 0;\">\n          <p style=\"margin: 0 0 14px; font-size: 17px; line-height: 1.62; color: var(--ink);\">Reftele IF ansöker härmed om driftbidrag för verksamhetsåret 2026. Föreningen bedriver barn- och ungdomsverksamhet inom fotboll och innebandy med 214 medlemmar, varav 138 är under 20 år. Verksamheten vilar på ideellt engagemang och en anläggning som föreningen sköter på uppdrag av kommunen.<\u002Fp>\n          <div style=\"position: relative; height: 118px; overflow: hidden;\">\n            <div style=\"filter: blur(3px); opacity: .5; user-select: none; pointer-events: none;\">\n              <p style=\"margin: 0 0 14px; font-size: 17px; line-height: 1.62; color: var(--ink);\">Under verksamhetsåret planerar föreningen att utöka ungdomsverksamheten med två nya lag i åldersgruppen 8–10 år samt att arrangera en sommarcup öppen för hela bygden. Driftbidraget söks för att täcka löpande kostnader för anläggningen: el, uppvärmning, planunderhåll och försäkringar.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,.85) 78%, #fff 100%);\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 0 20px 22px;\">\n          <div style=\"background: var(--sunken); border: 2px solid var(--line); border-radius: 10px; padding: 20px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;\">\n              <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"11\" width=\"16\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M8 11V7a4 4 0 0 1 8 0v4\"><\u002Fpath><\u002Fsvg>\n              Resten av utkastet · 6 stycken kvar\n            <\u002Fdiv>\n            <h3 style=\"margin: 0 0 6px; font-family: 'Archivo', sans-serif; font-size: 21px; line-height: 1.2; font-weight: 800; color: var(--ink);\">Er ansökan är färdig att skickas in<\u002Fh3>\n            <p style=\"margin: 0 0 16px; font-size: 16px; line-height: 1.5; color: var(--muted);\">Hela utkastet är skrivet mot Gislaveds kriterier, med Reftele IF:s uppgifter. Lås upp, läs igenom och skicka in.<\u002Fp>\n            <a href=\"#3a\" style=\"display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--accent); color: #fff; font-size: 18px; font-weight: 700; padding: 15px; border-radius: 8px; text-decoration: none;\">Lås upp hela utkastet — 149 kr<\u002Fa>\n            <div style=\"text-align: center; margin-top: 10px;\"><a href=\"#3a\" style=\"font-size: 15px; font-weight: 700; color: var(--muted); text-decoration: underline;\">Ingår i abonnemang · 495 kr/år<\u002Fa><\u002Fdiv>\n            <div style=\"text-align: center; margin-top: 12px; padding-top: 12px; border-top: 2px dashed var(--line);\"><a href=\"#4a\" style=\"display: inline-flex; align-items: center; gap: 7px; font-size: 15px; font-weight: 700; color: var(--accent);\"><svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none;\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg>Se ett exempel på ett färdigt utkast →<\u002Fa><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin: 14px 4px 0; font-size: 14px; line-height: 1.5; color: var(--muted);\">Vi skriver utkastet. Ni skickar in det själva, och beslutet fattar kommunen.<\u002Fp>\n          <div style=\"margin-top: 12px; text-align: center;\"><a href=\"#3a\" style=\"font-size: 15px; font-weight: 700; color: var(--accent);\">← Tillbaka till bidraget (gratis)<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size: 14px; line-height: 1.5; color: #17140f; background: #efefec; border-radius: 8px; padding: 12px 14px;\"><strong>Golvet.<\u002Fstrong> Priset står, vad man får står, vad man inte får står. Escape hatch tillbaka till det gratis. Ingen social proof, ingen kostnadsram, inget ankarpris — allt det tillförs medvetet först i 3b.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============================ 3b — MÅTTLIG (inom §5) ============================ -->\n    <div id=\"3b\" style=\"width: 430px; display: flex; flex-direction: column; gap: 12px;\">\n      <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n        <span style=\"font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #fff; background: #256b3b; padding: 3px 9px;\">3b<\u002Fspan>\n        <div>\n          <div style=\"font-size: 18px; font-weight: 700; color: #17140f;\">Accelererad · måttlig<\u002Fdiv>\n          <div style=\"font-size: 14px; color: #256b3b; font-weight: 700;\">Ärliga intensifierare · inom §5<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"--surface:#ffffff; --sunken:#f4f2ec; --page:#E7E8EA; --ink:#17140f; --muted:#4a463f; --line:#17140f; --accent:#256b3b; --soon:#8a5300; --mono:'Space Mono',monospace; width: 430px; background: var(--surface); border: 2.5px solid var(--line); border-radius: 14px; overflow: hidden; box-shadow: 0 8px 28px rgba(0,0,0,.10);\">\n        <div style=\"display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 2px solid var(--line);\">\n          <img src=\"ed90474e-06d5-452f-9e87-40e94cc39e0a\" alt=\"Föreningsguiden\" style=\"width: 30px; height: 30px; object-fit: contain; flex: none;\">\n          <span style=\"font-family: 'Archivo', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -.01em; color: var(--ink);\">Förenings<span style=\"color: var(--accent);\">guiden<\u002Fspan><\u002Fspan>\n          <span style=\"margin-left: auto; font-family: var(--mono); font-size: 12px; font-weight: 700; color: var(--muted);\">UTKAST<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 20px 0;\">\n          <div style=\"font-size: 13px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; color: var(--muted);\">Gislaved kommun · Driftbidrag<\u002Fdiv>\n          <h2 style=\"margin: 6px 0 2px; font-family: 'Archivo', sans-serif; font-size: 25px; line-height: 1.15; font-weight: 800; color: var(--ink);\">Utkast till ansökan<\u002Fh2>\n          <div style=\"font-size: 15px; color: var(--muted);\">för Reftele IF<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 20px 0;\">\n          <p style=\"margin: 0 0 14px; font-size: 17px; line-height: 1.62; color: var(--ink);\">Reftele IF ansöker härmed om driftbidrag för verksamhetsåret 2026. Föreningen bedriver barn- och ungdomsverksamhet inom fotboll och innebandy med 214 medlemmar, varav 138 är under 20 år. Verksamheten vilar på ideellt engagemang och en anläggning som föreningen sköter på uppdrag av kommunen.<\u002Fp>\n          <div style=\"position: relative; height: 118px; overflow: hidden;\">\n            <div style=\"filter: blur(3px); opacity: .5; user-select: none; pointer-events: none;\">\n              <p style=\"margin: 0 0 14px; font-size: 17px; line-height: 1.62; color: var(--ink);\">Under verksamhetsåret planerar föreningen att utöka ungdomsverksamheten med två nya lag i åldersgruppen 8–10 år samt att arrangera en sommarcup öppen för hela bygden. Driftbidraget söks för att täcka löpande kostnader för anläggningen: el, uppvärmning, planunderhåll och försäkringar.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,.85) 78%, #fff 100%);\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding: 0 20px 22px;\">\n          <div style=\"background: var(--sunken); border: 2px solid var(--line); border-radius: 10px; padding: 20px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;\">\n              <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"11\" width=\"16\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M8 11V7a4 4 0 0 1 8 0v4\"><\u002Fpath><\u002Fsvg>\n              Resten av utkastet · 6 stycken kvar\n            <\u002Fdiv>\n            <h3 style=\"margin: 0 0 6px; font-family: 'Archivo', sans-serif; font-size: 21px; line-height: 1.2; font-weight: 800; color: var(--ink);\">Er ansökan är färdig att skickas in<\u002Fh3>\n            <p style=\"margin: 0 0 14px; font-size: 16px; line-height: 1.5; color: var(--muted);\">Hela utkastet är skrivet mot Gislaveds kriterier, med Reftele IF:s uppgifter.<\u002Fp>\n            <div style=\"display: flex; align-items: flex-start; gap: 8px; background: #fff; border: 1.5px solid var(--line); border-radius: 8px; padding: 11px 13px; margin-bottom: 14px;\">\n              <svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--soon)\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none; margin-top:1px;\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><polyline points=\"12 7 12 12 15 14\"><\u002Fpolyline><\u002Fsvg>\n              <span style=\"font-size: 15px; line-height: 1.45; color: var(--ink);\">En missad deadline kostar hela driftbidraget — upp till <strong>40 000 kr<\u002Fstrong>.<\u002Fspan>\n            <\u002Fdiv>\n            <a href=\"#3b\" style=\"display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--accent); color: #fff; font-size: 18px; font-weight: 700; padding: 15px; border-radius: 8px; text-decoration: none;\">Lås upp hela utkastet — 149 kr<\u002Fa>\n r-spacing: -.02em; color: #1B1E20;\">Utkastvyn med väggen<\u002Fh1>\n    <p style=\"margin: 0 0 10px; font-size: 17px; line-height: 1.55; color: #4A5054;\">Produktens viktigaste skärm. Kassören har fyllt i föreningens uppgifter (ungated, inget konto) och ser utkastet skrivas fram mot Gislaveds faktiska kriterier, med sin förening i texten. <strong>Väggen sitter inne i dokumentet<\u002Fstrong> — det första stycket är skarpt och komplett, fortsättningen syns men är tonad. Earned curiosity: hon ser att texten finns, är lång nog, och är bra — innan hon möter priset.<\u002Fp>\n    <p style=\"margin: 0; font-size: 15px; line-height: 1.5; color: #7A8085;\">Två riktningar för <em>var<\u002Fem> och <em>hur<\u002Fem> väggen sitter. All copy är platshållare i Fables register (saklig, ingen säljton); jag ritar ytan och flaggar vad den behöver. Referera med <a href=\"#1a\">1a<\u002Fa> / <a href=\"#1b\">1b<\u002Fa>.<\u002Fp>\n  <\u002Fheader>\n\n  <div style=\"display: flex; flex-wrap: wrap; gap: 48px; align-items: flex-start;\">\n\n    <!-- ============================ 1a — TONAD FORTSÄTTNING ============================ -->\n    <div id=\"1a\" style=\"width: 430px; display: flex; flex-direction: column; gap: 14px;\">\n      <div style=\"display: flex; align-items: baseline; gap: 12px;\">\n        <span style=\"font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #fff; background: #256B3B; padding: 3px 9px;\">1a<\u002Fspan>\n        <div>\n          <div style=\"font-size: 18px; font-weight: 700; color: #17140f;\">Tonad fortsättning<\u002Fdiv>\n          <div style=\"font-size: 14px; color: #4a463f;\">Texten fortsätter synligt men suddas ut · väggen vid tonpunkten<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"--surface:#ffffff; --sunken:#f4f2ec; --page:#E7E8EA; --ink:#17140f; --muted:#4a463f; --line:#17140f; --accent:#256b3b; --accent-soft:#e6efe7; --mono:'Space Mono',monospace; width: 430px; background: var(--surface); borde e IF<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"flex: none; transform: rotate(-5deg); border: 2.5px double var(--stamp); color: var(--stamp); border-radius: 5px; padding: 4px 8px; font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: .06em; opacity: .9; margin-top: 20px;\">UTKAST<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding: 16px 20px 0;\">\n          <p style=\"margin: 0 0 8px; font-size: 17px; line-height: 1.62; color: var(--ink);\">Reftele IF ansöker härmed om driftbidrag för verksamhetsåret 2026. Föreningen bedriver barn- och ungdomsverksamhet inom fotboll och innebandy med 214 medlemmar, varav 138 är under 20 år. Verksamheten vilar på ideellt engagemang och en anläggning som föreningen sköter på uppdrag av kommunen.<\u002Fp>\n        <\u002Fdiv>\n        <!-- perforation -->\n        <div style=\"position: relative; height: 0; border-top: 2.5px dashed var(--line); margin: 14px 0;\">\n          <span style=\"position: absolute; top: -11px; left: -12px; width: 20px; height: 20px; border-radius: 50%; background: var(--page);\"><\u002Fspan>\n          <span style=\"position: absolute; top: -11px; right: -12px; width: 20px; height: 20px; border-radius: 50%; background: var(--page);\"><\u002Fspan>\n          <span style=\"position: absolute; top: -9px; left: 50%; transform: translateX(-50%); background: var(--surface); padding: 0 10px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--muted);\">riv här<\u002Fspan>\n        <\u002Fdiv>\n        <!-- below the tear: blurred + wall -->\n        <div style=\"padding: 4px 20px 22px; position: relative;\">\n          <div style=\"position: relative; height: 74px; overflow: hidden; margin-bottom: 4px;\">\n            <div style=\"filter: blur(3px); opacity: .45; user-select: none; pointer-events: none;\">\n              <p style=\"margin: 0; font-size: 17px; line-height: 1.62; color: var(--ink);\">Under verksamhetsåret planerar föreningen att utöka ungdomsverksamheten med två nya lag samt arrangera en sommarcup öppen för hela bygden.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,.9) 85%, #fff 100%);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background: var(--sunken); border: 2px solid var(--line); border-radius: 10px; padding: 20px;\">\n            <div style=\"display: flex; align-items: center; gap: 8px; font-family: var(--mono); font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); margin-bottom: 10px;\">\n              <svg width=\"15\" height=\"15\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"11\" width=\"16\" height=\"10\" rx=\"2\"><\u002Frect><path d=\"M8 11V7a4 4 0 0 1 8 0v4\"><\u002Fpath><\u002Fsvg>\n              Nedanför perforeringen · 6 stycken\n            <\u002Fdiv>\n            <h3 style=\"margin: 0 0 6px; font-family: 'Archivo', sans-serif; font-size: 21px; line-height: 1.2; font-weight: 800; color: var(--ink);\">Er ansökan är färdig att skickas in<\u002Fh3>\n            <p style=\"margin: 0 0 16px; font-size: 16px; line-height: 1.5; color: var(--muted);\">Riv loss hela utkastet — skrivet mot Gislaveds kriterier, med Reftele IF:s uppgifter.<\u002Fp>\n            <a href=\"#1b\" style=\"display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--accent); color: #fff; font-size: 18px; font-weight: 700; padding: 15px; border-radius: 8px; text-decoration: none;\">Lås upp hela utkastet — 149 kr<\u002Fa>\n            <div style=\"text-align: center; margin-top: 10px;\"><a href=\"#1b\" style=\"font-size: 15px; font-weight: 700; color: var(--muted); text-decoration: underline;\">Ingår i abonnemang · 495 kr/år<\u
